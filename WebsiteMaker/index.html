<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WebForge — Visual Website Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0f;
  --panel: #18181b;
  --panel-2: #222226;
  --toolbar: #1a1a1e;
  --input-bg: #2e2e33;
  --input-hover: #35353b;
  --border: rgba(255,255,255,.06);
  --border-l: rgba(255,255,255,.1);
  --border-xl: rgba(255,255,255,.18);
  --text: #e4e4e8;
  --text2: #a0a0a8;
  --text3: #6e6e76;
  --text4: #46464e;
  --accent: #4285f4;
  --accent-h: #5a9bf4;
  --accent-g: rgba(66,133,244,.15);
  --blue: #4facfe;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --purple: #a78bfa;
  --r: 8px;
  --t: .15s cubic-bezier(.4,0,.2,1);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  color: var(--text);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: var(--text); font-size: 13px; }
input, textarea, select { font-family: inherit; color: var(--text); border: none; outline: none; background: none; font-size: 13px; }

/* ═══════════════════════════════════════════════════════════
   BROWSER CHROME (outer wrapper with tabs + address bar)
   ═══════════════════════════════════════════════════════════ */
.browser {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
}
.tab-strip {
  display: flex;
  align-items: flex-end;
  background: #0a0a0c;
  padding: 0 6px;
  height: 38px;
  gap: 0;
  user-select: none;
  -webkit-user-select: none;
  flex-shrink: 0;
  overflow-x: auto;
}
.tab-strip::-webkit-scrollbar { height: 0; }
.tab {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  height: 32px;
  padding: 0 10px 0 12px;
  min-width: 100px;
  max-width: 220px;
  flex: 0 1 220px;
  background: var(--tab-bg, #18181b);
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  color: var(--text3);
  font-size: 12px;
  font-weight: 500;
  transition: background var(--t), color var(--t);
  overflow: hidden;
  margin-right: 2px;
}
.tab:hover { background: #1e1e22; color: var(--text2); }
.tab.active {
  background: var(--toolbar);
  color: var(--text);
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
}
.tab-icon {
  width: 14px; height: 14px;
  flex-shrink: 0;
  opacity: .8;
}
.tab-icon svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 2; }
.tab-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
}
.tab-close {
  width: 18px; height: 18px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3);
  flex-shrink: 0;
  opacity: 0;
  transition: all var(--t);
}
.tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
.tab-close:hover { background: rgba(255,255,255,.12); color: var(--text); }
.tab-close svg { width: 10px; height: 10px; stroke-width: 2.5; }
.tab-add {
  width: 32px; height: 32px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3);
  transition: all var(--t);
  margin-left: 4px;
  flex-shrink: 0;
}
.tab-add:hover { background: rgba(255,255,255,.08); color: var(--text); }
.tab-add svg { width: 14px; height: 14px; stroke-width: 2.5; }

.browser-toolbar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 10px;
  background: var(--toolbar);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  height: 44px;
}
.nav-btn {
  width: 30px; height: 30px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  transition: all var(--t);
  flex-shrink: 0;
}
.nav-btn:hover:not(:disabled) { background: var(--input-bg); color: var(--text); }
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }
.nav-btn svg { width: 16px; height: 16px; stroke-width: 2; fill: none; stroke: currentColor; }

.address-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--input-bg);
  border: 1px solid transparent;
  border-radius: 18px;
  padding: 0 14px 0 12px;
  height: 32px;
  transition: all var(--t);
  margin: 0 8px;
  max-width: 720px;
}
.address-wrap:focus-within { border-color: var(--accent); background: var(--panel-2); }
.address-lock {
  display: flex;
  color: var(--green);
  margin-right: 8px;
  flex-shrink: 0;
}
.address-lock svg { width: 12px; height: 12px; }
.address-bar {
  flex: 1;
  font-size: 12px;
  background: transparent;
  color: var(--text);
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
}
.address-bar::placeholder { color: var(--text3); }

.browser-body {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}

/* Re-route views to live inside browser-body. Remove old .home-view full-height */
.browser-body > #homeView,
.browser-body > #viewerView,
.browser-body > #builderView,
.browser-body > #homeSearchResults {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.browser-body > #homeView { overflow-y: auto; }
.browser-body > #viewerView { display: flex; flex-direction: column; }
.browser-body > #builderView { display: flex; flex-direction: column; }
.browser-body > #homeSearchResults { overflow-y: auto; }

/* In browser chrome context, viewer doesn't need its own top nav (tabs handle it) */
.browser #viewerView .viewer-nav { display: none; }

/* ═══════════════════════════════════════════════════════════
   SHELL
   ═══════════════════════════════════════════════════════════ */
.shell { display: flex; flex-direction: column; height: 100%; }

/* ═══════════════════════════════════════════════════════════
   TOP BAR
   ═══════════════════════════════════════════════════════════ */
.topbar {
  display: flex;
  align-items: center;
  height: 52px;
  background: var(--toolbar);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  gap: 10px;
  flex-shrink: 0;
  user-select: none;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 14px 0 8px;
  height: 32px;
  border-right: 1px solid var(--border);
}
.logo-mark {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: linear-gradient(135deg, #4285f4 0%, #a78bfa 100%);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900;
  font-size: 14px;
  color: #fff;
  box-shadow: 0 2px 8px rgba(66,133,244,.3);
}
.logo-text { font-weight: 800; font-size: 15px; letter-spacing: -0.2px; }

.project-name {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  transition: background var(--t);
  color: var(--text2);
  font-weight: 500;
  font-size: 13px;
}
.project-name:hover { background: var(--input-bg); color: var(--text); }
.project-name svg { width: 14px; height: 14px; opacity: .6; }
.project-name input {
  font-weight: 500;
  font-size: 13px;
  min-width: 160px;
  width: 220px;
}

.topbar-spacer { flex: 1; }

.topbar-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 12px;
  border-radius: 6px;
  color: var(--text2);
  font-weight: 500;
  transition: all var(--t);
  font-size: 12px;
}
.topbar-btn:hover { background: var(--input-bg); color: var(--text); }
.topbar-btn svg { width: 14px; height: 14px; }
.topbar-btn.primary { background: var(--accent); color: #fff; }
.topbar-btn.primary:hover { background: var(--accent-h); }
.topbar-btn.on { background: var(--accent-g); color: var(--accent-h); }

.divider-v { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

.account-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px 0 4px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  transition: background var(--t);
}
.account-chip:hover { background: var(--input-bg); }
.account-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: linear-gradient(135deg, #4285f4, #a78bfa);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 11px;
}
.account-name { font-size: 12px; font-weight: 500; color: var(--text2); }

/* ═══════════════════════════════════════════════════════════
   WORKSPACE
   ═══════════════════════════════════════════════════════════ */
.workspace { display: flex; flex: 1; min-height: 0; overflow: hidden; }

/* ═══════════════════════════════════════════════════════════
   LEFT SIDEBAR
   ═══════════════════════════════════════════════════════════ */
.sidebar {
  width: 240px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
}
.sidebar-section { border-bottom: 1px solid var(--border); }
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px 8px;
  user-select: none;
}
.sidebar-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text3);
}
.add-btn {
  width: 22px; height: 22px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3);
  transition: all var(--t);
}
.add-btn:hover { background: var(--input-bg); color: var(--text); }
.add-btn svg { width: 13px; height: 13px; }

.pages-list {
  padding: 0 8px 10px;
  max-height: 40vh;
  overflow-y: auto;
}
.page-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background var(--t);
  margin-bottom: 2px;
  position: relative;
  user-select: none;
}
.page-item:hover { background: var(--panel-2); }
.page-item.active {
  background: var(--accent-g);
  color: var(--accent-h);
}
.page-num {
  width: 20px; height: 20px;
  border-radius: 4px;
  background: var(--input-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--text2);
  flex-shrink: 0;
}
.page-item.active .page-num { background: var(--accent); color: #fff; }
.page-name {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.page-name input {
  width: 100%;
  font-size: 12px;
  font-weight: 500;
}
.page-actions {
  display: none;
  gap: 2px;
}
.page-item:hover .page-actions { display: flex; }
.page-action {
  width: 20px; height: 20px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3);
  transition: all var(--t);
}
.page-action:hover { background: var(--input-bg); color: var(--text); }
.page-action svg { width: 12px; height: 12px; }

.elements-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding: 0 10px 14px;
}
.element-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 8px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 7px;
  transition: all var(--t);
  font-size: 11px;
  color: var(--text2);
  font-weight: 500;
  cursor: grab;
}
.element-btn:hover {
  background: var(--input-bg);
  border-color: var(--border-l);
  color: var(--text);
  transform: translateY(-1px);
}
.element-btn:active { cursor: grabbing; }
.element-btn svg { width: 18px; height: 18px; stroke-width: 2; opacity: .9; }

.sidebar-spacer { flex: 1; }

/* ═══════════════════════════════════════════════════════════
   CANVAS
   ═══════════════════════════════════════════════════════════ */
.canvas-wrap {
  flex: 1;
  background: #0a0a0c;
  background-image:
    radial-gradient(circle, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 20px 20px;
  overflow: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px;
  position: relative;
}
.canvas {
  width: 1024px;
  min-height: 700px;
  background: #ffffff;
  color: #1a1a1a;
  border-radius: 4px;
  box-shadow: 0 20px 80px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.3);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.canvas.has-bg-img { background-size: cover; background-position: center; }

.page-label {
  position: absolute;
  top: -28px;
  left: 0;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: .4px;
  text-transform: uppercase;
  pointer-events: none;
}

.el {
  position: absolute;
  cursor: move;
  user-select: none;
  outline: 2px solid transparent;
  transition: outline var(--t);
}
.el.selected {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
  animation: selPulse .4s ease;
}
@keyframes selPulse {
  0% { outline-width: 0px; outline-color: rgba(66,133,244,0); }
  50% { outline-width: 3px; outline-color: var(--accent); }
  100% { outline-width: 2px; outline-color: var(--accent); }
}

/* Floating action toolbar */
.el-toolbar {
  position: absolute;
  display: flex;
  gap: 2px;
  background: #1a1a1e;
  border: 1px solid var(--border-l);
  border-radius: 8px;
  padding: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  z-index: 100;
  pointer-events: auto;
  animation: toolbarIn .15s ease;
}
@keyframes toolbarIn {
  from { opacity: 0; transform: translateY(4px) scale(.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.el-toolbar-btn {
  width: 28px; height: 28px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  transition: all var(--t);
}
.el-toolbar-btn:hover { background: var(--input-bg); color: var(--text); }
.el-toolbar-btn.danger:hover { background: rgba(248,113,113,.2); color: var(--red); }
.el-toolbar-btn svg { width: 14px; height: 14px; stroke-width: 2; fill: none; stroke: currentColor; }
.el-toolbar-sep { width: 1px; height: 20px; background: var(--border); align-self: center; margin: 0 2px; }

/* Click ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(66,133,244,.35);
  pointer-events: none;
  animation: rippleExpand .6s ease-out;
  z-index: 1000;
}
@keyframes rippleExpand {
  from { transform: scale(0); opacity: .8; }
  to { transform: scale(4); opacity: 0; }
}

/* Alignment guides */
.snap-guide {
  position: absolute;
  background: var(--accent);
  pointer-events: none;
  z-index: 50;
  opacity: .8;
}
.snap-guide.v { width: 1px; top: 0; bottom: 0; }
.snap-guide.h { height: 1px; left: 0; right: 0; }

/* Inline text editor */
.el.editing {
  outline: 2px solid var(--accent) !important;
}
.el.editing [contenteditable] {
  outline: none;
  cursor: text;
  min-height: 1em;
}

/* Undo/redo toast indicator */
.history-flash {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--panel-2);
  border: 1px solid var(--border-l);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  z-index: 300;
}
.history-flash.show { opacity: 1; }

/* Keyboard shortcuts list */
.kbd-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
.kbd-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 6px; background: var(--panel-2); }
.kbd-keys { display: flex; gap: 4px; }
.kbd-label { font-size: 12px; color: var(--text2); }
kbd {
  display: inline-flex;
  align-items: center; justify-content: center;
  min-width: 24px;
  padding: 2px 6px;
  background: var(--input-bg);
  border: 1px solid var(--border-l);
  border-bottom-width: 2px;
  border-radius: 4px;
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--text);
}
.el:hover:not(.selected) {
  outline: 2px solid rgba(66,133,244,.4);
  outline-offset: 1px;
}

.el-handle {
  position: absolute;
  width: 10px; height: 10px;
  background: var(--accent);
  border: 2px solid #fff;
  border-radius: 50%;
  z-index: 10;
}
.el-handle.nw { top: -5px; left: -5px; cursor: nwse-resize; }
.el-handle.ne { top: -5px; right: -5px; cursor: nesw-resize; }
.el-handle.sw { bottom: -5px; left: -5px; cursor: nesw-resize; }
.el-handle.se { bottom: -5px; right: -5px; cursor: nwse-resize; }
.el-handle.n  { top: -5px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
.el-handle.s  { bottom: -5px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
.el-handle.w  { top: 50%; left: -5px; transform: translateY(-50%); cursor: ew-resize; }
.el-handle.e  { top: 50%; right: -5px; transform: translateY(-50%); cursor: ew-resize; }

/* Element rendering */
.el-text, .el-heading { padding: 8px; overflow: hidden; word-wrap: break-word; }
.el-button {
  padding: 0 16px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}
.el-image {
  overflow: hidden;
  background: #eee url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23999" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>') center/40px no-repeat;
}
.el-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
.el-shape { border-radius: 4px; }
.el-input-field {
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid #d0d0d0;
  background: #fff;
  font-size: 14px;
  color: #1a1a1a;
  width: 100%;
  height: 100%;
}
.el-video { background: #000; display: flex; align-items: center; justify-content: center; color: #fff; }
.el-video svg { width: 40px; height: 40px; }
.el-icon { display: flex; align-items: center; justify-content: center; }
.el-icon svg { width: 100%; height: 100%; }
.el-divider { display: flex; align-items: center; }

/* Entrance animations (only in preview/viewer) */
@keyframes wf-fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes wf-slide-up { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
@keyframes wf-slide-down { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }
@keyframes wf-slide-left { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes wf-slide-right { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes wf-zoom { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
@keyframes wf-bounce { 0% { opacity: 0; transform: scale(.3); } 50% { opacity: 1; transform: scale(1.08); } 70% { transform: scale(.95); } 100% { transform: scale(1); } }
@keyframes wf-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
@keyframes wf-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Button hover effects (preview/viewer only) */
body.preview .el-button, body[data-view="viewer"] .viewer-canvas .el-button { transition: all .2s cubic-bezier(.4,0,.2,1); }
body.preview .el-button[data-hover-lift="1"]:hover,
body[data-view="viewer"] .viewer-canvas .el-button[data-hover-lift="1"]:hover { transform: translateY(-2px); }
body.preview .el-button[data-hover-scale="1"]:hover,
body[data-view="viewer"] .viewer-canvas .el-button[data-hover-scale="1"]:hover { transform: scale(1.05); }
body.preview .el-button[data-hover-glow="1"]:hover,
body[data-view="viewer"] .viewer-canvas .el-button[data-hover-glow="1"]:hover { box-shadow: 0 0 24px currentColor; filter: brightness(1.1); }

/* Preview mode */
body.preview .topbar,
body.preview .sidebar,
body.preview .right-panel,
body.preview .el-handle,
body.preview .el-toolbar,
body.preview .page-label { display: none !important; }
body.preview .browser-toolbar { display: none !important; }
body.preview .tab-strip { display: none !important; }
body.preview .canvas-wrap { padding: 0; background: #fff; align-items: flex-start; justify-content: center; overflow-y: auto; }
body.preview .canvas { box-shadow: none; border-radius: 0; min-height: 100vh; transform-origin: top center; }
body.preview .el { outline: none !important; cursor: default !important; }
body.preview .el:hover { outline: none !important; }
body.preview .el.full-width { left: 0 !important; width: 100% !important; }

/* Full-width elements (stretch to canvas edges) */
.el.full-width { left: 0 !important; width: 100% !important; }

/* ═══════════════════════════════════════════════════════════
   RIGHT PANEL
   ═══════════════════════════════════════════════════════════ */
.right-panel {
  width: 320px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.rp-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 6px;
  flex-shrink: 0;
}
.rp-tab {
  flex: 1;
  padding: 12px 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  border-bottom: 2px solid transparent;
  transition: all var(--t);
  text-align: center;
}
.rp-tab:hover { color: var(--text); }
.rp-tab.active { color: var(--accent-h); border-bottom-color: var(--accent); }

.rp-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.prop-group { margin-bottom: 18px; }
.prop-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--text3);
  margin-bottom: 8px;
  display: block;
}
.prop-row { display: flex; gap: 8px; margin-bottom: 8px; }
.prop-row:last-child { margin-bottom: 0; }

.field {
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--input-bg);
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 0 10px;
  height: 32px;
  transition: all var(--t);
}
.field:focus-within { border-color: var(--accent); background: var(--panel-2); }
.field-icon {
  color: var(--text3);
  font-size: 11px;
  font-weight: 600;
  margin-right: 6px;
  width: 12px;
  text-align: center;
}
.field input, .field select {
  flex: 1;
  width: 100%;
  min-width: 0;
  font-size: 12px;
  background: transparent;
}
.field select { cursor: pointer; }
.field select option { background: var(--panel-2); color: var(--text); }
.field input[type="color"] {
  width: 28px;
  height: 22px;
  padding: 0;
  border: none;
  cursor: pointer;
  background: transparent;
}
.field input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 4px; }
.field input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border-l); border-radius: 4px; }

.field-big {
  display: flex;
  flex-direction: column;
  background: var(--input-bg);
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 8px 10px;
  transition: all var(--t);
}
.field-big:focus-within { border-color: var(--accent); background: var(--panel-2); }
.field-big textarea {
  width: 100%;
  min-height: 60px;
  resize: vertical;
  font-size: 12px;
  background: transparent;
  line-height: 1.5;
}

.btn-row { display: flex; gap: 6px; }
.small-btn {
  flex: 1;
  height: 30px;
  background: var(--input-bg);
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  transition: all var(--t);
}
.small-btn:hover { background: var(--input-hover); color: var(--text); }
.small-btn.on { background: var(--accent-g); color: var(--accent-h); }
.small-btn.danger { color: var(--red); }
.small-btn.danger:hover { background: rgba(248,113,113,.15); }

.no-selection {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 12px;
}
.no-selection svg { width: 40px; height: 40px; margin-bottom: 14px; opacity: .4; stroke: var(--text3); stroke-width: 1.5; }

/* ═══════════════════════════════════════════════════════════
   AI PANEL
   ═══════════════════════════════════════════════════════════ */
.ai-body {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 0;
}
.ai-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ai-msg {
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 12px;
  line-height: 1.5;
  max-width: 85%;
  word-wrap: break-word;
}
.ai-msg.user {
  background: var(--accent);
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 3px;
}
.ai-msg.bot {
  background: var(--panel-2);
  color: var(--text);
  align-self: flex-start;
  border-bottom-left-radius: 3px;
  border: 1px solid var(--border);
}
.ai-msg.system {
  background: transparent;
  color: var(--text3);
  align-self: center;
  font-style: italic;
  font-size: 11px;
  text-align: center;
  padding: 4px 10px;
  max-width: 100%;
}
.ai-msg code {
  background: rgba(0,0,0,.3);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: ui-monospace, monospace;
  font-size: 11px;
}

.ai-input-wrap {
  padding: 12px;
  border-top: 1px solid var(--border);
  background: var(--panel);
}
.ai-input-box {
  background: var(--input-bg);
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 10px 10px 10px 12px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  transition: all var(--t);
}
.ai-input-box:focus-within { border-color: var(--accent); background: var(--panel-2); }
.ai-input {
  flex: 1;
  resize: none;
  min-height: 20px;
  max-height: 120px;
  font-size: 13px;
  line-height: 1.4;
  background: transparent;
}
.ai-send {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  transition: all var(--t);
  flex-shrink: 0;
}
.ai-send:hover { background: var(--accent-h); transform: translateY(-1px); }
.ai-send:disabled { background: var(--input-bg); color: var(--text4); cursor: not-allowed; transform: none; }
.ai-send svg { width: 14px; height: 14px; }

.ai-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.ai-chip {
  padding: 5px 10px;
  background: var(--input-bg);
  border-radius: 14px;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  transition: all var(--t);
  border: 1px solid var(--border);
}
.ai-chip:hover { background: var(--accent-g); color: var(--accent-h); border-color: var(--accent); }

.ai-mode-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--panel-2);
  font-size: 11px;
  color: var(--text3);
  flex-shrink: 0;
}
.ai-mode-bar .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text4);
}
.ai-mode-bar.real .dot { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,.6); }
.ai-mode-bar .mode-label { flex: 1; font-weight: 600; color: var(--text2); }
.ai-mode-bar .mode-btn {
  padding: 3px 10px;
  background: var(--input-bg);
  border-radius: 12px;
  font-size: 10px;
  font-weight: 600;
  color: var(--text2);
  transition: all var(--t);
}
.ai-mode-bar .mode-btn:hover { background: var(--accent); color: #fff; }
.ai-mode-bar.real .mode-btn { background: var(--accent-g); color: var(--accent-h); }

.ai-thinking {
  display: flex;
  align-items: center;
  gap: 8px;
  align-self: flex-start;
  padding: 10px 14px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  border-bottom-left-radius: 3px;
  font-size: 11px;
  color: var(--text3);
}
.ai-thinking .spinner {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid var(--border-xl);
  border-top-color: var(--accent);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.ai-tool-log {
  align-self: flex-start;
  background: transparent;
  border-left: 2px solid var(--accent);
  padding: 4px 10px;
  font-size: 10px;
  font-family: ui-monospace, monospace;
  color: var(--text3);
  max-width: 85%;
}
.ai-tool-log strong { color: var(--accent-h); font-weight: 700; }

/* ═══════════════════════════════════════════════════════════
   MODALS
   ═══════════════════════════════════════════════════════════ */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--t);
}
.modal-bg.open { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--panel);
  border: 1px solid var(--border-l);
  border-radius: 14px;
  padding: 24px;
  width: 460px;
  max-width: calc(100vw - 40px);
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  transform: translateY(8px);
  transition: transform var(--t);
}
.modal-bg.open .modal { transform: translateY(0); }

.modal h3 {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 4px;
}
.modal p.modal-desc {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 20px;
}
.modal-field { margin-bottom: 14px; }
.modal-field label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--text3);
  display: block;
  margin-bottom: 6px;
}
.modal-field input, .modal-field textarea {
  width: 100%;
  padding: 10px 12px;
  background: var(--input-bg);
  border-radius: 7px;
  font-size: 13px;
}
.modal-field textarea { resize: vertical; min-height: 70px; }
.modal-btns {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}
.modal-btn {
  padding: 10px 18px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  transition: all var(--t);
}
.modal-btn-secondary {
  background: var(--input-bg);
  color: var(--text2);
}
.modal-btn-secondary:hover { background: var(--input-hover); color: var(--text); }
.modal-btn-primary {
  background: var(--accent);
  color: #fff;
}
.modal-btn-primary:hover { background: var(--accent-h); }

/* Project grid inside modal */
.proj-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.proj-card {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all var(--t);
  position: relative;
}
.proj-card:hover { border-color: var(--accent); background: var(--input-bg); }
.proj-card-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.proj-card-meta { font-size: 10px; color: var(--text3); }
.proj-card-del {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 20px; height: 20px;
  border-radius: 4px;
  display: none;
  align-items: center; justify-content: center;
  background: var(--input-bg);
  color: var(--red);
}
.proj-card:hover .proj-card-del { display: flex; }
.proj-card-del:hover { background: var(--red); color: #fff; }
.proj-card-del svg { width: 12px; height: 12px; }
.proj-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 12px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--panel-2);
  border: 1px solid var(--border-l);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  box-shadow: 0 8px 30px rgba(0,0,0,.5);
  opacity: 0;
  pointer-events: none;
  transition: all var(--t);
  z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok { border-color: var(--green); }
.toast.err { border-color: var(--red); }

/* Preview floating exit button */
.preview-exit {
  display: none;
  position: fixed;
  top: 16px;
  right: 16px;
  background: rgba(26,26,30,.92);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-l);
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
body.preview .preview-exit { display: flex; align-items: center; gap: 6px; }
.preview-exit svg { width: 14px; height: 14px; }

/* ═══════════════════════════════════════════════════════════
   VIEW ROUTING
   ═══════════════════════════════════════════════════════════ */
body[data-view="home"] #builderView,
body[data-view="home"] #viewerView,
body[data-view="viewer"] #builderView,
body[data-view="viewer"] #homeView,
body[data-view="viewer"] #homeSearchResults,
body[data-view="builder"] #homeView,
body[data-view="builder"] #homeSearchResults,
body[data-view="builder"] #viewerView { display: none !important; }

/* ═══════════════════════════════════════════════════════════
   HOME VIEW (WebForge original — Google new-tab style)
   ═══════════════════════════════════════════════════════════ */
.home-view {
  height: 100%;
  overflow-y: auto;
  background: var(--bg);
}
.home-nav {
  display: flex;
  align-items: center;
  padding: 14px 24px;
  gap: 12px;
  position: sticky;
  top: 0;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(13,13,15,.7);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.home-nav-spacer { flex: 1; }
.home-nav-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: 6px;
  color: var(--text2);
  font-weight: 500;
  font-size: 12px;
  transition: all var(--t);
}
.home-nav-btn:hover { background: var(--input-bg); color: var(--text); }
.home-nav-btn svg { width: 14px; height: 14px; }
.home-nav-btn.primary { background: var(--accent); color: #fff; padding: 7px 14px; }
.home-nav-btn.primary:hover { background: var(--accent-h); }

.home-hero {
  text-align: center;
  padding: 90px 24px 28px;
}
.home-logo {
  font-size: 52px;
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1.05;
  color: var(--text);
  user-select: none;
}
.home-logo span {
  background: linear-gradient(90deg, #4285f4, #a78bfa);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.home-tagline {
  color: var(--text3);
  font-size: 14px;
  font-weight: 400;
  margin-top: 10px;
}

.home-search-wrap {
  width: 100%;
  max-width: 580px;
  margin: 28px auto 32px;
  padding: 0 24px;
  position: relative;
}
.home-search-inner {
  width: 100%;
  height: 48px;
  padding: 0 22px 0 48px;
  background: #fff;
  border: none;
  border-radius: 24px;
  display: flex;
  align-items: center;
  transition: box-shadow var(--t);
  box-shadow: 0 1px 6px rgba(0,0,0,.2), 0 0 0 1px rgba(255,255,255,.04);
  position: relative;
}
.home-search-inner:hover { box-shadow: 0 2px 10px rgba(0,0,0,.28), 0 0 0 1px rgba(255,255,255,.06); }
.home-search-inner:focus-within { box-shadow: 0 2px 14px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.08); }
.home-search-wrap.has-dd .home-search-inner { border-radius: 24px 24px 0 0; }
.home-search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: #9aa0a6;
  display: flex;
}
.home-search-icon svg { width: 18px; height: 18px; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.home-search-input {
  flex: 1;
  height: 100%;
  font-size: 15px;
  background: transparent;
  color: #1a1a1a;
  border: none;
  outline: none;
}
.home-search-input::placeholder { color: #9aa0a6; }
.home-search-btn { display: none; }

.home-search-dd {
  position: absolute;
  top: 48px;
  left: 24px;
  right: 24px;
  background: #fff;
  border-radius: 0 0 16px 16px;
  overflow: hidden;
  box-shadow: 0 4px 18px rgba(0,0,0,.22);
  display: none;
  z-index: 20;
  border-top: 1px solid #e8e8e8;
}
.home-search-dd.open { display: block; }
.sugg {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px;
  cursor: pointer;
  color: #333;
  transition: background .1s;
}
.sugg:hover, .sugg.active { background: #f1f3f4; }
.sugg-icon {
  width: 16px; height: 16px;
  flex-shrink: 0;
  color: #9aa0a6;
  display: flex;
}
.sugg-icon svg { width: 100%; height: 100%; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke: currentColor; }
.sugg.type-site .sugg-icon { color: #4285f4; }
.sugg.type-ai .sugg-icon { color: #a78bfa; }
.sugg-body { flex: 1; min-width: 0; }
.sugg-title {
  font-size: 14px;
  font-weight: 400;
  color: #333;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sugg-title mark {
  background: transparent;
  color: #4285f4;
  font-weight: 700;
}
.sugg-title em { font-style: normal; font-weight: 600; color: #1a1a1a; }
.sugg-meta {
  font-size: 11px;
  color: #70757a;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sugg-badge {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: #70757a;
  background: #f1f3f4;
  padding: 3px 8px;
  border-radius: 10px;
  flex-shrink: 0;
}
.sugg-badge.sponsored { background: #fef3c7; color: #92400e; }

.web-result {
  display: block;
  padding: 12px 14px;
  margin-bottom: 8px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  text-decoration: none;
  transition: all var(--t);
  color: var(--text);
}
.web-result:hover { background: var(--input-bg); border-color: var(--accent); transform: translateY(-1px); }
.web-result-title { font-size: 14px; font-weight: 600; color: var(--accent-h); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.web-result-url { font-size: 11px; color: var(--green); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.web-result-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }

.shortcuts {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 440px;
  margin: 0 auto 50px;
  padding: 0 24px;
}
@media (max-width: 500px) { .shortcuts { grid-template-columns: repeat(3, 1fr); } }
.shortcut {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 14px 4px 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: all var(--t);
}
.shortcut:hover { background: rgba(255,255,255,.04); }
.shortcut:active { transform: scale(.95); }
.shortcut-icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--panel);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--t);
}

<script>
/* ════════════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════════════ */
const $ = (s, c) => (c || document).querySelector(s);
const $$ = (s, c) => (c || document).querySelectorAll(s);
const uid = () => Math.random().toString(36).slice(2, 10);

/* ════════════════════════════════════════════════════════════
   SOUND EFFECTS (Web Audio API)
   ════════════════════════════════════════════════════════════ */
const SFX = (() => {
  let ctx = null;
  let muted = localStorage.getItem('wf_muted') === '1';
  const ensureCtx = () => {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (ctx && ctx.state === 'suspended') ctx.resume();
    return ctx;
  };
  const tone = (freq, duration, type = 'sine', volume = 0.15, attack = 0.005, release = 0.04, slideTo = null) => {
    if (muted) return;
    const c = ensureCtx(); if (!c) return;
    const t = c.currentTime;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slideTo !== null) osc.frequency.exponentialRampToValueAtTime(slideTo, t + duration);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(volume, t + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.connect(gain).connect(c.destination);
    osc.start(t);
    osc.stop(t + duration + release);
  };
  return {
    isMuted: () => muted,
    setMuted: (m) => { muted = m; localStorage.setItem('wf_muted', m ? '1' : '0'); },
    click:   () => tone(1800, 0.03, 'square', 0.04),
    select:  () => tone(520, 0.08, 'sine', 0.08, 0.005, 0.05, 780),
    add:     () => tone(440, 0.12, 'triangle', 0.12, 0.005, 0.05, 880),
    remove:  () => tone(440, 0.1, 'sawtooth', 0.08, 0.005, 0.05, 160),
    save:    () => { tone(523, 0.08, 'sine', 0.1); setTimeout(() => tone(659, 0.08, 'sine', 0.1), 60); setTimeout(() => tone(784, 0.12, 'sine', 0.1), 120); },
    err:     () => { tone(200, 0.12, 'square', 0.08); setTimeout(() => tone(150, 0.12, 'square', 0.08), 80); },
    undo:    () => tone(660, 0.05, 'sine', 0.08, 0.005, 0.03, 440),
    redo:    () => tone(440, 0.05, 'sine', 0.08, 0.005, 0.03, 660),
    open:    () => tone(392, 0.12, 'sine', 0.1, 0.01, 0.06, 523),
    close:   () => tone(523, 0.08, 'sine', 0.08, 0.005, 0.04, 330),
    tab:     () => tone(600, 0.04, 'sine', 0.05),
    toggle:  () => tone(800, 0.04, 'triangle', 0.08),
    publish: () => { tone(523, 0.08, 'sine', 0.1); setTimeout(() => tone(659, 0.08, 'sine', 0.1), 60); setTimeout(() => tone(784, 0.08, 'sine', 0.1), 120); setTimeout(() => tone(1047, 0.15, 'sine', 0.1), 180); },
    drop:    () => tone(880, 0.06, 'sine', 0.06, 0.005, 0.03, 660)
  };
})();

let state = {
  view: 'home',
  tabs: [],
  activeTabId: null,
  project: null,
  projects: [],
  user: { email: null, name: 'Guest' },
  selectedEl: null,
  rightTab: 'props',
  mode: 'edit',
  aiMessages: [],
  dirty: false,
  viewerProject: null,
  viewerPageId: null,
  viewerOwner: '',
  runtimeVars: {} // in-session variable overrides for preview mode
};

const DEFAULT_PAGE = () => ({
  id: uid(),
  name: 'Home',
  bg: '#ffffff',
  bgImage: '',
  elements: []
});

const NEW_PROJECT = (name) => ({
  id: uid(),
  name: name || 'Untitled Site',
  pages: [DEFAULT_PAGE()],
  currentPageId: null,
  theme: { accent: '#4285f4', font: 'Inter' },
  variables: {},
  canvasWidth: 1024,
  published: false,
  promoted: false,
  adLine: '',
  tagline: '',
  views: 0,
  createdAt: Date.now(),
  updatedAt: Date.now()
});

/* Migrate old flat variables {key: value} → typed format {key: {type,value}} */
function migrateVariables(vars) {
  if (!vars || typeof vars !== 'object') return {};
  try {
  const out = {};
  for (const [k, v] of Object.entries(vars)) {
    if (v && typeof v === 'object' && 'type' in v && 'value' in v) {
      out[k] = v; // already typed
    } else {
      // Auto-detect type
      let type = 'text';
      let value = v;
      if (v === 'true' || v === 'false' || typeof v === 'boolean') {
        type = 'boolean'; value = v === 'true' ? true : v === 'false' ? false : !!v;
      } else if (v !== '' && !isNaN(Number(v)) && typeof v !== 'boolean') {
        type = 'number'; value = Number(v);
      } else if (Array.isArray(v)) {
        type = 'list'; value = v;
      } else {
        type = 'text'; value = String(v === undefined ? '' : v);
      }
      out[k] = { type, value };
    }
  }
  return out;
  } catch (e) { console.error('migrateVariables error:', e); return {}; }
}

/* Get the raw value from a typed variable */
function varValue(v) {
  if (v && typeof v === 'object' && 'value' in v) return v.value;
  return v; // legacy plain value
}

/* ════════════════════════════════════════════════════════════
   STORAGE (local + cloud)
   ════════════════════════════════════════════════════════════ */
function storageKey() {
  return state.user.email ? 'wf_projects_' + state.user.email : 'wf_projects_guest';
}
function userKey() { return 'wf_user'; }

function saveAll() {
  try {
    localStorage.setItem(storageKey(), JSON.stringify(state.projects));
    localStorage.setItem('wf_last_project_' + (state.user.email || 'guest'),
                         state.project ? state.project.id : '');
  } catch (e) { console.error(e); }
}
function loadAll() {
  try {
    const raw = localStorage.getItem(storageKey());
    state.projects = raw ? JSON.parse(raw) : [];
  } catch (e) { state.projects = []; }
}
function loadUser() {
  try {
    const raw = localStorage.getItem(userKey());
    if (raw) state.user = JSON.parse(raw);
  } catch (e) {}
}
function saveUser() {
  localStorage.setItem(userKey(), JSON.stringify(state.user));
}

function saveProject() {
  if (!state.project) return;
  state.project.updatedAt = Date.now();
  const idx = state.projects.findIndex(p => p.id === state.project.id);
  if (idx >= 0) state.projects[idx] = state.project;
  else state.projects.push(state.project);
  saveAll();
  state.dirty = false;
  toast('Saved', 'ok');
  SFX.save();
}

function markDirty() { state.dirty = true; }

/* ── Cloud sync ── */
async function cloudSaveProject() {
  if (!state.project) return;
  saveProject(); // local save first
  try {
    const res = await fetch('/api/data/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projectId: state.project.id, data: state.project })
    });
    const j = await res.json();
    if (j.ok) toast('Synced to cloud', 'ok');
    else toast('Cloud sync failed', 'err');
  } catch (e) {
    toast('Cloud unavailable', 'warn');
  }
}

async function cloudLoadProject(projectId) {
  try {
    const res = await fetch('/api/data/load?id=' + encodeURIComponent(projectId));
    const j = await res.json();
    if (j.ok && j.found) return j.data;
  } catch (e) {}
  return null;
}

/* ════════════════════════════════════════════════════════════
   PAGE HELPERS
   ════════════════════════════════════════════════════════════ */
function currentPage() {
  if (!state.project) return null;
  return state.project.pages.find(p => p.id === state.project.currentPageId)
         || state.project.pages[0];
}
function setCurrentPage(pageId) {
  state.project.currentPageId = pageId;
  state.selectedEl = null;
  renderAll();
}
function addPage(name) {
  const page = DEFAULT_PAGE();
  page.name = name || ('Page ' + (state.project.pages.length + 1));
  state.project.pages.push(page);
  state.project.currentPageId = page.id;
  state.selectedEl = null;
  markDirty();
  renderAll();
  return page;
}
function deletePage(pageId) {
  if (state.project.pages.length <= 1) { toast('Cannot delete last page', 'err'); return; }
  state.project.pages = state.project.pages.filter(p => p.id !== pageId);
  if (state.project.currentPageId === pageId) {
    state.project.currentPageId = state.project.pages[0].id;
  }
  state.selectedEl = null;
  markDirty();
  renderAll();
}
function duplicatePage(pageId) {
  const p = state.project.pages.find(x => x.id === pageId);
  if (!p) return;
  const copy = JSON.parse(JSON.stringify(p));
  copy.id = uid();
  copy.name = p.name + ' Copy';
  copy.elements.forEach(e => e.id = uid());
  const idx = state.project.pages.findIndex(x => x.id === pageId);
  state.project.pages.splice(idx + 1, 0, copy);
  state.project.currentPageId = copy.id;
  markDirty();
  renderAll();
}

function addElement(type, x, y) {
  try {
    const factory = ELEMENT_DEFAULTS[type];
    if (!factory) { console.error('Unknown element type:', type); return null; }
    const page = currentPage();
    if (!page) { console.error('No current page'); return null; }
    const base = factory();
    const el = { id: uid(), ...base };
    if (typeof x === 'number') el.x = x;
    if (typeof y === 'number') el.y = y;
    // Ensure actions is a fresh array (not shared ref)
    if (el.props && Array.isArray(el.props.actions)) el.props.actions = [];
    if (el.props && el.props.visibleWhen) el.props.visibleWhen = null;
    page.elements.push(el);
    state.selectedEl = el.id;
    markDirty();
    try { snapshotProject(); } catch(e) {}
    renderAll();
    SFX.add();
    return el;
  } catch (e) {
    console.error('addElement error for type=' + type + ':', e);
    toast('Error: ' + e.message, 'err');
    return null;
  }
}
function deleteElement(elId) {
  const page = currentPage();
  page.elements = page.elements.filter(e => e.id !== elId);
  if (state.selectedEl === elId) state.selectedEl = null;
  markDirty();
  renderAll();
  SFX.remove();
}
function findElement(elId) {
  const page = currentPage();
  if (!page) return null;
  return page.elements.find(e => e.id === elId);
}
function selectedElement() {
  return state.selectedEl ? findElement(state.selectedEl) : null;
}
function updateElementProp(elId, path, value) {
  const el = findElement(elId);
  if (!el) return;
  if (path.includes('.')) {
    const [a, b] = path.split('.');
    el[a][b] = value;
  } else {
    el[path] = value;
  }
  markDirty();
  renderCanvas();
}

function renderAll() {
  renderPagesList();
  renderCanvas();
  renderRightPanel();
  renderProjectName();
  renderAccount();
  updatePublishButton();
  renderElToolbar();
}

function renderProjectName() {
  $('#projNameInput').value = state.project ? state.project.name : 'Untitled Site';
}

function renderAccount() {
  $('#accountAvatar').textContent = (state.user.name || 'G').charAt(0).toUpperCase();
  $('#accountName').textContent = state.user.name || 'Guest';
}

function renderPagesList() {
  const list = $('#pagesList');
  list.innerHTML = '';
  if (!state.project) return;
  state.project.pages.forEach((page, i) => {
    const item = document.createElement('div');
    item.className = 'page-item' + (page.id === state.project.currentPageId ? ' active' : '');
    item.innerHTML = `
      <div class="page-num">${i + 1}</div>
      <div class="page-name" data-name>${escapeHtml(page.name)}</div>
      <div class="page-actions">
        <button class="page-action" data-act="rename" title="Rename">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
        <button class="page-action" data-act="dup" title="Duplicate">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
        <button class="page-action" data-act="del" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.closest('.page-action')) return;
      if (e.target.closest('input')) return;
      setCurrentPage(page.id);
    });
    item.querySelector('[data-act="rename"]').addEventListener('click', (e) => {
      e.stopPropagation();
      beginRenamePage(page.id, item);
    });
    item.querySelector('[data-act="dup"]').addEventListener('click', (e) => {
      e.stopPropagation();
      duplicatePage(page.id);
    });
    item.querySelector('[data-act="del"]').addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm('Delete page "' + page.name + '"?')) deletePage(page.id);
    });
    list.appendChild(item);
  });
}

function beginRenamePage(pageId, itemEl) {
  const page = state.project.pages.find(p => p.id === pageId);
  if (!page) return;
  const nameEl = itemEl.querySelector('[data-name]');
  nameEl.innerHTML = '<input type="text" value="' + escapeAttr(page.name) + '">';
  const input = nameEl.querySelector('input');
  input.focus();
  input.select();
  const commit = () => {
    const v = input.value.trim();
    if (v) page.name = v;
    markDirty();
    renderPagesList();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = page.name; input.blur(); }
  });
}

/* ════════════════════════════════════════════════════════════

   ════════════════════════════════════════════════════════════ */
function runElementAction(action) {
  if (!action || !action.operation) return;
  const op = action.operation;
  const vars = state.project.variables || {};

  try {
    if (op === 'setVariable') {
      const varDef = vars[action.variable];
      let val = action.value;
      if (varDef && varDef.type === 'number') val = Number(val);
      else if (varDef && varDef.type === 'boolean') val = val === 'true' || val === true;
      setRuntimeVar(action.variable, val);
    } else if (op === 'incrementVariable') {
      const current = Number(getRuntimeVar(action.variable) || 0);
      const delta = Number(action.value || 1);
      setRuntimeVar(action.variable, current + delta);
    } else if (op === 'toggleVariable') {
      const current = getRuntimeVar(action.variable);
      setRuntimeVar(action.variable, !current);
    } else if (op === 'navigatePage') {
      // In preview mode within the builder
      if (action.pageId && state.project) {
        state.project.currentPageId = action.pageId;
        renderCanvas();
      }
    } else if (op === 'openURL') {
      if (action.value) window.open(action.value, '_blank');
    } else if (op === 'showElement') {
      const node = document.querySelector('[data-id="' + action.targetId + '"]');
      if (node) node.style.display = '';
    } else if (op === 'hideElement') {
      const node = document.querySelector('[data-id="' + action.targetId + '"]');
      if (node) node.style.display = 'none';
    } else if (op === 'toggleElement') {
      const node = document.querySelector('[data-id="' + action.targetId + '"]');
      if (node) node.style.display = node.style.display === 'none' ? '' : 'none';
    } else if (op === 'alert') {
      alert(action.value || '');
    } else if (op === 'runFunction') {
      /* eslint-disable no-new-func */
      const fn = new Function('vars', 'getRuntimeVar', 'setRuntimeVar',
        'try {' + (action.value || '') + '} catch(e){console.error("Action error:",e)}');
      fn(vars, getRuntimeVar, setRuntimeVar);
    }
  } catch (e) {
    console.error('Action error:', e);
  }
}

/* Run all actions for a given trigger on an element */
function runActionsForTrigger(el, trigger) {
  const actions = el.props && el.props.actions;
  if (!actions) return;
  actions.filter(a => a.trigger === trigger).forEach(a => runElementAction(a));
}

/* Check conditional visibility for all elements on canvas */
function checkConditionalVisibility() {
  const page = currentPage();
  if (!page) return;
  page.elements.forEach(el => {
    const vw = el.props && el.props.visibleWhen;
    if (!vw || !vw.variable) return;
    const node = document.querySelector('[data-id="' + el.id + '"]');
    if (!node) return;
    const val = getRuntimeVar(vw.variable);
    let show = true;
    const op = vw.operator || '==';
    const cmp = vw.value;
    if (op === '==') show = String(val) === String(cmp);
    else if (op === '!=') show = String(val) !== String(cmp);
    else if (op === '>') show = Number(val) > Number(cmp);
    else if (op === '<') show = Number(val) < Number(cmp);
    else if (op === '>=') show = Number(val) >= Number(cmp);
    else if (op === '<=') show = Number(val) <= Number(cmp);
    else if (op === 'truthy') show = !!val;
    else if (op === 'falsy') show = !val;
    node.style.display = show ? '' : 'none';
  });
}

function renderCanvas() {
  const canvas = $('#canvas');
  const page = currentPage();
  if (!page) { canvas.innerHTML = ''; return; }

  // Apply canvas width from project settings (default 1024)
  const cw = (state.project && state.project.canvasWidth) || 1024;
  canvas.style.width = cw + 'px';
  updateSizeButtons();

  // Clear except page label
  canvas.innerHTML = '<div class="page-label" id="pageLabel">' + escapeHtml(page.name) + '</div>';
  canvas.style.background = page.bgImage ? `url("${page.bgImage}") center/cover no-repeat, ${page.bg}` : page.bg;

  page.elements.forEach(el => {
    try {
      const node = renderElement(el);
      if (node) canvas.appendChild(node);
    } catch (e) {
      console.error('renderElement error for', el.type, el.id, ':', e);
      // Fallback: show a placeholder box
      const fb = document.createElement('div');
      fb.className = 'el' + (el.id === state.selectedEl ? ' selected' : '');
      fb.dataset.id = el.id;
      fb.style.cssText = `left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${el.h}px;background:#fee;border:2px dashed #f87171;display:flex;align-items:center;justify-content:center;font-size:11px;color:#f87171;`;
      fb.textContent = el.type + ' (render error)';
      canvas.appendChild(fb);
    }
  });

  // After render, run onLoad actions and check visibility (only for elements that HAVE conditions)
  if (state.mode === 'preview') {
    try {
      page.elements.forEach(el => {
        try { runActionsForTrigger(el, 'onLoad'); } catch(e) {}
      });
      checkConditionalVisibility();
    } catch(e) { console.error('Preview post-render error:', e); }
    requestAnimationFrame(updatePreviewScale);
  }
}

function renderElement(el) {
  const p = el.props;
  const node = document.createElement('div');
  node.className = 'el el-' + el.type + (el.id === state.selectedEl ? ' selected' : '');
  node.dataset.id = el.id;
  node.style.left = el.x + 'px';
  node.style.top = el.y + 'px';
  node.style.width = el.w + 'px';
  node.style.height = (p.sizing === 'auto' ? 'auto' : el.h + 'px');
  if (p.fullWidth) { node.classList.add('full-width'); node.style.left = '0'; node.style.width = '100%'; }
  if (p.minHeight) node.style.minHeight = p.minHeight + 'px';
  if (p.padding) node.style.padding = p.padding + 'px';

  // Common effects
  if (p.opacity !== undefined && p.opacity !== 1) node.style.opacity = p.opacity;
  if (p.rotation) node.style.transform = `rotate(${p.rotation}deg)`;
  if (p.zIndex) node.style.zIndex = p.zIndex;
  if (p.hidden) node.style.opacity = '0.3';

  // Shadow
  if (p.shadowEnabled) {
    const shadow = `${p.shadowX}px ${p.shadowY}px ${p.shadowBlur}px ${p.shadowColor}`;
    if (el.type === 'heading' || el.type === 'text') node.style.textShadow = shadow;
    else node.style.boxShadow = shadow;
  }

  // Border
  if (p.borderEnabled) {
    node.style.border = `${p.borderWidth}px ${p.borderStyle} ${p.borderColor}`;
  }

  // Animation on page load (in preview/viewer mode only)
  if (p.animation && p.animation !== 'none' && state.mode !== 'edit') {
    node.style.animation = `wf-${p.animation} ${p.animationDuration}ms ${p.animationDelay}ms both`;
  }

  if (el.type === 'heading' || el.type === 'text') {
    node.textContent = (typeof interpolateVars === 'function') ? interpolateVars(p.text) : p.text;
    node.style.fontSize = p.fontSize + 'px';
    node.style.fontWeight = p.fontWeight;
    node.style.textAlign = p.align;
    node.style.fontFamily = p.fontFamily || 'Inter';
    if (p.lineHeight) node.style.lineHeight = p.lineHeight;
    if (p.letterSpacing) node.style.letterSpacing = p.letterSpacing + 'px';
    if (p.italic) node.style.fontStyle = 'italic';
    if (p.underline) node.style.textDecoration = 'underline';
    if (p.bg) node.style.background = p.bg;
    if (p.textGradient) {
      node.style.backgroundImage = `linear-gradient(${p.textGradientAngle||90}deg, ${p.textGradientFrom}, ${p.textGradientTo})`;
      node.style.webkitBackgroundClip = 'text';
      node.style.backgroundClip = 'text';
      node.style.webkitTextFillColor = 'transparent';
      node.style.color = 'transparent';
    } else {
      node.style.color = p.color;
    }
  } else if (el.type === 'button') {
    node.textContent = p.text;
    node.style.fontSize = p.fontSize + 'px';
    node.style.color = p.color;
    node.style.fontWeight = p.fontWeight;
    node.style.borderRadius = p.radius + 'px';
    if (p.gradientEnabled) {
      node.style.background = `linear-gradient(${p.gradientAngle}deg, ${p.gradientFrom}, ${p.gradientTo})`;
    } else if (p.variant === 'outline') {
      node.style.background = 'transparent';
      node.style.border = `2px solid ${p.bg}`;
      node.style.color = p.bg;
    } else if (p.variant === 'ghost') {
      node.style.background = 'transparent';
    } else {
      node.style.background = p.bg;
    }
    if (p.hoverLift) node.dataset.hoverLift = '1';
    if (p.hoverScale) node.dataset.hoverScale = '1';
    if (p.hoverGlow) node.dataset.hoverGlow = '1';
    // Wire up button actions in preview mode
    if (state.mode === 'preview') {
      node.style.cursor = 'pointer';
      node.addEventListener('click', (e) => {
        e.stopPropagation();
        // Legacy linkPage / link support
        if (p.linkPage) { state.project.currentPageId = p.linkPage; renderCanvas(); return; }
        if (p.link) { window.open(p.link, '_blank'); return; }
        // New actions system
        runActionsForTrigger(el, 'onClick');
      });
      node.addEventListener('mouseenter', () => runActionsForTrigger(el, 'onHover'));
    }
  } else if (el.type === 'image') {
    if (p.src) {
      const filter = buildImageFilter(p);
      node.innerHTML = `<img src="${escapeAttr(p.src)}" alt="${escapeAttr(p.alt || '')}" style="object-fit:${p.fit || 'cover'};filter:${filter}">`;
    }
    node.style.borderRadius = p.radius + 'px';
    node.style.overflow = 'hidden';
  } else if (el.type === 'shape') {
    const bg = p.gradientEnabled
      ? `linear-gradient(${p.gradientAngle}deg, ${p.gradientFrom}, ${p.gradientTo})`
      : p.bg;
    if (p.shapeType === 'circle') {
      node.style.background = bg;
      node.style.borderRadius = '50%';
    } else if (p.shapeType === 'triangle') {
      node.style.background = 'transparent';
      node.innerHTML = `<div style="width:0;height:0;border-left:${el.w/2}px solid transparent;border-right:${el.w/2}px solid transparent;border-bottom:${el.h}px solid ${p.bg}"></div>`;
    } else if (p.shapeType === 'star') {
      node.style.background = 'transparent';
      node.innerHTML = `<svg viewBox="0 0 24 24" style="width:100%;height:100%" preserveAspectRatio="none"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="${p.bg}"/></svg>`;
    } else if (p.shapeType === 'arrow') {
      node.style.background = 'transparent';
      node.innerHTML = `<svg viewBox="0 0 24 24" style="width:100%;height:100%" preserveAspectRatio="none"><path d="M5 12h14M13 5l7 7-7 7" stroke="${p.bg}" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    } else if (p.shapeType === 'line') {
      node.style.background = 'transparent';
      node.innerHTML = `<div style="width:100%;height:${p.borderWidth||3}px;background:${p.bg};margin-top:${(el.h-3)/2}px"></div>`;
    } else {
      node.style.background = bg;
      node.style.borderRadius = p.radius + 'px';
    }
  } else if (el.type === 'input') {
    const isPreview = state.mode === 'preview';
    const inputEl = document.createElement('input');
    inputEl.className = 'el-input-field';
    inputEl.placeholder = p.placeholder || '';
    inputEl.style.cssText = `font-size:${p.fontSize}px;border-radius:${p.radius}px;background:${p.bg||'#fff'};color:${p.color||'#1a1a1a'}`;
    // Input type based on saveKey variable type
    if (p.saveKey && state.project && state.project.variables) {
      const varDef = state.project.variables[p.saveKey];
      if (varDef && varDef.type === 'number') inputEl.type = 'number';
    }
    if (!isPreview) inputEl.readOnly = true;
    // Load saved value
    if (p.saveKey && state.project) {
      const currentVal = getRuntimeVar(p.saveKey);
      if (currentVal !== undefined) inputEl.value = currentVal;
    }
    if (isPreview && p.saveKey) {
      // Validation
      if (p.required) inputEl.required = true;
      if (p.minVal !== undefined && p.minVal !== '') inputEl.min = p.minVal;
      if (p.maxVal !== undefined && p.maxVal !== '') inputEl.max = p.maxVal;
      if (p.pattern) inputEl.pattern = p.pattern;
      inputEl.addEventListener('input', () => {
        setRuntimeVar(p.saveKey, inputEl.value);
      });
      inputEl.addEventListener('change', () => {
        runActionsForTrigger(el, 'onClick');
      });
    }
    node.appendChild(inputEl);
  } else if (el.type === 'icon') {
    const path = ICONS[p.name] || ICONS.star;
    const paths = path.split(/(?<=[a-zA-Z])\s+(?=[a-zA-Z])|(?<=Z)(?=M)/).map(p => `<path d="${p}"/>`).join('');
    node.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="${p.color}" stroke-width="${p.strokeWidth||2}" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%">${paths}</svg>`;
  } else if (el.type === 'divider') {
    node.innerHTML = `<div style="width:100%;height:${p.thickness}px;background:${p.color};border-top:${p.thickness}px ${p.style} ${p.color};margin-top:${Math.max(0,(el.h-p.thickness)/2)}px"></div>`;
  } else if (el.type === 'video') {
    if (p.youtubeId) {
      node.innerHTML = `<iframe src="https://www.youtube.com/embed/${escapeAttr(p.youtubeId)}?rel=0${p.autoplay?'&autoplay=1&mute=1':''}" style="width:100%;height:100%;border:0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    } else {
      node.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`;
    }
  } else if (el.type === 'navbar') {
    const pages = state.project ? state.project.pages : [];
    const links = pages.map(pg => `<a href="#" style="color:${p.color};text-decoration:none;font-size:${p.fontSize}px;font-weight:${p.fontWeight};padding:6px 12px;border-radius:6px;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,.12)'" onmouseout="this.style.background='transparent'">${escapeHtml(pg.name)}</a>`).join('');
    node.style.background = p.bg;
    node.style.display = 'flex';
    node.style.alignItems = 'center';
    node.style.padding = '0 20px';
    node.style.gap = '8px';
    node.innerHTML = `<div style="font-weight:800;font-size:${p.fontSize+2}px;color:${p.accentColor};flex:0 0 auto;margin-right:16px">${escapeHtml(p.siteName)}</div><div style="display:flex;gap:4px;align-items:center">${links}</div>`;
  } else if (el.type === 'countdown') {
    node.style.background = p.bg;
    node.style.borderRadius = p.radius + 'px';
    node.style.display = 'flex';
    node.style.flexDirection = 'column';
    node.style.alignItems = 'center';
    node.style.justifyContent = 'center';
    node.style.padding = '16px';
    const cdId = 'cd_' + el.id;
    node.innerHTML = `<div style="font-size:12px;color:${p.color};opacity:.7;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${escapeHtml(p.label)}</div><div id="${cdId}" style="display:flex;gap:12px"></div>`;
    if (state.mode !== 'edit') {
      const renderCD = () => {
        const el2 = document.getElementById(cdId);
        if (!el2) return;
        const diff = Math.max(0, new Date(p.targetDate).getTime() - Date.now());
        const d = Math.floor(diff/86400000), h = Math.floor(diff/3600000)%24, m = Math.floor(diff/60000)%60, s = Math.floor(diff/1000)%60;
        const unit = (v,l) => `<div style="text-align:center"><div style="font-size:${p.fontSize}px;font-weight:800;color:${p.color};line-height:1">${String(v).padStart(2,'0')}</div><div style="font-size:11px;color:${p.color};opacity:.6;margin-top:4px">${l}</div></div><div style="font-size:${p.fontSize}px;font-weight:800;color:${p.accentColor};line-height:1;padding:0 2px">:</div>`;
        el2.innerHTML = unit(d,'DAYS')+unit(h,'HRS')+unit(m,'MIN')+'<div style="text-align:center"><div style="font-size:'+p.fontSize+'px;font-weight:800;color:'+p.color+';line-height:1">'+String(s).padStart(2,'0')+'</div><div style="font-size:11px;color:'+p.color+';opacity:.6;margin-top:4px">SEC</div></div>';
      };
      renderCD();
      const iv = setInterval(renderCD, 1000);
      node._cdInterval = iv;
    } else {
      const cdEl = node.querySelector('#' + cdId);
      if (cdEl) { const unit = (v,l) => `<div style="text-align:center"><div style="font-size:${p.fontSize}px;font-weight:800;color:${p.color};line-height:1">${v}</div><div style="font-size:11px;color:${p.color};opacity:.6;margin-top:4px">${l}</div></div><div style="font-size:${p.fontSize}px;font-weight:800;color:${p.accentColor};line-height:1;padding:0 2px">:</div>`; cdEl.innerHTML = unit('30','DAYS')+unit('12','HRS')+unit('45','MIN')+'<div style="text-align:center"><div style="font-size:'+p.fontSize+'px;font-weight:800;color:'+p.color+';line-height:1">00</div><div style="font-size:11px;color:'+p.color+';opacity:.6;margin-top:4px">SEC</div></div>'; }
    }
  } else if (el.type === 'contactform') {
    node.style.background = p.bg;
    node.style.borderRadius = p.radius + 'px';
    node.style.padding = '24px';
    node.style.overflow = 'auto';
    const fieldStyle = `width:100%;padding:8px 12px;background:${p.inputBg};border:1px solid #e0e0e0;border-radius:${p.radius/2}px;font-size:14px;color:${p.color};margin-bottom:10px;box-sizing:border-box;outline:none;font-family:inherit`;
    const btnStyle = `background:${p.accentColor};color:#fff;border:none;padding:10px 20px;border-radius:${p.radius/2}px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit`;
    const formId = 'cf_' + el.id;
    node.innerHTML = `<div style="font-size:18px;font-weight:700;color:${p.color};margin-bottom:14px">${escapeHtml(p.title)}</div><form id="${formId}"><input type="text" name="name" placeholder="Your Name" style="${fieldStyle}" required><input type="email" name="email" placeholder="Email Address" style="${fieldStyle}" required><textarea name="message" placeholder="Your message..." style="${fieldStyle}height:80px;resize:none" required></textarea><button type="submit" style="${btnStyle}">${escapeHtml(p.submitLabel)}</button><div class="cf-msg" style="margin-top:10px;font-size:13px;color:${p.accentColor};display:none">Message sent! We'll be in touch.</div></form>`;
    if (state.mode !== 'edit') {
      const form = node.querySelector('#' + formId);
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submission = { name: form.name.value, email: form.email.value, message: form.message.value, ts: Date.now() };
        // Save locally
        const saved = JSON.parse(localStorage.getItem(p.storageKey) || '[]');
        saved.push(submission);
        localStorage.setItem(p.storageKey, JSON.stringify(saved));
        // Also save to server
        try {
          await fetch('/api/data/submissions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ projectId: state.project && state.project.id, submission })
          });
        } catch (err) {}
        form.reset();
        const msg = form.querySelector('.cf-msg');
        if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 4000); }
        runActionsForTrigger(el, 'onClick');
      });
    } else {
      const inputs = node.querySelectorAll('input,textarea,button');
      inputs.forEach(i => { if (i.tagName !== 'BUTTON') i.setAttribute('readonly','readonly'); });
    }
  } else if (el.type === 'carousel') {
    node.style.borderRadius = p.radius + 'px';
    node.style.overflow = 'hidden';
    node.style.background = '#111';
    const imgs = p.images || [];
    const carId = 'car_' + el.id;
    const dotHtml = imgs.map((_,i) => `<div style="width:8px;height:8px;border-radius:50%;background:${i===0?'#fff':'rgba(255,255,255,.4)'};cursor:pointer;transition:background .2s" data-dot="${i}"></div>`).join('');
    node.innerHTML = `<div id="${carId}" style="position:relative;width:100%;height:100%"><div class="car-track" style="display:flex;width:${imgs.length*100}%;height:100%;transition:transform .4s ease">${imgs.map(src=>`<img src="${escapeAttr(src)}" style="width:${100/imgs.length}%;height:100%;object-fit:${p.fit||'cover'};flex-shrink:0">`).join('')}</div><button onclick="event.stopPropagation();this.closest('[id]').dispatchEvent(new CustomEvent('car-prev'))" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center">&lsaquo;</button><button onclick="event.stopPropagation();this.closest('[id]').dispatchEvent(new CustomEvent('car-next'))" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center">&rsaquo;</button><div style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px">${dotHtml}</div></div>`;
    if (state.mode !== 'edit' && imgs.length > 1) {
      const car = node.querySelector('#' + carId);
      let idx = 0;
      const go = (n) => {
        idx = ((n % imgs.length) + imgs.length) % imgs.length;
        car.querySelector('.car-track').style.transform = `translateX(-${idx*100/imgs.length}%)`;
        car.querySelectorAll('[data-dot]').forEach((d,i) => d.style.background = i===idx?'#fff':'rgba(255,255,255,.4)');
      };
      car.addEventListener('car-prev', () => go(idx-1));
      car.addEventListener('car-next', () => go(idx+1));
      car.querySelectorAll('[data-dot]').forEach(d => d.addEventListener('click', (e) => { e.stopPropagation(); go(+d.dataset.dot); }));
      if (p.autoplay) { const iv = setInterval(() => go(idx+1), p.interval || 3000); node._carInterval = iv; }
    }
  } else if (el.type === 'accordion') {
    node.style.background = p.bg;
    node.style.borderRadius = p.radius + 'px';
    node.style.overflow = 'hidden';
    node.style.border = `1px solid ${p.borderColor}`;
    const items = p.items || [];
    node.innerHTML = items.map((item, i) => `
      <div class="acc-item" data-acc="${i}" style="border-bottom:${i<items.length-1?`1px solid ${p.borderColor}`:'none'}">
        <div class="acc-q" style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;font-weight:600;color:${p.color};font-size:14px;user-select:none">
          <span>${escapeHtml(item.q)}</span>
          <svg class="acc-icon" viewBox="0 0 24 24" fill="none" stroke="${p.accentColor}" stroke-width="2" style="width:16px;height:16px;flex-shrink:0;transition:transform .2s"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="acc-a" style="display:none;padding:0 16px 14px;font-size:14px;color:${p.color};opacity:.75;line-height:1.6">${escapeHtml(item.a)}</div>
      </div>
    `).join('');
    if (state.mode !== 'edit') {
      node.querySelectorAll('.acc-q').forEach(q => {
        q.addEventListener('click', (e) => {
          e.stopPropagation();
          const item = q.closest('.acc-item');
          const ans = item.querySelector('.acc-a');
          const icon = item.querySelector('.acc-icon');
          const open = ans.style.display !== 'none';
          ans.style.display = open ? 'none' : 'block';
          if (icon) icon.style.transform = open ? '' : 'rotate(180deg)';
        });

      linkedin: '<path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>',
      youtube: '<path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/>',
      tiktok: '<path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.67a8.18 8.18 0 0 0 4.78 1.52V6.73a4.85 4.85 0 0 1-1.01-.04z"/>'
    };
    const links = p.links || {};
    const sz = p.size || 36;
    const iconHtml = Object.entries(SOCIAL_ICONS).map(([name, path]) => {
      const url = links[name] || '';
      return `<a href="${state.mode !== 'edit' && url ? escapeAttr(url) : '#'}" ${state.mode !== 'edit' && url ? 'target="_blank"' : ''} style="display:flex;align-items:center;justify-content:center;width:${sz}px;height:${sz}px;border-radius:${p.radius||8}px;background:${p.color}22;color:${p.color};text-decoration:none;transition:all .15s" onmouseover="this.style.background='${p.color}';this.style.color='#fff'" onmouseout="this.style.background='${p.color}22';this.style.color='${p.color}'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:${Math.round(sz*.54)}px;height:${Math.round(sz*.54)}px">${path}</svg></a>`;
    }).join('');
    node.innerHTML = iconHtml;
  } else if (el.type === 'mapembed') {
    node.style.borderRadius = p.radius + 'px';
    node.style.overflow = 'hidden';
    if (p.embedUrl) {
      node.innerHTML = `<iframe src="${escapeAttr(p.embedUrl)}" style="width:100%;height:100%;border:0" allowfullscreen loading="lazy"></iframe>`;
    } else {
