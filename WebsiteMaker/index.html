    if (act === 'dup') {
      const copy = JSON.parse(JSON.stringify(el));
      copy.id = uid();
      copy.x += 20; copy.y += 20;
      currentPage().elements.push(copy);
      state.selectedEl = copy.id;
      snapshotProject(); markDirty(); renderAll();
    } else if (act === 'front') {
      executeAITool('layer_order', { id: el.id, action: 'front' });
      snapshotProject(); renderAll();
    } else if (act === 'back') {
      executeAITool('layer_order', { id: el.id, action: 'back' });
      snapshotProject(); renderAll();
    } else if (act === 'center') {
      el.x = Math.round((1024 - el.w) / 2);
      snapshotProject(); markDirty(); renderAll();
    } else if (act === 'lock') {
      el.props.locked = !el.props.locked;
      snapshotProject(); markDirty(); renderAll();
    } else if (act === 'del') {
      snapshotProject();
      deleteElement(el.id);
    }
  }));
  }, 300); // 300ms delay prevents the selecting click from hitting toolbar buttons
}

/* ════════════════════════════════════════════════════════════
   CANVAS INTERACTION: click / drag / resize
   ════════════════════════════════════════════════════════════ */
let drag = null;

function initCanvas() {
  const canvas = $('#canvas');

  canvas.addEventListener('mousedown', (e) => {
    if (state.mode !== 'edit') return;

    const handle = e.target.classList.contains('el-handle') ? e.target : null;
    const elNode = e.target.closest('.el');

    // Don't interfere with inline editor
    if (e.target.getAttribute('contenteditable') === 'true') return;

    if (handle && elNode) {
      const el = findElement(elNode.dataset.id);
      if (el.props.locked) return;
      drag = {
        kind: 'resize',
        handle: handle.dataset.handle,
        el,
        startX: e.clientX,
        startY: e.clientY,
        origX: el.x, origY: el.y, origW: el.w, origH: el.h
      };
      e.preventDefault();
      return;
    }

    if (elNode) {
      const el = findElement(elNode.dataset.id);
      const wasSelected = state.selectedEl === el.id;
      state.selectedEl = el.id;
      // Ripple
      spawnRipple(e.clientX, e.clientY, elNode);
      if (!wasSelected) SFX.select();
      if (!el.props.locked) {
        drag = {
          kind: 'move',
          el,
          startX: e.clientX,
          startY: e.clientY,
          origX: el.x, origY: el.y,
          snapTargets: computeSnapTargets(el)
        };
      }
      renderAll();
      e.preventDefault();
      return;
    }

    // Clicked empty canvas
    state.selectedEl = null;
    renderAll();
  });

  // Double-click to edit text inline
  canvas.addEventListener('dblclick', (e) => {
    if (state.mode !== 'edit') return;
    const elNode = e.target.closest('.el');
    if (!elNode) return;
    const el = findElement(elNode.dataset.id);
    if (!el || el.props.locked) return;
    if (el.type === 'heading' || el.type === 'text' || el.type === 'button') {
      beginInlineEdit(el, elNode);
    }
  });

  document.addEventListener('mousemove', (e) => {
    if (!drag) return;
    const dx = e.clientX - drag.startX;
    const dy = e.clientY - drag.startY;

    if (drag.kind === 'move') {
      let nx = Math.max(0, Math.round(drag.origX + dx));
      let ny = Math.max(0, Math.round(drag.origY + dy));
      const el = drag.el;
      // Snap to alignment targets
      const t = drag.snapTargets;
      let showX = null, showY = null;
      const snappedL = snapValue(nx, t.x);
      const snappedR = snapValue(nx + el.w, t.x);
      const snappedC = snapValue(nx + el.w/2, t.x);
      if (snappedL !== null) { nx = snappedL; showX = snappedL; }
      else if (snappedR !== null) { nx = snappedR - el.w; showX = snappedR; }
      else if (snappedC !== null) { nx = Math.round(snappedC - el.w/2); showX = snappedC; }
      const snappedT = snapValue(ny, t.y);
      const snappedB = snapValue(ny + el.h, t.y);
      const snappedM = snapValue(ny + el.h/2, t.y);
      if (snappedT !== null) { ny = snappedT; showY = snappedT; }
      else if (snappedB !== null) { ny = snappedB - el.h; showY = snappedB; }
      else if (snappedM !== null) { ny = Math.round(snappedM - el.h/2); showY = snappedM; }
      drag.el.x = nx; drag.el.y = ny;
      showGuides(showX, showY);
    } else if (drag.kind === 'resize') {
      const h = drag.handle;
      let x = drag.origX, y = drag.origY, w = drag.origW, hh = drag.origH;
      if (h.includes('e')) w = Math.max(20, drag.origW + dx);
      if (h.includes('w')) { w = Math.max(20, drag.origW - dx); x = drag.origX + (drag.origW - w); }
      if (h.includes('s')) hh = Math.max(20, drag.origH + dy);
      if (h.includes('n')) { hh = Math.max(20, drag.origH - dy); y = drag.origY + (drag.origH - hh); }
      drag.el.x = Math.round(x); drag.el.y = Math.round(y);
      drag.el.w = Math.round(w); drag.el.h = Math.round(hh);
    }
    renderCanvas();
    renderElToolbar();
  });

  document.addEventListener('mouseup', () => {
    if (!drag) return;
    const wasDrag = Math.abs(drag.el.x - drag.origX) > 0 || Math.abs(drag.el.y - drag.origY) > 0
                 || (drag.kind === 'resize');
    drag = null;
    clearGuides();
    if (wasDrag) { snapshotProject(); SFX.drop(); }
    markDirty();
    renderRightPanel();
  });

  // Sidebar insert buttons — event delegation for reliability
  const sidebar = $('.sidebar');
  if (sidebar) {
    sidebar.addEventListener('click', (e) => {
      const btn = e.target.closest('.element-btn');
      if (!btn || !btn.dataset.type) return;
      if (state.view !== 'builder') return;
      const type = btn.dataset.type;
      addElement(type);
    });
  }
}

function beginInlineEdit(el, elNode) {
  elNode.classList.add('editing');
  elNode.setAttribute('contenteditable', 'true');
  elNode.focus();
  // Select all
  const range = document.createRange();
  range.selectNodeContents(elNode);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  const finish = () => {
    elNode.removeAttribute('contenteditable');
    elNode.classList.remove('editing');
    const newText = elNode.textContent;
    if (newText !== el.props.text) {
      el.props.text = newText;
      snapshotProject();
      markDirty();
      renderRightPanel();
    }
    renderCanvas();
  };
  elNode.addEventListener('blur', finish, { once: true });
  elNode.addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); elNode.blur(); }
    if (ev.key === 'Escape') { elNode.textContent = el.props.text; elNode.blur(); }
  });
}

/* ════════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
   ════════════════════════════════════════════════════════════ */
function initKeyboard() {
  document.addEventListener('keydown', (e) => {
    const isEditing = e.target.matches('input, textarea, select, [contenteditable="true"]');
    if (isEditing) return;
    if (state.view !== 'builder') return;

    const mod = e.metaKey || e.ctrlKey;

    if (e.key === '?' && e.shiftKey) { e.preventDefault(); showShortcutsHelp(); return; }
    if (mod && e.key === 's') { e.preventDefault(); saveProject(); return; }
    if (mod && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
    if (mod && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
    if (mod && e.key === 'c') { e.preventDefault(); copySelected(); return; }
    if (mod && e.key === 'v') { e.preventDefault(); pasteClipboard(); return; }
    if (mod && e.key === 'd') {
      e.preventDefault();
      const el = selectedElement();
      if (el) {
        const copy = JSON.parse(JSON.stringify(el));
        copy.id = uid();
        copy.x += 20; copy.y += 20;
        currentPage().elements.push(copy);
        state.selectedEl = copy.id;
        snapshotProject(); markDirty(); renderAll();
      }
      return;
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (state.selectedEl) {
        e.preventDefault();
        snapshotProject();
        deleteElement(state.selectedEl);
      }
    }
    if (e.key === 'Escape') {
      if (state.mode === 'preview') togglePreview();
      else { state.selectedEl = null; renderAll(); }
    }
    // Arrow nudge
    if (state.selectedEl && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      e.preventDefault();
      const el = findElement(state.selectedEl);
      const step = e.shiftKey ? 10 : 1;
      if (e.key === 'ArrowLeft') el.x -= step;
      if (e.key === 'ArrowRight') el.x += step;
      if (e.key === 'ArrowUp') el.y -= step;
      if (e.key === 'ArrowDown') el.y += step;
      markDirty(); renderCanvas(); renderElToolbar();
    }
  });
}

function setCanvasWidth(w) {
  if (!state.project) return;
  state.project.canvasWidth = w;
  markDirty();
  renderCanvas();
  // If in preview mode, re-scale
  if (state.mode === 'preview') requestAnimationFrame(updatePreviewScale);
}

function updateSizeButtons() {
  const cw = (state.project && state.project.canvasWidth) || 1024;
  const btns = { 1024: '#btnSizeDesktop', 768: '#btnSizeTablet', 375: '#btnSizeMobile' };
  for (const [w, sel] of Object.entries(btns)) {
    const el = $(sel);
    if (el) el.classList.toggle('on', Number(w) === cw);
  }
}

function updatePreviewScale() {
  if (state.mode !== 'preview') return;
  const wrap = $('#canvasWrap');
  const canvas = $('#canvas');
  if (!wrap || !canvas) return;
  const cw = (state.project && state.project.canvasWidth) || 1024;
  const available = wrap.clientWidth;
  const scale = Math.min(1, available / cw);
  canvas.style.transform = scale < 1 ? `scale(${scale})` : '';
  canvas.style.transformOrigin = 'top center';
  // Collapse whitespace created by scaling down
  canvas.style.marginBottom = scale < 1 ? `-${canvas.scrollHeight * (1 - scale)}px` : '';
}

function updateViewerScale() {
  const wrap = document.querySelector('.viewer-body');
  const canvas = $('#viewerCanvas');
  if (!wrap || !canvas) return;
  const proj = state.viewerProject || state.project;
  const cw = (proj && proj.canvasWidth) || 1024;
  canvas.style.width = cw + 'px';
  const available = wrap.clientWidth;
  const scale = Math.min(1, available / cw);
  canvas.style.transform = scale < 1 ? `scale(${scale})` : '';
  canvas.style.transformOrigin = 'top center';
  canvas.style.marginBottom = scale < 1 ? `-${canvas.scrollHeight * (1 - scale)}px` : '';
}

function togglePreview() {
  state.mode = state.mode === 'edit' ? 'preview' : 'edit';
  document.body.classList.toggle('preview', state.mode === 'preview');
  state.selectedEl = null;
  $('#btnPreview').classList.toggle('on', state.mode === 'preview');
  if (state.mode === 'preview') {
    // Reset runtime vars to project defaults when entering preview
    state.runtimeVars = {};
    // Jump to first page on preview start
    state.project.currentPageId = state.project.pages[0].id;
  }
  renderAll();
  if (state.mode === 'preview') {
    // Use rAF so the layout has settled before measuring
    requestAnimationFrame(updatePreviewScale);
  }
}

function showModal(html) {
  $('#modal').innerHTML = html;

function closeModal() { $('#modalBg').classList.remove('open'); SFX.close(); }

$('#modalBg').addEventListener('click', (e) => {

});

function showProjectsModal() {
  const cards = state.projects.length === 0
    ? '<div class="proj-empty">No projects yet. Click New to create one.</div>'
    : '<div class="proj-grid">' + state.projects.map(p => `
        <div class="proj-card" data-id="${p.id}">
          <button class="proj-card-del" data-del="${p.id}" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="proj-card-name">${escapeHtml(p.name)}</div>
          <div class="proj-card-meta">${p.pages.length} page${p.pages.length===1?'':'s'} · ${formatDate(p.updatedAt)}</div>
        </div>`).join('') + '</div>';

  showModal(`
    <h3>My Projects</h3>
    <p class="modal-desc">Open, create, or delete website projects.</p>
    ${cards}
    <div class="modal-btns">
      <button class="modal-btn modal-btn-secondary" id="mClose">Close</button>
      <button class="modal-btn modal-btn-primary" id="mNew">New Project</button>
    </div>
  `);

  $('#mClose').addEventListener('click', closeModal);
  $('#mNew').addEventListener('click', () => {
    const name = prompt('Project name:', 'My Website');
    if (!name) return;
    if (state.dirty) saveProject();
    const proj = NEW_PROJECT(name);
    proj.currentPageId = proj.pages[0].id;
    state.project = proj;
    state.projects.push(proj);
    state.selectedEl = null;
    saveAll();
    closeModal();
    renderAll();
    toast('Created "' + name + '"', 'ok');
  });
  $$('.proj-card').forEach(c => c.addEventListener('click', (e) => {
    if (e.target.closest('[data-del]')) return;
    const p = state.projects.find(x => x.id === c.dataset.id);
    if (!p) return;
    if (state.dirty) saveProject();
    state.project = p;
    if (!p.currentPageId) p.currentPageId = p.pages[0].id;
    if (!p.theme) p.theme = { accent: '#4285f4', font: 'Inter' };
    if (p.variables) p.variables = migrateVariables(p.variables);
    state.selectedEl = null;
    state.runtimeVars = {};
    closeModal();
    renderAll();
  }));
  $$('[data-del]').forEach(b => b.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = b.dataset.del;
    const p = state.projects.find(x => x.id === id);
    if (!confirm('Delete "' + p.name + '"? This cannot be undone.')) return;
    state.projects = state.projects.filter(x => x.id !== id);
    saveAll();
    if (state.project && state.project.id === id) {
      if (state.projects.length === 0) {
        const np = NEW_PROJECT();
        np.currentPageId = np.pages[0].id;
        state.projects.push(np);
        state.project = np;
      } else {
        state.project = state.projects[0];
      }
    }
    renderAll();
    showProjectsModal();
  }));
}

function showAccountModal() {
  if (state.user.email) {
    showModal(`
      <h3>Account</h3>
      <div class="logged-in-view">
        <div class="logged-in-avatar">${(state.user.name||'U').charAt(0).toUpperCase()}</div>
        <div class="logged-in-email">${escapeHtml(state.user.name)}</div>
        <div class="logged-in-sub">${escapeHtml(state.user.email)}</div>
        <div class="sync-status">
          <div class="dot"></div>
          <span>Cloud synced · ${state.projects.length} project${state.projects.length===1?'':'s'}</span>
        </div>
      </div>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-secondary" id="aClose">Close</button>
        <button class="modal-btn modal-btn-secondary" id="aLogout">Sign Out</button>
      </div>
    `);
    $('#aClose').addEventListener('click', closeModal);
    $('#aLogout').addEventListener('click', () => {
      if (state.dirty) saveProject();
      state.user = { email: null, name: 'Guest' };
      saveUser();
      loadAll();
      ensureProject();
      closeModal();
      renderAll();
      toast('Signed out', 'ok');
    });
    return;
  }

  showModal(`
    <h3>Sign In</h3>
    <p class="modal-desc">Your projects sync with your account.</p>
    <div class="auth-tabs">
      <button class="auth-tab active" data-auth="in">Sign In</button>
      <button class="auth-tab" data-auth="up">Create Account</button>
    </div>
    <div class="modal-field">
      <label>Email</label>
      <input type="email" id="aEmail" placeholder="you@example.com">
    </div>
    <div class="modal-field" id="aNameField" style="display:none">
      <label>Name</label>
      <input type="text" id="aName" placeholder="Your Name">
    </div>
    <div class="modal-field">
      <label>Password</label>
      <input type="password" id="aPass" placeholder="••••••••">
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-secondary" id="aClose">Cancel</button>
      <button class="modal-btn modal-btn-primary" id="aSubmit">Sign In</button>
    </div>
  `);

  let mode = 'in';
  $$('.auth-tab').forEach(t => t.addEventListener('click', () => {
    mode = t.dataset.auth;
    $$('.auth-tab').forEach(x => x.classList.toggle('active', x === t));
    $('#aNameField').style.display = mode === 'up' ? 'block' : 'none';
    $('#aSubmit').textContent = mode === 'up' ? 'Create Account' : 'Sign In';
  }));
  $('#aClose').addEventListener('click', closeModal);
  $('#aSubmit').addEventListener('click', () => {
    const email = $('#aEmail').value.trim().toLowerCase();
    const pass = $('#aPass').value;
    const name = $('#aName') ? $('#aName').value.trim() : '';
    if (!email || !pass) { toast('Enter email & password', 'err'); return; }
    if (mode === 'up' && !name) { toast('Enter your name', 'err'); return; }
    if (!email.includes('@')) { toast('Invalid email', 'err'); return; }
    if (pass.length < 4) { toast('Password too short', 'err'); return; }

    // Save current guest work first
    if (state.dirty && state.project) saveProject();

    const accountsKey = 'wf_accounts';
    let accounts = {};
    try { accounts = JSON.parse(localStorage.getItem(accountsKey) || '{}'); } catch(e){}

    if (mode === 'up') {
      if (accounts[email]) { toast('Account already exists', 'err'); return; }
      accounts[email] = { name, pass: hash(pass), created: Date.now() };
      localStorage.setItem(accountsKey, JSON.stringify(accounts));
      state.user = { email, name };
      saveUser();

      // Migrate guest projects
      const guestProjs = JSON.parse(localStorage.getItem('wf_projects_guest') || '[]');
      if (guestProjs.length) {
        localStorage.setItem('wf_projects_' + email, JSON.stringify(guestProjs));
        toast('Moved ' + guestProjs.length + ' project(s) to your account', 'ok');
      } else {
        toast('Account created', 'ok');
      }
    } else {
      const acc = accounts[email];
      if (!acc || acc.pass !== hash(pass)) { toast('Wrong email or password', 'err'); return; }
      state.user = { email, name: acc.name };
      saveUser();
      toast('Welcome back, ' + acc.name, 'ok');
    }
    loadAll();
    ensureProject();
    closeModal();
    renderAll();
  });
}

function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return String(h);
}

function exportSite() {
  const html = generateExportHTML();
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.project.name || 'site').toLowerCase().replace(/[^a-z0-9]+/g, '-') + '.html';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported ' + a.download, 'ok');
}

function generateExportHTML() {

    // Serialize variable defaults for export (convert typed to simple)

  }

  return `<!DOCTYPE html>

<title>${escapeHtml(proj.name)}</title>

<style>

  window.addEventListener('resize',scalePages);

</head>
<body>
${proj.pages.map((p, i) => pageHtml(p, i === 0)).join('\n')}
<script>
(function(){
  /* ── Runtime variable store ── */
  const DEFAULTS=${JSON.stringify(exportVarDefaults)};
  const SITE_ID=${JSON.stringify(proj.id)};
  const vars={};
  // Load from localStorage, fall back to project defaults
  for(const k of Object.keys(DEFAULTS)){
    const stored=localStorage.getItem('site_var_'+SITE_ID+'_'+k);
    vars[k]=stored!==null?stored:DEFAULTS[k];
  }
  function getVar(k){return vars[k]}
  function setVar(k,v){
    vars[k]=v;
    localStorage.setItem('site_var_'+SITE_ID+'_'+k,String(v));
    updateTextTemplates();
    checkVisibility();
  }

  /* ── Variable interpolation in text elements ── */
  function interpText(tpl){
    return tpl.replace(/\\{\\{(\\w+)\\}\\}/g,(_,n)=>vars[n]!==undefined?vars[n]:('{{'+n+'}}'));
  }
  function updateTextTemplates(){
    document.querySelectorAll('[data-tpl]').forEach(el=>{
      el.innerHTML=interpText(el.dataset.tpl).replace(/\\n/g,'<br>');
    });
  }

  /* ── Conditional visibility ── */
  function checkVisibility(){
    document.querySelectorAll('[data-vw]').forEach(el=>{
      try{
        const vw=JSON.parse(el.dataset.vw);
        if(!vw||!vw.variable)return;
        const val=vars[vw.variable];
        const op=vw.operator||'==';
        let show=true;
        if(op=='==')show=String(val)==String(vw.value);
        else if(op=='!=')show=String(val)!=String(vw.value);
        else if(op=='>')show=Number(val)>Number(vw.value);
        else if(op=='<')show=Number(val)<Number(vw.value);
        else if(op=='>=')show=Number(val)>=Number(vw.value);
        else if(op=='<=')show=Number(val)<=Number(vw.value);
        else if(op=='truthy')show=!!val&&val!=='false'&&val!=='0';
        else if(op=='falsy')show=!val||val==='false'||val==='0';
        el.style.display=show?'':'none';
      }catch(e){}
    });
  }

  /* ── Action runner ── */
  function show(id){document.querySelectorAll('.page').forEach(p=>p.style.display=p.dataset.page===id?'':'none');window.scrollTo(0,0)}
  function runAction(act){
    const op=act.operation;
    if(op==='setVariable'){setVar(act.variable,act.value);}
    else if(op==='incrementVariable'){setVar(act.variable,Number(getVar(act.variable)||0)+Number(act.value||1));}
    else if(op==='toggleVariable'){setVar(act.variable,!(getVar(act.variable)==='true'||getVar(act.variable)===true));}
    else if(op==='navigatePage'&&act.pageId){show(act.pageId);}
    else if(op==='openURL'&&act.value){window.open(act.value,'_blank');}
    else if(op==='showElement'){const t=document.getElementById('el_'+act.targetId);if(t)t.style.display='';}
    else if(op==='hideElement'){const t=document.getElementById('el_'+act.targetId);if(t)t.style.display='none';}
    else if(op==='toggleElement'){const t=document.getElementById('el_'+act.targetId);if(t)t.style.display=t.style.display==='none'?'':'none';}
    else if(op==='alert'){alert(act.value||'');}
    else if(op==='runFunction'){try{new Function('vars','getVar','setVar',act.value||'')(vars,getVar,setVar);}catch(e){console.error(e);}}
  }
  function runActions(el,trigger){
    try{
      const acts=JSON.parse(el.dataset.actions||'[]');
      acts.filter(a=>a.trigger===trigger).forEach(runAction);
    }catch(e){}
  }

  /* ── Wire all elements with actions ── */
  document.querySelectorAll('[data-actions]').forEach(el=>{
    el.addEventListener('click',e=>{
      // Legacy support
      if(el.dataset.goto){show(el.dataset.goto);return;}
      if(el.dataset.link){window.open(el.dataset.link,'_blank');return;}
      runActions(el,'onClick');
    });
    el.addEventListener('mouseenter',()=>runActions(el,'onHover'));
  });

  /* ── Wire buttons without actions (legacy goto/link) ── */
  document.querySelectorAll('[data-goto]').forEach(b=>{
    if(!b.dataset.actions)
      b.addEventListener('click',e=>{e.preventDefault();show(b.dataset.goto)});
  });
  document.querySelectorAll('[data-link]').forEach(b=>{
    if(!b.dataset.actions)
      b.addEventListener('click',()=>window.open(b.dataset.link,'_blank'));
  });

  /* ── Navbar: wire page links ── */
  const pages=document.querySelectorAll('.page');
  document.querySelectorAll('.wf-navbar').forEach(nav=>{
    const linksDiv=nav.querySelector('.wf-nav-links');
    if(!linksDiv)return;
    pages.forEach(pg=>{
      const name=pg.dataset.pageName||pg.dataset.page;
      const a=document.createElement('a');
      a.href='#';a.textContent=name;
      a.style.cssText='color:inherit;text-decoration:none;padding:6px 12px;border-radius:6px;font-size:14px;font-weight:600;transition:background .15s';
      a.addEventListener('mouseover',()=>a.style.background='rgba(255,255,255,.12)');
      a.addEventListener('mouseout',()=>a.style.background='transparent');
      a.addEventListener('click',e=>{e.preventDefault();show(pg.dataset.page)});
      linksDiv.appendChild(a);
    });
  });

  /* ── Input save-key: read from vars, write to vars ── */
  document.querySelectorAll('[data-save-key]').forEach(inp=>{
    const k=inp.dataset.saveKey;if(!k)return;
    const v=localStorage.getItem('site_var_'+SITE_ID+'_'+k);
    if(v!==null)inp.value=v;
    else if(vars[k]!==undefined)inp.value=vars[k];
    inp.addEventListener('input',()=>setVar(k,inp.value));
  });

  /* ── Contact forms ── */
  document.querySelectorAll('form[data-cf-key]').forEach(form=>{
    form.addEventListener('submit',async e=>{
      e.preventDefault();
      const k=form.dataset.cfKey;
      const data={name:form.name.value,email:form.email.value,message:form.message.value,ts:Date.now()};
      try{const saved=JSON.parse(localStorage.getItem(k)||'[]');saved.push(data);localStorage.setItem(k,JSON.stringify(saved));}catch(ex){}
      try{await fetch('/api/data/submissions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({projectId:SITE_ID,submission:data})});}catch(ex){}
      form.reset();
      const msg=form.querySelector('.cf-msg');
      if(msg){msg.style.display='block';setTimeout(()=>msg.style.display='none',4000);}
    });
  });

  /* ── Carousels ── */
  document.querySelectorAll('[id^="car_"]').forEach(car=>{
    let idx=0;
    const track=car.querySelector('.car-track');
    const dots=car.querySelectorAll('[data-dot]');
    const imgs=car.querySelectorAll('img');
    const total=imgs.length;
    if(!total)return;
    const go=n=>{idx=((n%total)+total)%total;track.style.transform='translateX(-'+(idx*100/total)+'%)';dots.forEach((d,i)=>d.style.background=i===idx?'#fff':'rgba(255,255,255,.4)');};
    car.querySelector('.car-prev')&&car.querySelector('.car-prev').addEventListener('click',e=>{e.stopPropagation();go(idx-1);});
    car.querySelector('.car-next')&&car.querySelector('.car-next').addEventListener('click',e=>{e.stopPropagation();go(idx+1);});
    dots.forEach(d=>d.addEventListener('click',e=>{e.stopPropagation();go(+d.dataset.dot);}));
    if(car.dataset.autoplay==='1')setInterval(()=>go(idx+1),+car.dataset.interval||3000);
  });

  /* ── Accordions ── */
  document.querySelectorAll('.acc-q').forEach(q=>{
    q.addEventListener('click',e=>{
      e.stopPropagation();
      const item=q.closest('.acc-item');
      const ans=item.querySelector('.acc-a');
      const icon=item.querySelector('.acc-icon');
      const open=ans.style.display!=='none';
      ans.style.display=open?'none':'block';
      if(icon)icon.style.transform=open?'':'rotate(180deg)';
    });
  });

  /* ── Tabs ── */
  document.querySelectorAll('.wf-tabs-header').forEach(header=>{
    const accent=header.dataset.accent||'#4285f4';
    const color=header.dataset.color||'#1a1a1a';
    header.querySelectorAll('.wf-tab-btn').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        const idx=+btn.dataset.ti;
        const container=header.closest('.el');
        header.querySelectorAll('.wf-tab-btn').forEach((b,i)=>{b.style.background=i===idx?accent:'transparent';b.style.color=i===idx?'#fff':color;});
        container.querySelectorAll('.wf-tab-panel').forEach((p,i)=>p.style.display=i===idx?'':'none');
      });
    });
  });

  /* ── Alert dismiss ── */
  document.querySelectorAll('.wf-dismiss').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();btn.closest('.wf-alert').style.display='none';});
  });

  /* ── Social icon hover ── */
  document.querySelectorAll('.wf-social-icon').forEach(a=>{
    const col=a.dataset.color||'#4285f4';
    a.addEventListener('mouseover',()=>{a.style.background=col;a.style.color='#fff';});
    a.addEventListener('mouseout',()=>{a.style.background=col+'22';a.style.color=col;});
  });

  /* ── Progress bars (animate on load) ── */
  document.querySelectorAll('[id^="pb_"]').forEach(bar=>{
    const t=bar.dataset.target||0;
    setTimeout(()=>bar.style.width=t+'%',200);
  });

  /* ── Animated counters ── */
  document.querySelectorAll('.wf-animcounter').forEach(wrap=>{
    const bar=wrap.querySelector('[id^="ac_"]');
    if(!bar)return;
    const target=+wrap.dataset.target||0;
    const dur=+wrap.dataset.duration||2000;
    const start=performance.now();
    const tick=now=>{
      const t=Math.min(1,(now-start)/dur);
      const ease=t<.5?2*t*t:-1+(4-2*t)*t;
      bar.textContent=Math.round(ease*target).toLocaleString();
      if(t<1)requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });

  /* ── Countdown timers ── */
  document.querySelectorAll('[id^="cd_"]').forEach(cdEl=>{
    const wrap=cdEl.closest('[data-cd-target]');
    if(!wrap)return;
    const targetDate=wrap.dataset.cdTarget;
    if(!targetDate)return;
    const color=wrap.dataset.cdColor||'#fff';
    const accent=wrap.dataset.cdAccent||'#4285f4';
    const sz=wrap.dataset.cdSize||36;
    const unit=(v,l)=>'<div style="text-align:center"><div style="font-size:'+sz+'px;font-weight:800;color:'+color+';line-height:1">'+String(v).padStart(2,'0')+'</div><div style="font-size:11px;color:'+color+';opacity:.6;margin-top:4px">'+l+'</div></div><div style="font-size:'+sz+'px;font-weight:800;color:'+accent+';line-height:1;padding:0 2px">:</div>';
    const render=()=>{const diff=Math.max(0,new Date(targetDate).getTime()-Date.now());const d=Math.floor(diff/86400000),h=Math.floor(diff/3600000)%24,m=Math.floor(diff/60000)%60,s=Math.floor(diff/1000)%60;cdEl.innerHTML=unit(d,'DAYS')+unit(h,'HRS')+unit(m,'MIN')+'<div style="text-align:center"><div style="font-size:'+sz+'px;font-weight:800;color:'+color+';line-height:1">'+String(s).padStart(2,'0')+'</div><div style="font-size:11px;color:'+color+';opacity:.6;margin-top:4px">SEC</div></div>';};
    render();setInterval(render,1000);
  });

  /* ── Initialize: run onLoad actions + check visibility + interpolate text ── */
  updateTextTemplates();
  checkVisibility();
  document.querySelectorAll('[data-actions]').forEach(el=>runActions(el,'onLoad'));
})();
<\/script>
</body>
</html>`;
}

function computeEffectsStyle(p) {
  const parts = [];
  if (p.opacity !== undefined && p.opacity !== 1) parts.push(`opacity:${p.opacity}`);
  if (p.rotation) parts.push(`transform:rotate(${p.rotation}deg)`);
  if (p.zIndex) parts.push(`z-index:${p.zIndex}`);
  if (p.shadowEnabled) parts.push(`box-shadow:${p.shadowX}px ${p.shadowY}px ${p.shadowBlur}px ${p.shadowColor}`);
  if (p.borderEnabled) parts.push(`border:${p.borderWidth}px ${p.borderStyle} ${p.borderColor}`);
  return parts.length ? parts.join(';') + ';' : '';
}

function renderElementStatic(el) {
  const p = el.props;
  if (p.hidden) return '';
  // Check conditional visibility using default variable values
  if (p.visibleWhen && p.visibleWhen.variable) {
    const vw = p.visibleWhen;
    const varDef = state.project && state.project.variables && state.project.variables[vw.variable];
    const val = varDef !== undefined ? varValue(varDef) : undefined;
    if (val !== undefined) {
      const op = vw.operator || '=='; let show = true;
      if (op === '==') show = String(val) === String(vw.value);
      else if (op === '!=') show = String(val) !== String(vw.value);
      else if (op === '>') show = Number(val) > Number(vw.value);
      else if (op === '<') show = Number(val) < Number(vw.value);
      else if (op === 'truthy') show = !!val;
      else if (op === 'falsy') show = !val;
      // Don't skip — let runtime handle it; just embed the data
    }
  }
  let pos = `left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${p.sizing==='auto'?'auto':el.h+'px'};`;
  if (p.fullWidth) pos = `left:0;top:${el.y}px;width:100%;height:${p.sizing==='auto'?'auto':el.h+'px'};`;
  if (p.padding) pos += `padding:${p.padding}px;`;
  if (p.minHeight) pos += `min-height:${p.minHeight}px;`;
  const fx = computeEffectsStyle(p);
  const animStyle = (p.animation && p.animation !== 'none') ? `animation:wf-${p.animation} ${p.animationDuration||600}ms ${p.animationDelay||0}ms both;` : '';
  const hoverAttrs = el.type === 'button' ? `${p.hoverLift?' data-hover-lift="1"':''}${p.hoverScale?' data-hover-scale="1"':''}${p.hoverGlow?' data-hover-glow="1"':''}` : '';
  // Embed element ID and action/visibility data for the runtime
  const elId = ` id="el_${el.id}" data-el-id="${el.id}"`;
  const actionsAttr = (p.actions && p.actions.length) ? ` data-actions="${escapeAttr(JSON.stringify(p.actions))}"` : '';
  const vwAttr = (p.visibleWhen && p.visibleWhen.variable) ? ` data-vw="${escapeAttr(JSON.stringify(p.visibleWhen))}"` : '';

  if (el.type === 'heading' || el.type === 'text') {
    let textStyle = `font-size:${p.fontSize}px;font-weight:${p.fontWeight};text-align:${p.align};font-family:${p.fontFamily||'Inter'};padding:8px;`;
    if (p.lineHeight) textStyle += `line-height:${p.lineHeight};`;
    if (p.letterSpacing) textStyle += `letter-spacing:${p.letterSpacing}px;`;
    if (p.italic) textStyle += 'font-style:italic;';
    if (p.underline) textStyle += 'text-decoration:underline;';
    if (p.textGradient) {
      textStyle += `background-image:linear-gradient(${p.textGradientAngle||90}deg,${p.textGradientFrom},${p.textGradientTo});-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;`;
    } else {
      textStyle += `color:${p.color};`;
    }
    if (p.shadowEnabled) textStyle += `text-shadow:${p.shadowX}px ${p.shadowY}px ${p.shadowBlur}px ${p.shadowColor};`;
    const effects = computeEffectsStyle(Object.assign({}, p, {shadowEnabled: false}));
    // Embed original text template for var interpolation
    const tplAttr = (p.text && p.text.includes('{{')) ? ` data-tpl="${escapeAttr(p.text)}"` : '';
    return `<div class="el el-${el.type}"${elId}${vwAttr}${actionsAttr}${tplAttr} style="${pos}${textStyle}${effects}${animStyle}">${escapeHtml(p.text||'').replace(/\n/g,'<br>')}</div>`;
  }
  if (el.type === 'button') {
    let btnStyle = `font-size:${p.fontSize}px;color:${p.color};font-weight:${p.fontWeight};border-radius:${p.radius}px;display:flex;align-items:center;justify-content:center;padding:0 16px;cursor:pointer;`;
    if (p.gradientEnabled) btnStyle += `background:linear-gradient(${p.gradientAngle}deg,${p.gradientFrom},${p.gradientTo});`;
    else if (p.variant === 'outline') btnStyle += `background:transparent;border:2px solid ${p.bg};color:${p.bg};`;
    else if (p.variant === 'ghost') btnStyle += `background:transparent;`;
    else btnStyle += `background:${p.bg};`;
    const attr = p.linkPage ? ` data-goto="${p.linkPage}"` : (p.link ? ` data-link="${escapeAttr(p.link)}"` : '');
    return `<div class="el el-button"${elId}${vwAttr}${actionsAttr} style="${pos}${btnStyle}${fx}${animStyle}"${attr}${hoverAttrs}>${escapeHtml(p.text||'')}</div>`;
  }
  if (el.type === 'image') {
    const filterCss = buildImageFilter(p);
    const imgStyle = `object-fit:${p.fit||'cover'};filter:${filterCss};width:100%;height:100%;display:block;`;
    const inner = p.src ? `<img src="${escapeAttr(p.src)}" alt="${escapeAttr(p.alt||'')}" style="${imgStyle}">` : '';
    return `<div class="el el-image" style="${pos}border-radius:${p.radius}px;overflow:hidden;${fx}${animStyle}">${inner}</div>`;
  }
  if (el.type === 'shape') {
    const bg = p.gradientEnabled
      ? `linear-gradient(${p.gradientAngle}deg,${p.gradientFrom},${p.gradientTo})`
      : p.bg;
    if (p.shapeType === 'circle') {
      return `<div class="el el-shape" style="${pos}background:${bg};border-radius:50%;${fx}${animStyle}"></div>`;
    } else if (p.shapeType === 'triangle') {
      return `<div class="el" style="${pos}${fx}${animStyle}"><div style="width:0;height:0;border-left:${el.w/2}px solid transparent;border-right:${el.w/2}px solid transparent;border-bottom:${el.h}px solid ${p.bg}"></div></div>`;
    } else if (p.shapeType === 'star') {
      return `<div class="el" style="${pos}${fx}${animStyle}"><svg viewBox="0 0 24 24" style="width:100%;height:100%" preserveAspectRatio="none"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="${p.bg}"/></svg></div>`;
    } else if (p.shapeType === 'arrow') {
      return `<div class="el" style="${pos}${fx}${animStyle}"><svg viewBox="0 0 24 24" style="width:100%;height:100%" preserveAspectRatio="none"><path d="M5 12h14M13 5l7 7-7 7" stroke="${p.bg}" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    } else if (p.shapeType === 'line') {
      return `<div class="el" style="${pos}${fx}${animStyle}"><div style="width:100%;height:${p.borderWidth||3}px;background:${p.bg};margin-top:${(el.h-3)/2}px"></div></div>`;
    }
    return `<div class="el el-shape" style="${pos}background:${bg};border-radius:${p.radius}px;${fx}${animStyle}"></div>`;
  }
  if (el.type === 'input') {
    const saveAttr = p.saveKey ? ` data-save-key="${escapeAttr(p.saveKey)}"` : '';
    const reqAttr = p.required ? ' required' : '';
    const inputType = (() => {
      if (p.saveKey && state.project && state.project.variables) {
        const vd = state.project.variables[p.saveKey];
        if (vd && vd.type === 'number') return 'number';
      }
      return 'text';
    })();
    const minAttr = p.minVal !== undefined && p.minVal !== '' ? ` min="${p.minVal}"` : '';
    const maxAttr = p.maxVal !== undefined && p.maxVal !== '' ? ` max="${p.maxVal}"` : '';
    return `<div class="el"${elId}${vwAttr}${actionsAttr} style="${pos}${fx}${animStyle}"><input type="${inputType}" class="el-input-field" placeholder="${escapeAttr(p.placeholder||'')}" style="font-size:${p.fontSize}px;border-radius:${p.radius}px;background:${p.bg||'#fff'};color:${p.color||'#1a1a1a'}"${saveAttr}${reqAttr}${minAttr}${maxAttr}></div>`;
  }
  if (el.type === 'icon') {
    const path = ICONS[p.name] || ICONS.star;
    return `<div class="el"${elId}${vwAttr}${actionsAttr} style="${pos}${fx}${animStyle}"><svg viewBox="0 0 24 24" fill="none" stroke="${p.color}" stroke-width="${p.strokeWidth||2}" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%"><path d="${path}"/></svg></div>`;
  }
  if (el.type === 'divider') {
    return `<div class="el"${elId}${vwAttr} style="${pos}${fx}${animStyle}"><div style="width:100%;height:${p.thickness}px;background:${p.color};border-top:${p.thickness}px ${p.style} ${p.color};margin-top:${Math.max(0,(el.h-p.thickness)/2)}px"></div></div>`;
  }
  if (el.type === 'video') {
    if (p.youtubeId) {
      return `<div class="el" style="${pos}${fx}${animStyle}"><iframe src="https://www.youtube.com/embed/${escapeAttr(p.youtubeId)}?rel=0${p.autoplay?'&autoplay=1&mute=1':''}" style="width:100%;height:100%;border:0" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
    }
    return '';
  }
  if (el.type === 'navbar') {
    const navId = 'nav_' + el.id;
    return `<div class="el wf-navbar" id="${navId}" style="${pos}background:${p.bg};display:flex;align-items:center;padding:0 20px;gap:8px;${fx}${animStyle}"><div style="font-weight:800;font-size:${(p.fontSize||14)+2}px;color:${p.accentColor};flex:0 0 auto;margin-right:16px">${escapeHtml(p.siteName||'Site')}</div><div class="wf-nav-links" style="display:flex;gap:4px;align-items:center"></div></div>`;
  }
  if (el.type === 'countdown') {
    const cdId = 'cd_' + el.id;
    return `<div class="el" style="${pos}background:${p.bg};border-radius:${p.radius||12}px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;${fx}${animStyle}" data-cd-target="${escapeAttr(p.targetDate||'')}" data-cd-color="${escapeAttr(p.color||'#ffffff')}" data-cd-accent="${escapeAttr(p.accentColor||'#4285f4')}" data-cd-size="${p.fontSize||36}"><div style="font-size:12px;color:${p.color};opacity:.7;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${escapeHtml(p.label||'')}</div><div id="${cdId}" style="display:flex;gap:12px"></div></div>`;
  }
  if (el.type === 'contactform') {
    const fieldStyle = `width:100%;padding:8px 12px;background:${p.inputBg||'#f5f5f5'};border:1px solid #e0e0e0;border-radius:${(p.radius||8)/2}px;font-size:14px;color:${p.color};margin-bottom:10px;box-sizing:border-box;outline:none;font-family:inherit`;
    const btnStyle = `background:${p.accentColor||'#4285f4'};color:#fff;border:none;padding:10px 20px;border-radius:${(p.radius||8)/2}px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit`;
    const formId = 'cf_' + el.id;
    return `<div class="el" style="${pos}background:${p.bg||'#fff'};border-radius:${p.radius||8}px;padding:24px;overflow:auto;${fx}${animStyle}"><div style="font-size:18px;font-weight:700;color:${p.color};margin-bottom:14px">${escapeHtml(p.title||'Contact Us')}</div><form id="${formId}" data-cf-key="${escapeAttr(p.storageKey||'')}"><input type="text" name="name" placeholder="Your Name" style="${fieldStyle}" required><input type="email" name="email" placeholder="Email Address" style="${fieldStyle}" required><textarea name="message" placeholder="Your message..." style="${fieldStyle}height:80px;resize:none" required></textarea><button type="submit" style="${btnStyle}">${escapeHtml(p.submitLabel||'Send')}</button><div class="cf-msg" style="margin-top:10px;font-size:13px;color:${p.accentColor||'#4285f4'};display:none">Message sent! We'll be in touch.</div></form></div>`;
  }
  if (el.type === 'carousel') {
    const imgs = p.images || [];

/* ════════════════════════════════════════════════════════════
   UTILITIES
   ════════════════════════════════════════════════════════════ */
function toast(msg, type) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.className = 'toast ' + (type || ''), 2200);
}
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function formatDate(ts) {
  const d = new Date(ts);
  const now = Date.now();
  const diff = (now - ts) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString();
}

   BOOT
   ════════════════════════════════════════════════════════════ */
function ensureProject() {
  if (state.projects.length === 0) {
    const p = NEW_PROJECT();
    p.currentPageId = p.pages[0].id;
    state.projects.push(p);
    state.project = p;
    saveAll();
    return;
  }
  const lastId = localStorage.getItem('wf_last_project_' + (state.user.email || 'guest'));
  const found = lastId && state.projects.find(p => p.id === lastId);
  state.project = found || state.projects[0];
  if (!state.project.currentPageId) state.project.currentPageId = state.project.pages[0].id;
  if (!state.project.theme) state.project.theme = { accent: '#4285f4', font: 'Inter' };
  // Migrate legacy variables to typed format
  if (state.project.variables) {
    state.project.variables = migrateVariables(state.project.variables);
  }
}

const TAB_ICONS = {
  home: `<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  builder: `<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`,
  viewer: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
  search: `<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>`
};

function makeTab(viewState) {
  const title = getTitleForView(viewState);
  return {
    id: 'tab-' + uid(),
    title,
    url: getUrlForView(viewState),
    viewState: { ...viewState },
    history: [{ viewState: { ...viewState }, title, url: getUrlForView(viewState) }],
    historyIdx: 0
  };
}

function getTitleForView(vs) {
  if (vs.view === 'home') return 'Home';
  if (vs.view === 'search') return 'Search' + (vs.query ? ` · ${vs.query}` : '');
  if (vs.view === 'viewer') {
    const p = lookupProject(vs.projectId, vs.owner);
    return p ? p.name : 'Viewing…';
  }
  if (vs.view === 'builder') {
    const p = state.projects.find(x => x.id === vs.projectId);
    return p ? p.name : 'Editor';
  }
  return 'Tab';
}

function slugify(s) {
  return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function getUrlForView(vs) {
  if (vs.view === 'home') return 'webforge.app';
  if (vs.view === 'search') return 'webforge.app/search?q=' + encodeURIComponent(vs.query || '');
  if (vs.view === 'viewer') {
    const p = lookupProject(vs.projectId, vs.owner);
    return 'webforge.app/s/' + (p ? slugify(p.name) : 'unknown');
  }
  if (vs.view === 'builder') {
    const p = state.projects.find(x => x.id === vs.projectId);
    return 'webforge.app/edit/' + (p ? slugify(p.name) : 'new');
  }
  return 'webforge.app';
}

function lookupProject(projectId, ownerKey) {
  let p = state.projects.find(x => x.id === projectId);
  if (p) return p;
  if (!ownerKey) return null;
  try {
    const list = JSON.parse(localStorage.getItem('wf_projects_' + ownerKey) || '[]');
    return list.find(x => x.id === projectId);
  } catch (e) { return null; }
}

function getActiveTab() {
  return state.tabs.find(t => t.id === state.activeTabId) || state.tabs[0];
}

function renderTabStrip() {
  const strip = $('#tabStrip');
  strip.innerHTML = state.tabs.map(t => `
    <div class="tab ${t.id === state.activeTabId ? 'active' : ''}" data-tab="${t.id}">
      <span class="tab-icon">${TAB_ICONS[t.viewState.view] || TAB_ICONS.home}</span>
      <span class="tab-title">${escapeHtml(t.title)}</span>
      <button class="tab-close" data-close="${t.id}" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `).join('') + `
    <button class="tab-add" id="tabAdd" title="New tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  `;
  $$('.tab').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.tab-close')) return;
      switchTab(el.dataset.tab);
    });
  });
  $$('[data-close]').forEach(b => b.addEventListener('click', (e) => {
    e.stopPropagation();
    closeTab(b.dataset.close);
  }));
  $('#tabAdd').addEventListener('click', () => {
    openTabAndSwitch({ view: 'home' });
  });
}

function updateAddressBar() {
  const tab = getActiveTab();
  if (!tab) return;
  $('#addressBar').value = tab.url;
  $('#navBack').disabled = tab.historyIdx <= 0;
  $('#navFwd').disabled = tab.historyIdx >= tab.history.length - 1;
}

function applyActiveTab() {
  const tab = getActiveTab();
  if (!tab) return;
  const vs = tab.viewState;
  const wasBuilder = state.view === 'builder';
  state.view = vs.view;
  document.body.setAttribute('data-view', vs.view);

  // Reset history when switching into a different project
  if (vs.view === 'builder' && (!wasBuilder || (state.project && state.project.id !== vs.projectId))) {
    history.stack = [];
    history.idx = -1;
  }

  // Always close the search results page when navigating
  const srEl = $('#homeSearchResults');
  if (srEl) srEl.classList.remove('visible');
  const hv = $('#homeView');
  if (hv) hv.style.visibility = '';

  if (vs.view === 'home') {
    renderHome();
  } else if (vs.view === 'search') {
    // Home view also handles search — render and apply query
    renderHome();
    if (vs.query) {
      const inp = $('#homeSearch');
      if (inp) { inp.value = vs.query; inp.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true })); }
    }
  } else if (vs.view === 'viewer') {
    state.viewerProject = lookupProject(vs.projectId, vs.owner);
    state.viewerOwner = vs.owner;
    state.viewerPageId = vs.pageId || (state.viewerProject && state.viewerProject.pages[0].id);
    renderViewer();
  } else if (vs.view === 'builder') {
    const p = state.projects.find(x => x.id === vs.projectId);
    if (p) {
      state.project = p;
      if (!p.currentPageId) p.currentPageId = p.pages[0].id;
      state.selectedEl = null;
    }
    renderAll();
    if (history.stack.length === 0) snapshotProject();
  }
  renderTabStrip();
  updateAddressBar();
}

function openTabAndSwitch(viewState) {
  const tab = makeTab(viewState);
  state.tabs.push(tab);
  switchTab(tab.id);
}

function switchTab(tabId) {
  if (tabId === state.activeTabId) return;
  if (state.dirty && state.view === 'builder' && state.project) saveProject();
  state.activeTabId = tabId;
  applyActiveTab();
  saveTabs();
  SFX.tab();
}

function closeTab(tabId) {
  const idx = state.tabs.findIndex(t => t.id === tabId);
  if (idx < 0) return;
  state.tabs.splice(idx, 1);
  if (state.tabs.length === 0) {
    state.tabs.push(makeTab({ view: 'home' }));
  }
  if (state.activeTabId === tabId) {
    const newActive = state.tabs[Math.max(0, idx - 1)];
    state.activeTabId = newActive.id;
  }
  applyActiveTab();
  saveTabs();
}

function navigateCurrentTab(viewState) {
  if (state.dirty && state.view === 'builder' && state.project) saveProject();
  const tab = getActiveTab();
  if (!tab) return openTabAndSwitch(viewState);
  tab.history = tab.history.slice(0, tab.historyIdx + 1);
  tab.viewState = { ...viewState };
  tab.title = getTitleForView(viewState);
  tab.url = getUrlForView(viewState);
  tab.history.push({ viewState: { ...viewState }, title: tab.title, url: tab.url });
  tab.historyIdx = tab.history.length - 1;
  applyActiveTab();
  saveTabs();
}

function tabBack() {
  const tab = getActiveTab();
  if (!tab || tab.historyIdx <= 0) return;
  tab.historyIdx--;
  const entry = tab.history[tab.historyIdx];
  tab.viewState = { ...entry.viewState };
  tab.title = entry.title;
  tab.url = entry.url;
  applyActiveTab();
  saveTabs();
}
function tabFwd() {
  const tab = getActiveTab();
  if (!tab || tab.historyIdx >= tab.history.length - 1) return;
  tab.historyIdx++;
  const entry = tab.history[tab.historyIdx];
  tab.viewState = { ...entry.viewState };
  tab.title = entry.title;
  tab.url = entry.url;
  applyActiveTab();
  saveTabs();
}

function refreshTab() { applyActiveTab(); }

function saveTabs() {
  try {
    localStorage.setItem('wf_tabs', JSON.stringify({
      tabs: state.tabs.map(t => ({ id: t.id, title: t.title, url: t.url, viewState: t.viewState, history: t.history, historyIdx: t.historyIdx })),
      activeTabId: state.activeTabId
    }));
  } catch (e) {}
}
function loadTabs() {
  try {
    const raw = localStorage.getItem('wf_tabs');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.tabs || data.tabs.length === 0) return false;
    state.tabs = data.tabs;
    state.activeTabId = data.activeTabId || data.tabs[0].id;
    return true;
  } catch (e) { return false; }
}

function initBrowserChrome() {
  $('#navBack').addEventListener('click', tabBack);
  $('#navFwd').addEventListener('click', tabFwd);
  $('#navRefresh').addEventListener('click', refreshTab);
  $('#navHomeIcon').addEventListener('click', () => navigateCurrentTab({ view: 'home' }));
  $('#addressBar').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const v = $('#addressBar').value.trim();
      handleAddressInput(v);
    }
  });
  $('#addressBar').addEventListener('focus', e => e.target.select());
}

function handleAddressInput(v) {
  if (!v) return;
  // Match known URL patterns
  const clean = v.replace(/^https?:\/\//, '').replace(/^webforge\.app\/?/, '');
  if (clean === '' || clean === 'home') return navigateCurrentTab({ view: 'home' });
  const searchMatch = clean.match(/^search(?:\?q=)?(.*)/);
  if (searchMatch) {
    const q = decodeURIComponent(searchMatch[1] || '');
    return navigateCurrentTab({ view: 'search', query: q });
  }
  const siteMatch = clean.match(/^s\/(.+)$/);
  if (siteMatch) {
    const slug = siteMatch[1];
    // Find by slug across all published
    const all = [...state.projects.map(p => ({...p, _owner: currentOwnerKey()})), ...loadAllPublished()];
    const match = all.find(p => slugify(p.name) === slug);
    if (match) return navigateCurrentTab({ view: 'viewer', projectId: match.id, owner: match._owner, pageId: match.pages[0].id });
  }
  // Fallback: treat as search
  navigateCurrentTab({ view: 'search', query: v });
}

// Legacy shim: old setView calls still work
function setView(v, data) {
  if (v === 'home') return navigateCurrentTab({ view: 'home' });
  if (v === 'viewer') return navigateCurrentTab({
    view: 'viewer',
    projectId: (state.viewerProject && state.viewerProject.id) || (data && data.projectId),
    owner: state.viewerOwner || (data && data.owner),
    pageId: state.viewerPageId || (data && data.pageId)
  });
  if (v === 'builder') return navigateCurrentTab({
    view: 'builder',
    projectId: state.project && state.project.id
  });
}

function goBuilder(projectId) {
  if (projectId) navigateCurrentTab({ view: 'builder', projectId });
  else if (state.project) navigateCurrentTab({ view: 'builder', projectId: state.project.id });
}

function createAndOpen(name) {
  if (state.dirty && state.project) saveProject();
  const p = NEW_PROJECT(name || 'Untitled Site');
  p.currentPageId = p.pages[0].id;
  state.projects.push(p);
  state.project = p;
  state.selectedEl = null;
  saveAll();
  navigateCurrentTab({ view: 'builder', projectId: p.id });
}

/* ════════════════════════════════════════════════════════════
   CROSS-USER PROJECT DISCOVERY
   ════════════════════════════════════════════════════════════ */
function loadAllPublished() {
  const all = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('wf_projects_')) continue;
    const ownerKey = key.slice('wf_projects_'.length);
    try {
      const list = JSON.parse(localStorage.getItem(key) || '[]');
      for (const p of list) {
        if (p.published) {
          all.push({ ...p, _owner: ownerKey });
        }
      }
    } catch (e) {}
  }
  // Sort by most recently updated
  all.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  return all;
}

function resolveOwnerName(ownerKey) {
  if (ownerKey === 'guest') return 'Guest';
  try {
    const accounts = JSON.parse(localStorage.getItem('wf_accounts') || '{}');
    return (accounts[ownerKey] && accounts[ownerKey].name) || ownerKey.split('@')[0];
  } catch (e) { return ownerKey; }
}

function currentOwnerKey() { return state.user.email || 'guest'; }

function siteCardHTML(project, ownerKey, isMine) {
  const firstPage = project.pages[0];

                (project.published ? '<div class="site-card-badge">Published</div>' : '');

  return `
    <div class="site-card" data-pid="${project.id}" data-owner="${escapeAttr(ownerKey)}">

      <div class="site-card-body">

          <span class="dot"></span>
          <span>${formatDate(project.updatedAt)}</span>
        </div>
      </div>
    </div>
  `;
}

function renderThumbnail(page) {
  // Render a miniature of the page at scale
  const scale = 240 / 1024;  // ~0.234
  const bg = page.bgImage
    ? `background: url("${page.bgImage}") center/cover no-repeat, ${page.bg}`
    : `background: ${page.bg}`;
  const els = page.elements.map(el => {
    return `<div style="position:absolute;left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${el.h}px;${elStyleInline(el)}">${elContentInline(el)}</div>`;
  }).join('');
  return `<div class="site-card-thumb-inner" style="${bg};transform:scale(${scale});width:1024px;height:${1024*10/16}px">${els}</div>`;
}

function elStyleInline(el) {
  const p = el.props;
  const parts = [];
  if (el.type === 'heading' || el.type === 'text') {
    parts.push(`font-size:${p.fontSize}px`, `color:${p.color}`, `font-weight:${p.fontWeight}`, `text-align:${p.align}`, `padding:8px`, `overflow:hidden`);
    if (p.fontFamily) parts.push(`font-family:${p.fontFamily}`);
  } else if (el.type === 'button') {
    parts.push(`font-size:${p.fontSize}px`, `color:${p.color}`, `background:${p.bg}`, `font-weight:${p.fontWeight}`, `border-radius:${p.radius}px`, `display:flex`, `align-items:center`, `justify-content:center`, `padding:0 16px`);
  } else if (el.type === 'shape') {
    parts.push(`background:${p.bg}`, `border-radius:${p.radius}px`);
  } else if (el.type === 'image') {
    parts.push(`background:#eee`, `border-radius:${p.radius}px`, `overflow:hidden`);
  } else if (el.type === 'input') {
    parts.push(`background:#fff`, `border:1px solid #d0d0d0`, `border-radius:${p.radius}px`);
  }
  return parts.join(';');
}

function elContentInline(el) {
  const p = el.props;
  if (el.type === 'heading' || el.type === 'text' || el.type === 'button') return escapeHtml(p.text || '');
  if (el.type === 'image' && p.src) return `<img src="${escapeAttr(p.src)}" style="width:100%;height:100%;object-fit:${p.fit||'cover'}">`;
  return '';
}

function initHomeView() {
  // Use event delegation on homeView for reliability
  const homeView = $('#homeView');

  homeView.addEventListener('click', (e) => {

    if (e.target.closest('#hRefresh')) { renderHome(); return; }
    // Shortcuts
    const shortcut = e.target.closest('.shortcut');
    if (shortcut) {
      SFX.click();
      const act = shortcut.dataset.sc;
      if (act === 'create') createAndOpen('Untitled Site');
      else if (act === 'mine') { navigateCurrentTab({ view: 'builder', projectId: state.project && state.project.id }); setTimeout(showProjectsModal, 100); }
      else if (act === 'favorites') { toast('Favorites coming soon', 'ok'); }
      else if (act === 'trending') { showExploreList('trending'); }
      else if (act === 'explore') { showExploreList('explore'); }

/* ════════════════════════════════════════════════════════════
   CONTENT MODERATION (pattern filter + AI check)
   ════════════════════════════════════════════════════════════ */
const BLOCKED_WORDS = [
  'porn','xxx','nude','naked','nsfw','hentai','erotic','fetish',
  'gore','torture','suicide','cocaine','heroin','meth',
  'terrorist','exploit','onlyfans','escort','stripper','orgasm','viagra'
];
function isSafeText(text) {
  if (!text) return true;
  const lower = String(text).toLowerCase();
  return !BLOCKED_WORDS.some(w => lower.includes(w));
}
function isQuerySafe(q) { return isSafeText(q); }
function filterBasic(results) {
  return results.filter(r => isSafeText(r.title) && isSafeText(r.desc) && isSafeText(r.url));
}

const moderationCache = {};
async function aiModerate(items) {
  if (!serverAiAvailable || items.length === 0) return items.map(() => true);
  const key = items.map(i => i.title + '|' + (i.desc||'').slice(0,60)).join('##');
  if (moderationCache[key]) return moderationCache[key];
  try {
    const list = items.map((r, i) => `${i}: ${r.title} — ${(r.desc||'').slice(0, 120)}`).join('\n');
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 200,
        system: 'You are a content moderator for a family-friendly website builder. Review these search result titles and descriptions. Respond with ONLY a JSON array of 0-based indices that contain genuinely inappropriate content: explicit sexual content, graphic violence, hate speech, instructions for illegal activities, or self-harm promotion. Be permissive — most content (news, sports, history, education, even if dark) is fine. Only flag clearly inappropriate material. Example response: [0,3] or [] if all safe.',
        messages: [{ role: 'user', content: 'Review these results:\n\n' + list }]
      })
    });
    if (!res.ok) return items.map(() => true);
    const data = await res.json();
    const textBlock = (data.content || []).find(c => c.type === 'text');
    if (!textBlock) return items.map(() => true);
    const match = textBlock.text.match(/\[[\d,\s]*\]/);
    if (!match) return items.map(() => true);
    const blocked = JSON.parse(match[0]);
    const allow = items.map((_, i) => !blocked.includes(i));
    moderationCache[key] = allow;
    return allow;
  } catch (e) {
    return items.map(() => true);
  }
}

// Web search APIs (Wikipedia for suggestions, DuckDuckGo for results)
let suggestTimer = null;
const webSuggestCache = {};
function fetchWebSuggestions(query) {
  return new Promise((resolve) => {
    if (!isQuerySafe(query)) { resolve([]); return; }
    if (webSuggestCache[query]) { resolve(webSuggestCache[query]); return; }
    fetch(`https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=5&origin=*`)
      .then(r => r.json())
      .then(async data => {
        const names = data[1] || [];
        const descs = data[2] || [];
        const urls = data[3] || [];
        let results = names.map((n, i) => ({ title: n, desc: descs[i] || '', url: urls[i] || '' }));
        results = filterBasic(results);
        // AI moderation (only if server AI is available)
        if (serverAiAvailable && results.length > 0) {
          const allow = await aiModerate(results);
          results = results.filter((_, i) => allow[i]);
        }
        webSuggestCache[query] = results;
        resolve(results);
      })
      .catch(() => resolve([]));
  });
}

const webResultsCache = {};
function fetchWebResults(query) {
  return new Promise((resolve) => {
    if (!isQuerySafe(query)) { resolve([]); return; }
    if (webResultsCache[query]) { resolve(webResultsCache[query]); return; }
    fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`)
      .then(r => r.json())
      .then(async data => {
        let results = [];
        if (data.AbstractText && data.AbstractURL) {
          results.push({ title: data.Heading || query, url: data.AbstractURL, desc: data.AbstractText });
        }
        if (data.RelatedTopics) {
          for (const t of data.RelatedTopics) {
            if (t.FirstURL && t.Text) {
              results.push({ title: (t.Text.split(' - ')[0] || t.Text).slice(0, 80), url: t.FirstURL, desc: t.Text });
            }
            if (t.Topics) for (const st of t.Topics) {
              if (st.FirstURL && st.Text) results.push({ title: (st.Text.split(' - ')[0] || st.Text).slice(0, 80), url: st.FirstURL, desc: st.Text });
            }
          }
        }
        if (data.Results) for (const r of data.Results) {
          if (r.FirstURL && r.Text) results.push({ title: r.Text, url: r.FirstURL, desc: '' });
        }
        results = filterBasic(results).slice(0, 10);
        if (serverAiAvailable && results.length > 0) {
          const allow = await aiModerate(results);
          results = results.filter((_, i) => allow[i]);
        }
        webResultsCache[query] = results;
        resolve(results);
      })
      .catch(() => resolve([]));
  });
}

function initHomeSearch() {

    for (const p of contentMatches) {
