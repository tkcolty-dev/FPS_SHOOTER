      let snippet = '';
      for (const pg of p.pages) {
        for (const el of pg.elements) {
          const t = el.props && el.props.text;
          if (t && typeof t === 'string' && t.toLowerCase().includes(lower)) {
            const idx = t.toLowerCase().indexOf(lower);
            snippet = '…' + t.slice(Math.max(0, idx - 20), idx + q.length + 40).trim() + '…';
            break;
          }
        }
        if (snippet) break;
      }
      suggs.push({
        kind: 'content',
        title: p.name,
        meta: highlight(snippet, q),
        projectId: p.id,
        owner: p._owner,
        badge: 'CONTENT'
      });
    }

    // AI suggestion
    if (q.length >= 3) {
      suggs.push({
        kind: 'ai',
        title: 'Ask AI: <em>' + escapeHtml(q) + '</em>',
        meta: 'Create a site from this prompt',
        aiPrompt: q
      });
    }

    // Web-style search fallback
    suggs.push({
      kind: 'search',
      title: 'Search sites for "' + escapeHtml(q) + '"',
      meta: 'Show all results',
      query: q
    });

    return suggs;
  };

  const highlight = (text, q) => {
    if (!text || !q) return escapeHtml(text || '');
    const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
    return escapeHtml(text).replace(re, '<mark>$1</mark>');
  };

  const iconFor = (kind) => ({
    site: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
    content: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    ai: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L9.19 8.63 2 9.24l5.45 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2z"/></svg>',
    search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>',
    web: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>'
  }[kind] || '');

  const renderDD = (suggs) => {
    currentSuggs = suggs;
    activeIdx = -1;
    if (!suggs.length) { dd.classList.remove('open'); return; }
    dd.innerHTML = suggs.map((s, i) => `
      <div class="sugg type-${s.kind}" data-idx="${i}">
        <span class="sugg-icon">${iconFor(s.kind)}</span>
        <div class="sugg-body">
          <div class="sugg-title">${s.title}</div>
          ${s.meta ? '<div class="sugg-meta">' + s.meta + '</div>' : ''}
        </div>
        ${s.badge ? '<span class="sugg-badge">' + s.badge + '</span>' : ''}
      </div>
    `).join('');
    dd.classList.add('open');
    dd.querySelectorAll('.sugg').forEach(el => {
      el.addEventListener('click', () => selectSugg(+el.dataset.idx));
      el.addEventListener('mouseenter', () => {
        activeIdx = +el.dataset.idx;
        updateActive();
      });
    });
  };

  const updateActive = () => {
    dd.querySelectorAll('.sugg').forEach((el, i) => {
      el.classList.toggle('active', i === activeIdx);
    });
  };

  const selectSugg = (idx) => {
    const s = currentSuggs[idx];
    if (!s) return;
    dd.classList.remove('open');
    search.value = '';
    if (s.kind === 'site' || s.kind === 'content') {
      openViewer(s.projectId, s.owner);
    } else if (s.kind === 'web') {
      if (s.url) window.open(s.url, '_blank');
      else runSearch(s.query);
    } else if (s.kind === 'ai') {
      // Create a new project and send the AI prompt
      createAndOpen('Untitled Site');
      setTimeout(() => {
        state.rightTab = 'ai';
        renderRightPanel();
        setTimeout(() => {
          const inp = $('#aiInput');
          if (inp) {
            inp.value = s.aiPrompt;
            inp.dispatchEvent(new Event('input'));
            sendAI();
          }
        }, 100);
      }, 200);
    } else if (s.kind === 'search') {
      runSearch(s.query);
    }
  };

  const showSearchResultsPage = (q, results, promotedToShow) => {
    const mineKey = currentOwnerKey();
    const srEl = $('#homeSearchResults');
    const srBody = $('#srBody');
    const srInput = $('#srSearchInput');
    if (!srEl || !srBody) return;

    // Show the results page, hide homeView
    if (srInput) srInput.value = q;
    srEl.classList.add('visible');
    srEl.scrollTop = 0;
    $('#homeView').style.visibility = 'hidden';

    // Ads section
    const adsHTML = promotedToShow.length ? `
      <div class="sr-section-head sponsored">Sponsored</div>
      <div class="sr-ads-row">
        ${promotedToShow.map(p => `
          <div class="ad-card" data-pid="${p.id}" data-owner="${escapeAttr(p._owner)}">
            <div class="ad-card-sponsored">Sponsored · Ad</div>
            <div class="ad-card-name">${escapeHtml(p.name)}</div>
            <div class="ad-card-tag">${escapeHtml(p.adLine || 'Visit now')}</div>
          </div>
        `).join('')}
      </div>` : '';

    // WebForge sites section
    const sitesHTML = `
      <div class="sr-section-head">WebForge Sites</div>
      ${results.length ? `
        <div class="sr-sites-grid">
          ${results.slice(0, 12).map(p => siteCardHTML(p, p._owner, p._owner === mineKey)).join('')}
        </div>` : `<div class="sr-empty">No WebForge sites match "${escapeHtml(q)}"</div>`}
    `;

    srBody.innerHTML = `
      <div class="sr-query-line">Results for "${escapeHtml(q)}"</div>
      <div class="sr-meta-line">${results.length} WebForge site${results.length===1?'':'s'} found · loading web results…</div>
      ${adsHTML}
      ${sitesHTML}
      <div class="sr-section-head web">Web Results</div>
      <div class="sr-web-results" id="srWebResults">
        <div class="sr-loading">Loading from DuckDuckGo…</div>
      </div>
    `;

    // Wire card clicks
    srBody.querySelectorAll('.site-card, .ad-card').forEach(c => c.addEventListener('click', () => {
      closeSearchResultsPage();
      openViewer(c.dataset.pid, c.dataset.owner);
    }));
  };

  const closeSearchResultsPage = () => {
    const srEl = $('#homeSearchResults');
    if (srEl) srEl.classList.remove('visible');
    $('#homeView').style.visibility = '';
    search.value = '';
    dd.classList.remove('open');
  };

  // Wire back button and logo
  const srBack = $('#srBack');
  const srLogo = $('#srLogo');
  const srSearchGo = $('#srSearchGo');
  const srInput2 = $('#srSearchInput');
  if (srBack) srBack.addEventListener('click', closeSearchResultsPage);
  if (srLogo) srLogo.addEventListener('click', closeSearchResultsPage);
  if (srSearchGo) srSearchGo.addEventListener('click', () => {
    const q = srInput2 && srInput2.value.trim();
    if (q) runSearch(q);
  });
  if (srInput2) srInput2.addEventListener('keydown', e => {
    if (e.key === 'Enter' && srInput2.value.trim()) runSearch(srInput2.value.trim());
  });

  const runSearch = async (q) => {
    if (!isQuerySafe(q)) {
      toast('That search is blocked', 'err');
      SFX.err();
      return;
    }
    dd.classList.remove('open');
    const lower = q.toLowerCase();
    const all = getAllSites();
    const results = all.filter(p => {
      const matchName = p.name.toLowerCase().includes(lower);
      const matchText = p.pages.some(pg => pg.elements.some(el => {
        const t = el.props && el.props.text;
        return t && typeof t === 'string' && t.toLowerCase().includes(lower);
      }));
      return matchName || matchText;
    });
    const ads = loadAllPromoted().filter(p => {
      const l = p.name.toLowerCase();
      return l.includes(lower) || (p.adLine||'').toLowerCase().includes(lower) || l.split(' ').some(w => lower.includes(w));
    }).slice(0, 3);
    const promotedToShow = ads.length ? ads : loadAllPromoted().slice(0, 2);

    // Show full-screen results page
    showSearchResultsPage(q, results, promotedToShow);

    // Fetch web results async
    const web = await fetchWebResults(q);
    const wr = $('#srWebResults');
    if (!wr) return;
    // Update meta line
    const metaLine = $('#srBody .sr-meta-line');
    if (metaLine) metaLine.textContent = `${results.length} WebForge site${results.length===1?'':'s'} found · ${web.length} web results`;
    if (web.length === 0) {
      wr.innerHTML = '<div class="sr-loading" style="color:var(--text3)">No web results found</div>';
    } else {
      wr.innerHTML = web.map(r => `
        <a href="${escapeAttr(r.url)}" target="_blank" rel="noopener" class="web-result">
          <div class="web-result-title">${escapeHtml(r.title)}</div>
          <div class="web-result-url">${escapeHtml(r.url.replace(/^https?:\/\//, '').slice(0, 80))}</div>
          ${r.desc ? `<div class="web-result-desc">${escapeHtml(r.desc).slice(0, 180)}${r.desc.length>180?'…':''}</div>` : ''}
        </a>
      `).join('');
    }
  };

  search.addEventListener('input', () => {
    const q = search.value.trim();
    if (!q) { dd.classList.remove('open'); renderHome(); return; }
    // Local suggestions instantly
    const localSuggs = buildSuggestions(q);
    renderDD(localSuggs);
    // Debounced web suggestions from Wikipedia
    clearTimeout(suggestTimer);
    if (q.length >= 2) {
      suggestTimer = setTimeout(async () => {
        if (search.value.trim() !== q) return;
        const web = await fetchWebSuggestions(q);
        if (search.value.trim() !== q) return;
        if (!web.length) return;
        // Merge: local site matches first, then AI prompt, then web suggestions, then search fallback
        const local = localSuggs.filter(s => s.kind === 'site' || s.kind === 'content');
        const ai = localSuggs.filter(s => s.kind === 'ai');
        const fallback = localSuggs.filter(s => s.kind === 'search');
        const webSuggs = web.slice(0, 5).map(w => ({
          kind: 'web',
          title: highlight(w.title, q),
          meta: w.desc ? w.desc.slice(0, 80) : 'Wikipedia',
          url: w.url,
          query: w.title
        }));
        const merged = [...local, ...webSuggs, ...ai, ...fallback];
        renderDD(merged);
      }, 250);
    }
  });
  search.addEventListener('focus', () => {
    if (search.value.trim()) renderDD(buildSuggestions(search.value.trim()));
  });
  search.addEventListener('blur', () => {
    setTimeout(() => dd.classList.remove('open'), 150);
  });
  search.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(currentSuggs.length - 1, activeIdx + 1);
      updateActive();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(-1, activeIdx - 1);
      updateActive();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIdx >= 0) selectSugg(activeIdx);
      else if (search.value.trim()) runSearch(search.value.trim());
      dd.classList.remove('open');
    } else if (e.key === 'Escape') {
      dd.classList.remove('open');
    }
  });
  $('#homeSearchGo').addEventListener('click', () => {
    const q = search.value.trim();
    if (q) runSearch(q);
    dd.classList.remove('open');
  });
}

/* ════════════════════════════════════════════════════════════
   VIEWER VIEW
   ════════════════════════════════════════════════════════════ */
function openViewer(projectId, ownerKey) {
  const p = lookupProject(projectId, ownerKey);
  if (!p) { toast('Site not found', 'err'); return; }
  navigateCurrentTab({ view: 'viewer', projectId, owner: ownerKey, pageId: p.pages[0].id });
}

function openViewerInNewTab(projectId, ownerKey) {
  const p = lookupProject(projectId, ownerKey);
  if (!p) { toast('Site not found', 'err'); return; }
  openTabAndSwitch({ view: 'viewer', projectId, owner: ownerKey, pageId: p.pages[0].id });
}

function renderViewer() {
  const p = state.viewerProject;
  if (!p) { setView('home'); return; }
  $('#vTitle').textContent = p.name;
  const isMine = state.viewerOwner === currentOwnerKey();
  const ownerName = isMine ? 'You' : resolveOwnerName(state.viewerOwner);
  $('#vSub').textContent = 'by ' + ownerName;
  $('#vEdit').style.display = isMine ? '' : 'none';

  const page = p.pages.find(pg => pg.id === state.viewerPageId) || p.pages[0];
  const pageIdx = p.pages.indexOf(page);
  $('#vPagePill').textContent = `${page.name} · ${pageIdx+1} of ${p.pages.length}`;

  const canvas = $('#viewerCanvas');
  canvas.style.background = page.bgImage
    ? `url("${page.bgImage}") center/cover no-repeat, ${page.bg}`
    : page.bg;
  canvas.innerHTML = page.elements.map(el => viewerElementHTML(el)).join('');
  requestAnimationFrame(() => updateViewerScale());

  // Wire up button navigation (updates tab history)
  canvas.querySelectorAll('[data-goto]').forEach(b => {
    b.addEventListener('click', (e) => {
      e.preventDefault();
      const newPageId = b.dataset.goto;
      navigateCurrentTab({
        view: 'viewer',
        projectId: p.id,
        owner: state.viewerOwner,
        pageId: newPageId
      });
    });
  });
  // Wire up interactive components (accordion, tabs, carousel, etc.)
  initComponentsInContainer(canvas, pageId => {
    navigateCurrentTab({ view: 'viewer', projectId: p.id, owner: state.viewerOwner, pageId });
  });
}

function viewerElementHTML(el) {
  return renderElementStatic(el);
}

function initComponentsInContainer(container, gotoFn) {
  // Navbar
  const proj = state.viewerProject || state.project;
  container.querySelectorAll('.wf-navbar').forEach(nav => {
    const linksDiv = nav.querySelector('.wf-nav-links');
    if (!linksDiv) return;
    if (proj) proj.pages.forEach(pg => {
      const a = document.createElement('a');
      a.href = '#'; a.textContent = pg.name;
      a.style.cssText = 'color:inherit;text-decoration:none;padding:6px 12px;border-radius:6px;font-size:14px;font-weight:600;transition:background .15s';
      a.addEventListener('mouseover', () => a.style.background = 'rgba(255,255,255,.12)');
      a.addEventListener('mouseout', () => a.style.background = 'transparent');
      a.addEventListener('click', e => { e.preventDefault(); if (gotoFn) gotoFn(pg.id); });
      linksDiv.appendChild(a);
    });
  });
  // Carousels
  container.querySelectorAll('[id^="car_"]').forEach(car => {
    let idx = 0;
    const track = car.querySelector('.car-track');
    const dots = car.querySelectorAll('[data-dot]');
    const imgs = car.querySelectorAll('img');
    const total = imgs.length;
    if (!total) return;
    const go = n => { idx = ((n % total) + total) % total; track.style.transform = 'translateX(-' + (idx * 100 / total) + '%)'; dots.forEach((d, i) => d.style.background = i === idx ? '#fff' : 'rgba(255,255,255,.4)'); };
    car.querySelector('.car-prev') && car.querySelector('.car-prev').addEventListener('click', e => { e.stopPropagation(); go(idx - 1); });
    car.querySelector('.car-next') && car.querySelector('.car-next').addEventListener('click', e => { e.stopPropagation(); go(idx + 1); });
    dots.forEach(d => d.addEventListener('click', e => { e.stopPropagation(); go(+d.dataset.dot); }));
    if (car.dataset.autoplay === '1') setInterval(() => go(idx + 1), +car.dataset.interval || 3000);
  });
  // Accordions
  container.querySelectorAll('.acc-q').forEach(q => {
    q.addEventListener('click', e => {
      e.stopPropagation();
      const item = q.closest('.acc-item');
      const ans = item.querySelector('.acc-a');
      const icon = item.querySelector('.acc-icon');
      const open = ans.style.display !== 'none';
      ans.style.display = open ? 'none' : 'block';
      if (icon) icon.style.transform = open ? '' : 'rotate(180deg)';
    });
  });
  // Tabs
  container.querySelectorAll('.wf-tabs-header').forEach(header => {
    const accent = header.dataset.accent || '#4285f4';
    const color = header.dataset.color || '#1a1a1a';
    header.querySelectorAll('.wf-tab-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const i = +btn.dataset.ti;
        const cont = header.closest('.el');
        header.querySelectorAll('.wf-tab-btn').forEach((b, j) => { b.style.background = j === i ? accent : 'transparent'; b.style.color = j === i ? '#fff' : color; });
        cont.querySelectorAll('.wf-tab-panel').forEach((p, j) => p.style.display = j === i ? '' : 'none');
      });
    });
  });
  // Alert dismiss
  container.querySelectorAll('.wf-dismiss').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); btn.closest('.wf-alert').style.display = 'none'; });
  });
  // Social icon hover
  container.querySelectorAll('.wf-social-icon').forEach(a => {
    const col = a.dataset.color || '#4285f4';
    a.addEventListener('mouseover', () => { a.style.background = col; a.style.color = '#fff'; });
    a.addEventListener('mouseout', () => { a.style.background = col + '22'; a.style.color = col; });
  });
  // Progress bars
  container.querySelectorAll('[id^="pb_"]').forEach(bar => {
    const t = bar.dataset.target || 0;
    setTimeout(() => bar.style.width = t + '%', 200);
  });
  // Animated counters
  container.querySelectorAll('.wf-animcounter').forEach(wrap => {
    const bar = wrap.querySelector('[id^="ac_"]');
    if (!bar) return;
    const target = +wrap.dataset.target || 0;
    const dur = +wrap.dataset.duration || 2000;
    const start = performance.now();
    const tick = now => {
      const t = Math.min(1, (now - start) / dur);
      const ease = t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      bar.textContent = Math.round(ease * target).toLocaleString();
      if (t < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
  // Countdown timers
  container.querySelectorAll('[id^="cd_"]').forEach(cdEl => {
    const wrap = cdEl.closest('[data-cd-target]');
    if (!wrap) return;
    const targetDate = wrap.dataset.cdTarget;
    if (!targetDate) return;
    const color = wrap.dataset.cdColor || '#fff';
    const accent = wrap.dataset.cdAccent || '#4285f4';
    const sz = wrap.dataset.cdSize || 36;
    const unit = (v, l) => '<div style="text-align:center"><div style="font-size:' + sz + 'px;font-weight:800;color:' + color + ';line-height:1">' + String(v).padStart(2, '0') + '</div><div style="font-size:11px;color:' + color + ';opacity:.6;margin-top:4px">' + l + '</div></div><div style="font-size:' + sz + 'px;font-weight:800;color:' + accent + ';line-height:1;padding:0 2px">:</div>';
    const render = () => { const diff = Math.max(0, new Date(targetDate).getTime() - Date.now()); const d = Math.floor(diff / 86400000), h = Math.floor(diff / 3600000) % 24, m = Math.floor(diff / 60000) % 60, s = Math.floor(diff / 1000) % 60; cdEl.innerHTML = unit(d, 'DAYS') + unit(h, 'HRS') + unit(m, 'MIN') + '<div style="text-align:center"><div style="font-size:' + sz + 'px;font-weight:800;color:' + color + ';line-height:1">' + String(s).padStart(2, '0') + '</div><div style="font-size:11px;color:' + color + ';opacity:.6;margin-top:4px">SEC</div></div>'; };
    render(); setInterval(render, 1000);
  });
  // Contact forms
  container.querySelectorAll('form[data-cf-key]').forEach(form => {
    form.addEventListener('submit', e => {
      e.preventDefault();
      const k = form.dataset.cfKey;
      const data = { name: form.name.value, email: form.email.value, message: form.message.value, ts: Date.now() };
      try { const saved = JSON.parse(localStorage.getItem(k) || '[]'); saved.push(data); localStorage.setItem(k, JSON.stringify(saved)); } catch (ex) { }
      form.reset();
      const msg = form.querySelector('.cf-msg');
      if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 4000); }
    });
  });
}

function initViewerView() {
  $('#vBack').addEventListener('click', () => setView('home'));
  $('#vEdit').addEventListener('click', () => {
    const p = state.viewerProject;
    const isMine = state.viewerOwner === currentOwnerKey();
    if (isMine && p) {
      state.project = state.projects.find(x => x.id === p.id) || p;
      if (!state.project.currentPageId) state.project.currentPageId = state.project.pages[0].id;
      setView('builder');
    }
  });
}

/* ════════════════════════════════════════════════════════════
   PUBLISH
   ════════════════════════════════════════════════════════════ */
function togglePublish() {
  if (!state.project) return;
  showPublishModal();
}

function showPublishModal() {
  const p = state.project;
  showModal(`
    <h3>Publish & Promote</h3>
    <p class="modal-desc">Control visibility of "${escapeHtml(p.name)}" on Explore and search results.</p>
    <div class="modal-field">
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;text-transform:none;letter-spacing:0;color:var(--text)">
        <input type="checkbox" id="pubPublished" ${p.published?'checked':''} style="width:auto;margin:0"> Published (visible on home + search)
      </label>
    </div>
    <div class="modal-field">
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;text-transform:none;letter-spacing:0;color:var(--text)">
        <input type="checkbox" id="pubPromoted" ${p.promoted?'checked':''} style="width:auto;margin:0"> Promote as ad (appears in Sponsored row)
      </label>
    </div>
    <div class="modal-field" id="adLineField" style="${p.promoted?'':'display:none'}">
      <label>Ad Tagline</label>
      <input type="text" id="pubAdLine" placeholder="Visit us today — 50% off!" value="${escapeAttr(p.adLine||'')}">
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-secondary" id="pubCancel">Cancel</button>
      <button class="modal-btn modal-btn-primary" id="pubSave">Save</button>
    </div>
  `);
  $('#pubPromoted').addEventListener('change', (e) => {
    $('#adLineField').style.display = e.target.checked ? '' : 'none';
  });
  $('#pubCancel').addEventListener('click', closeModal);
  $('#pubSave').addEventListener('click', async () => {
    const wantsPublish = $('#pubPublished').checked;
    const wantsPromote = $('#pubPromoted').checked;

    // If turning on publish, run AI content review first
    if (wantsPublish && !p.published) {
      const btn = $('#pubSave');
      btn.textContent = 'Checking content…';
      btn.disabled = true;
      const issues = await reviewSiteContent(p);
      btn.textContent = 'Save';
      btn.disabled = false;
      if (issues.length > 0) {
        showContentIssuesModal(p, issues);
        return;
      }
    }

    p.published = wantsPublish;
    p.promoted = wantsPromote;
    p.adLine = $('#pubAdLine').value.trim();
    if (p.promoted && !p.published) p.published = true;
    markDirty();
    saveProject();
    updatePublishButton();
    closeModal();
    const status = p.promoted ? 'Published & promoted' : (p.published ? 'Published' : 'Unpublished');
    toast(status, 'ok');
    if (p.published) SFX.publish(); else SFX.close();
  });
}

/* ════════════════════════════════════════════════════════════
   PUBLISH CONTENT REVIEW (AI checks for inappropriate content)
   ════════════════════════════════════════════════════════════ */
async function reviewSiteContent(project) {
  // Gather all text content from the project
  const allText = [];
  for (const page of project.pages) {
    allText.push('--- Page: ' + page.name + ' ---');
    for (const el of page.elements) {
      const t = el.props && el.props.text;
      if (t && typeof t === 'string' && t.trim()) {
        allText.push(`[${el.type}] ${t}`);
      }
      if (el.props && el.props.adLine) allText.push(`[ad] ${el.props.adLine}`);
      if (el.props && el.props.placeholder) allText.push(`[input placeholder] ${el.props.placeholder}`);
    }
  }
  if (project.adLine) allText.push('[site ad tagline] ' + project.adLine);

  if (allText.length <= project.pages.length) {
    // No real text content, skip review
    return [];
  }

  // Basic word filter first
  const basicIssues = [];
  for (const line of allText) {
    if (!isSafeText(line)) {
      basicIssues.push({ text: line.slice(0, 100), reason: 'Contains blocked words' });
    }
  }
  if (basicIssues.length > 0) return basicIssues;

  // AI review via server
  if (!serverAiAvailable) return [];

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'openai/gpt-oss-120b',
        max_tokens: 500,
        system: `You review websites for a builder app. Your job: approve ALMOST EVERYTHING. Only reject content that is clearly and intentionally harmful.

REJECT ONLY these (must be obvious and intentional, not accidental or ambiguous):
- Pornographic content (explicit sex acts described in detail)
- Direct threats of violence against real people
- Racial slurs used to attack a group
- Step-by-step instructions for making weapons/drugs
- Content encouraging self-harm or suicide

APPROVE EVERYTHING ELSE including: business sites, games, blogs, portfolios, restaurants, stores, apps, fiction, humor, dark humor, mild profanity, opinions, placeholder text like "Lorem ipsum", template text like "Your Heading Here" or "Click Me", pricing pages, login forms, any normal website content.

IMPORTANT: Default to APPROVED. If you're unsure, approve it. Template/placeholder text is ALWAYS fine. Short generic text like "Welcome", "Get Started", "Contact Us" is ALWAYS fine.

Respond with ONLY valid JSON:
{"approved": true, "issues": []}
OR if genuinely harmful:
{"approved": false, "issues": [{"text": "exact problematic text", "reason": "why"}]}`,
        messages: [{ role: 'user', content: 'Site: "' + project.name + '"\n\nContent:\n' + allText.join('\n') }]
      })
    });

    if (!res.ok) return []; // If AI fails, allow publish

    const data = await res.json();
    const textBlock = (data.content || []).find(c => c.type === 'text');
    if (!textBlock) return [];

    // Parse the JSON response
    const jsonMatch = textBlock.text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) return [];
    const result = JSON.parse(jsonMatch[0]);

    if (result.approved) return [];
    return (result.issues || []).map(i => ({
      text: i.text || 'Unknown content',
      reason: i.reason || 'Flagged as inappropriate'
    }));
  } catch (e) {
    console.error('Review error:', e);
    return []; // On error, allow publish
  }
}

function showContentIssuesModal(project, issues) {
  const issueRows = issues.map(i => `
    <div style="background:var(--input-bg);border-left:3px solid var(--red);border-radius:6px;padding:12px 14px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:var(--red);margin-bottom:4px">Issue found</div>
      <div style="font-size:12px;color:var(--text);margin-bottom:6px;font-family:ui-monospace,monospace;background:rgba(0,0,0,.2);padding:6px 8px;border-radius:4px;word-break:break-all">${escapeHtml(i.text)}</div>
      <div style="font-size:12px;color:var(--text2)">${escapeHtml(i.reason)}</div>
    </div>
  `).join('');

  showModal(`
    <h3 style="color:var(--red)">Content Review Failed</h3>
    <p class="modal-desc">Your site contains content that can't be published. Please fix the issues below and try again.</p>
    ${issueRows}
    <div style="background:var(--panel-2);border-radius:8px;padding:14px;margin-top:14px">
      <div style="font-size:12px;color:var(--text2);line-height:1.5">
        <strong style="color:var(--text)">How to fix:</strong> Go back to the editor, find the flagged content, and edit or remove it. Then try publishing again.
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-primary" id="issueClose">Go Fix It</button>
    </div>
  `);
  SFX.err();
  $('#issueClose').addEventListener('click', closeModal);
}

function updatePublishButton() {
  const btn = $('#btnPublish');
  const label = $('#publishLabel');
  if (!btn || !label) return;
  const on = state.project && state.project.published;
  label.textContent = on ? 'Published' : 'Publish';
  btn.classList.toggle('on', !!on);
}

function init() {
  try {
  loadUser();
  loadAll();
  ensureProject();
  } catch (e) { console.error('Load error:', e); }
  checkServerAi().then(() => {
    if (state.rightTab === 'ai' && state.view === 'builder') renderRightPanel();
  }).catch(() => {});
  try { initTopBar(); } catch(e) { console.error('initTopBar error:', e); }
  try { initCanvas(); } catch(e) { console.error('initCanvas error:', e); }
  try { initKeyboard(); } catch(e) { console.error('initKeyboard error:', e); }
  try { initHomeView(); } catch(e) { console.error('initHomeView error:', e); }
  try { initViewerView(); } catch(e) { console.error('initViewerView error:', e); }
  try { initBrowserChrome(); } catch(e) { console.error('initBrowserChrome error:', e); }

  // Home button in builder top bar
  $('#btnHome').addEventListener('click', () => navigateCurrentTab({ view: 'home' }));
  $('#btnPublish').addEventListener('click', togglePublish);

  // Sound toggle
  const updateSoundIcon = () => {
    const icon = $('#soundIcon');
    const btn = $('#btnSound');
    if (SFX.isMuted()) {
      icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
      btn.style.color = 'var(--text4)';
    } else {
      icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>';
      btn.style.color = '';
    }
  };
  updateSoundIcon();
  $('#btnHelp').addEventListener('click', showShortcutsHelp);
  $('#btnSound').addEventListener('click', () => {
    SFX.setMuted(!SFX.isMuted());
    updateSoundIcon();
    if (!SFX.isMuted()) SFX.toggle();
    toast(SFX.isMuted() ? 'Sound off' : 'Sound on', 'ok');
  });

  // Restore tabs or create the initial Home tab
  if (!loadTabs()) {
    const homeTab = makeTab({ view: 'home' });
    state.tabs = [homeTab];
    state.activeTabId = homeTab.id;
  }
  applyActiveTab();

  // Auto-save every 30s if dirty
  setInterval(() => {
    if (state.dirty && state.project) saveProject();
  }, 30000);
}

init();
</script>
