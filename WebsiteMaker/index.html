    }
  } else if (el.type === 'progressbar') {
    node.style.display = 'flex';
    node.style.flexDirection = 'column';
    node.style.justifyContent = 'center';
    node.style.gap = '6px';
    const pct = Math.min(100, Math.max(0, p.percent || 0));
    const pbId = 'pb_' + el.id;
    node.innerHTML = `${p.showLabel ? `<div style="display:flex;justify-content:space-between;font-size:${p.fontSize}px;color:${p.color};font-weight:600"><span>${escapeHtml(p.label)}</span><span>${pct}%</span></div>` : ''}<div style="background:${p.bg};border-radius:${p.radius}px;height:${Math.round(el.h * .35)}px;overflow:hidden"><div id="${pbId}" style="height:100%;width:0;background:${p.fillColor};border-radius:${p.radius}px;transition:width .8s cubic-bezier(.4,0,.2,1)"></div></div>`;
    if (state.mode !== 'edit') {
      setTimeout(() => { const bar = document.getElementById(pbId); if (bar) bar.style.width = pct + '%'; }, 100);
    } else {
      const bar = node.querySelector('#' + pbId);
      if (bar) bar.style.width = pct + '%';
    }
  } else if (el.type === 'testimonial') {
    node.style.background = p.bg;
    node.style.borderRadius = p.radius + 'px';
    node.style.padding = '24px';
    node.style.display = 'flex';
    node.style.flexDirection = 'column';
    node.style.justifyContent = 'space-between';
    const avatarHtml = p.avatar ? `<img src="${escapeAttr(p.avatar)}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;margin-right:12px;flex-shrink:0">` : `<div style="width:40px;height:40px;border-radius:50%;background:${p.accentColor};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;margin-right:12px;flex-shrink:0">${(p.author||'A').charAt(0).toUpperCase()}</div>`;
    node.innerHTML = `<div style="font-size:48px;color:${p.accentColor};line-height:.8;font-family:Georgia,serif;margin-bottom:8px">&ldquo;</div><div style="font-size:15px;color:${p.color};line-height:1.6;flex:1;font-style:italic">${escapeHtml(p.quote)}</div><div style="display:flex;align-items:center;margin-top:16px">${avatarHtml}<div><div style="font-weight:700;font-size:14px;color:${p.color}">${escapeHtml(p.author)}</div><div style="font-size:12px;color:${p.accentColor}">${escapeHtml(p.role)}</div></div></div>`;
  } else if (el.type === 'pricingcard') {
    node.style.background = p.bg;
    node.style.borderRadius = p.radius + 'px';
    node.style.padding = '28px 24px';
    node.style.display = 'flex';
    node.style.flexDirection = 'column';
    node.style.overflow = 'hidden';
    if (p.featured) node.style.boxShadow = `0 0 0 2px ${p.accentColor}, 0 12px 32px rgba(0,0,0,.15)`;
    const features = p.features || [];
    const badge = p.featured ? `<div style="background:${p.accentColor};color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:12px">Most Popular</div>` : '';
    const checkSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="${p.accentColor}" stroke-width="2.5" style="width:16px;height:16px;flex-shrink:0"><path d="M20 6L9 17l-5-5"/></svg>`;
    node.innerHTML = `${badge}<div style="font-size:22px;font-weight:800;color:${p.color};margin-bottom:4px">${escapeHtml(p.plan)}</div><div style="margin-bottom:20px"><span style="font-size:40px;font-weight:900;color:${p.accentColor}">${escapeHtml(p.price)}</span><span style="font-size:14px;color:${p.color};opacity:.6">${escapeHtml(p.period)}</span></div><div style="flex:1">${features.map(f=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;color:${p.color}">${checkSvg}${escapeHtml(f)}</div>`).join('')}</div><div style="background:${p.ctaBg};color:${p.ctaColor};text-align:center;padding:12px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;margin-top:20px">${escapeHtml(p.ctaText)}</div>`;
  } else if (el.type === 'alertbanner') {
    const ALERT_STYLES = {
      info: { bg: '#dbeafe', color: '#1d4ed8', icon: '<path d="M12 16v-4M12 8h.01"/><circle cx="12" cy="12" r="10"/>' },
      success: { bg: '#dcfce7', color: '#15803d', icon: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' },
      warning: { bg: '#fef3c7', color: '#b45309', icon: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>' },
      error: { bg: '#fee2e2', color: '#dc2626', icon: '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' }
    };
    const st = ALERT_STYLES[p.alertType] || ALERT_STYLES.info;
    node.style.background = st.bg;
    node.style.display = 'flex';
    node.style.alignItems = 'center';
    node.style.padding = '0 20px';
    node.style.gap = '12px';
    const banId = 'ban_' + el.id;
    node.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="${st.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;flex-shrink:0">${st.icon}</svg><span style="flex:1;font-size:14px;font-weight:500;color:${st.color}">${escapeHtml(p.message)}</span>${p.dismissible ? `<button id="${banId}_x" style="background:none;border:none;cursor:pointer;color:${st.color};opacity:.6;padding:4px;display:flex;align-items:center" title="Dismiss"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>` : ''}`;
    if (p.dismissible && state.mode !== 'edit') {
      const xBtn = node.querySelector('#' + banId + '_x');
      if (xBtn) xBtn.addEventListener('click', (e) => { e.stopPropagation(); node.style.display = 'none'; });
    }
  } else if (el.type === 'tabs') {
    node.style.background = p.bg;
    node.style.borderRadius = p.radius + 'px';
    node.style.overflow = 'hidden';
    node.style.border = `1px solid ${p.accentColor}22`;
    const tabItems = p.tabs || [];
    const tabsId = 'tabs_' + el.id;
    const headerHtml = tabItems.map((t,i) => `<button data-ti="${i}" style="padding:10px 20px;font-size:14px;font-weight:600;border:none;cursor:pointer;background:${i===p.activeTab?p.accentColor:'transparent'};color:${i===p.activeTab?'#fff':p.color};border-radius:${i===0?`${p.radius}px 0 0 0`:i===tabItems.length-1?`0 ${p.radius}px 0 0`:'0'};transition:all .15s;font-family:inherit">${escapeHtml(t.label)}</button>`).join('');
    const contentHtml = tabItems.map((t,i) => `<div data-tc="${i}" style="${i===p.activeTab?'':'display:none;'}padding:20px;font-size:14px;color:${p.color};line-height:1.6">${escapeHtml(t.content)}</div>`).join('');
    node.innerHTML = `<div id="${tabsId}" style="display:flex;background:${p.color}11;border-bottom:1px solid ${p.accentColor}22">${headerHtml}</div><div class="tabs-body">${contentHtml}</div>`;
    if (state.mode !== 'edit') {
      const tabsWrap = node.querySelector('#' + tabsId);
      tabsWrap.querySelectorAll('[data-ti]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = +btn.dataset.ti;
          tabsWrap.querySelectorAll('[data-ti]').forEach((b,i) => {
            b.style.background = i===idx ? p.accentColor : 'transparent';
            b.style.color = i===idx ? '#fff' : p.color;
          });
          node.querySelectorAll('[data-tc]').forEach((c,i) => c.style.display = i===idx?'':'none');
        });
      });
    }
  } else if (el.type === 'starrating') {
    node.style.display = 'flex';
    node.style.alignItems = 'center';
    node.style.gap = '6px';
    const rating = Math.min(p.maxStars || 5, Math.max(0, p.rating || 0));
    const size = p.size || 32;
    const stars = Array.from({length: p.maxStars || 5}, (_,i) => {
      const filled = rating >= i+1;
      const half = !filled && rating >= i+0.5;
      const id = 'sr_' + el.id + '_' + i;
      if (half) return `<svg viewBox="0 0 24 24" width="${size}" height="${size}"><defs><linearGradient id="${id}"><stop offset="50%" stop-color="${p.color}"/><stop offset="50%" stop-color="${p.emptyColor}"/></linearGradient></defs><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="url(#${id})" stroke="${p.color}" stroke-width="1"/></svg>`;
      return `<svg viewBox="0 0 24 24" width="${size}" height="${size}"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="${filled?p.color:p.emptyColor}" stroke="${filled?p.color:p.emptyColor}" stroke-width="1"/></svg>`;
    }).join('');
    node.innerHTML = `<div style="display:flex;align-items:center;gap:2px">${stars}</div>${p.showNumber ? `<span style="font-size:${size*.45}px;font-weight:700;color:${p.color}">${rating.toFixed(1)}</span>` : ''}`;
  } else if (el.type === 'animcounter') {
    node.style.display = 'flex';
    node.style.flexDirection = 'column';
    node.style.alignItems = 'center';
    node.style.justifyContent = 'center';
    const acId = 'ac_' + el.id;
    node.innerHTML = `<div style="display:flex;align-items:baseline;gap:2px"><span style="font-size:${p.fontSize}px;font-weight:${p.fontWeight};color:${p.accentColor}">${escapeHtml(p.prefix||'')}</span><span id="${acId}" style="font-size:${p.fontSize}px;font-weight:${p.fontWeight};color:${p.accentColor}">0</span><span style="font-size:${p.fontSize}px;font-weight:${p.fontWeight};color:${p.accentColor}">${escapeHtml(p.suffix||'')}</span></div><div style="font-size:${p.labelSize||14}px;color:${p.color};margin-top:6px;font-weight:500">${escapeHtml(p.label||'')}</div>`;
    if (state.mode !== 'edit') {
      const numEl = node.querySelector('#' + acId);
      if (numEl) {
        const target = p.target || 0;
        const dur = p.duration || 2000;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - start) / dur);
          const ease = t < .5 ? 2*t*t : -1+(4-2*t)*t;
          numEl.textContent = Math.round(ease * target).toLocaleString();
          if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    } else {
      const numEl = node.querySelector('#' + acId);
      if (numEl) numEl.textContent = (p.target || 0).toLocaleString();
    }
  } else if (el.type === 'embedframe') {
    node.style.borderRadius = p.radius + 'px';
    node.style.overflow = 'hidden';
    node.style.background = '#111';
    if (p.src) {
      node.innerHTML = `<iframe src="${escapeAttr(p.src)}" style="width:100%;height:100%;border:0" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>`;
    } else {
      node.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#666;font-size:14px;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:24px;height:24px"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M9 9l-3 3 3 3M15 9l3 3-3 3"/></svg>Paste a URL in Properties to embed</div>`;
    }
  }

  // Preview mode: make buttons navigate AND run actions
  if (state.mode === 'preview') {
    if (el.type === 'button') {
      node.style.cursor = 'pointer';
      node.addEventListener('click', (e) => {
        e.stopPropagation();
        SFX.click();
        // Run element actions first
        runActionsForTrigger(el, 'onClick');
        // Then handle link/linkPage
        if (p.linkPage) {
          const pg = state.project.pages.find(pg => pg.id === p.linkPage);
          if (pg) setCurrentPage(pg.id);
        } else if (p.link) {
          window.open(p.link, '_blank');
        }
      });
    }
    // Any element with onClick actions
    if (p.actions && p.actions.some(a => a.trigger === 'onClick') && el.type !== 'button') {
      node.style.cursor = 'pointer';
      node.addEventListener('click', (e) => {
        e.stopPropagation();
        runActionsForTrigger(el, 'onClick');
      });
    }
    // Hover actions
    if (p.actions && p.actions.some(a => a.trigger === 'onHover')) {
      node.addEventListener('mouseenter', () => runActionsForTrigger(el, 'onHover'));
    }
  }

  // Add handles if selected & edit mode
  if (el.id === state.selectedEl && state.mode === 'edit' && !p.locked) {
    ['nw','ne','sw','se','n','s','w','e'].forEach(pos => {
      const h = document.createElement('div');
      h.className = 'el-handle ' + pos;
      h.dataset.handle = pos;
      node.appendChild(h);
    });
  }

  return node;
}

function buildImageFilter(p) {
  const parts = [];
  if (p.brightness !== undefined && p.brightness !== 100) parts.push(`brightness(${p.brightness}%)`);
  if (p.contrast !== undefined && p.contrast !== 100) parts.push(`contrast(${p.contrast}%)`);
  if (p.saturate !== undefined && p.saturate !== 100) parts.push(`saturate(${p.saturate}%)`);
  if (p.blur) parts.push(`blur(${p.blur}px)`);
  if (p.grayscale) parts.push(`grayscale(${p.grayscale}%)`);
  return parts.length ? parts.join(' ') : 'none';
}

/* ════════════════════════════════════════════════════════════
   RIGHT PANEL
   ════════════════════════════════════════════════════════════ */
function renderRightPanel() {
  $$('.rp-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === state.rightTab));
  const body = $('#rpBody');
  body.className = 'rp-body' + (state.rightTab === 'ai' ? ' ai-body' : '');
  body.innerHTML = '';
  if (state.rightTab === 'props') renderProperties(body);
  else if (state.rightTab === 'ai') renderAI(body);
  else if (state.rightTab === 'design') renderDesign(body);
  else if (state.rightTab === 'data') renderDataPanel(body);
}

function renderProperties(body) {
  const el = selectedElement();
  if (!el) {
    body.innerHTML = `
      <div class="no-selection">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3 7 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/></svg>
        <div>Select an element on the canvas<br>to edit its properties</div>
      </div>`;
    return;
  }
  const p = el.props;

  const group = (label, inner) => `
    <div class="prop-group">
      <span class="prop-label">${label}</span>
      ${inner}
    </div>`;

  let html = '';

  // Type-specific
  if (el.type === 'heading' || el.type === 'text' || el.type === 'button') {
    html += group('Content', `
      <div class="field-big"><textarea id="p_text">${escapeHtml(p.text || '')}</textarea></div>
    `);
  }

  if (el.type === 'image') {
    html += group('Image Source', `
      <div class="field"><input type="text" id="p_src" placeholder="https://..." value="${escapeAttr(p.src || '')}"></div>
      <div class="prop-row" style="margin-top:8px">
        <button class="small-btn" id="p_upload">Upload from device</button>
      </div>
    `);
    html += group('Fit', `
      <div class="btn-row">
        <button class="small-btn ${p.fit==='cover'?'on':''}" data-fit="cover">Cover</button>
        <button class="small-btn ${p.fit==='contain'?'on':''}" data-fit="contain">Contain</button>
        <button class="small-btn ${p.fit==='fill'?'on':''}" data-fit="fill">Fill</button>
      </div>
    `);
  }

  if (el.type === 'input') {
    html += group('Placeholder', `
      <div class="field"><input type="text" id="p_placeholder" value="${escapeAttr(p.placeholder||'')}"></div>
    `);
    html += group('Save to Storage Key', `
      <div class="field"><span class="field-icon">🔑</span><input type="text" id="p_saveKey" placeholder="e.g. userName" value="${escapeAttr(p.saveKey||'')}"></div>
    `);
  }

  if (el.type === 'button') {
    const pageOpts = state.project.pages.map(pg =>
      `<option value="${pg.id}" ${p.linkPage===pg.id?'selected':''}>${escapeHtml(pg.name)}</option>`
    ).join('');
    html += group('Link to Page', `
      <div class="field"><select id="p_linkPage"><option value="">— none —</option>${pageOpts}</select></div>
    `);
    html += group('External URL', `
      <div class="field"><span class="field-icon">↗</span><input type="text" id="p_link" placeholder="https://..." value="${escapeAttr(p.link||'')}"></div>
    `);
  }

  // Typography
  if (el.type === 'heading' || el.type === 'text' || el.type === 'button') {
    const QUICK_COLORS = ['#ffffff','#111111','#ef4444','#f97316','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#6b7280','#0ea5e9','#14b8a6'];
    const FONT_PRESETS = [
      { label: 'Inter', value: 'Inter' },
      { label: 'Serif', value: 'Instrument Serif' },
      { label: 'Mono', value: 'ui-monospace, monospace' },
      { label: 'System', value: '-apple-system, system-ui, sans-serif' },
      { label: 'Georgia', value: 'Georgia, serif' },
      { label: 'Impact', value: 'Impact, Arial Black, sans-serif' },
    ];
    html += group('Typography', `
      <div class="prop-row">
        <div class="field"><span class="field-icon">T</span><input type="number" id="p_fontSize" min="8" max="200" value="${p.fontSize}"></div>
        <div class="field"><input type="color" id="p_color" value="${p.color}"></div>
      </div>
      <div class="quick-colors" id="p_quickColors">
        ${QUICK_COLORS.map(c => `<div class="qc-swatch" data-qc="${c}" style="background:${c}" title="${c}"></div>`).join('')}
      </div>
      <div class="prop-row" style="margin-top:8px">
        <div class="field"><select id="p_fontWeight">
          <option value="300" ${p.fontWeight==300?'selected':''}>Light</option>

      <div class="field"><span class="field-icon">Min</span><input type="number" id="p_minHeight" min="0" value="${p.minHeight||0}" placeholder="min-h"></div>
    </div>
  `);

  // Layer
  html += group('Layer', `
    <div class="btn-row">
      <button class="small-btn" id="p_front">↑ Front</button>
      <button class="small-btn" id="p_back">↓ Back</button>
    </div>
  `);

  // ── Element Actions (programmable behavior) ──
  {
    const actions = p.actions || [];
    const varNames = Object.keys(state.project.variables || {});
    const pageOpts = state.project.pages.map(pg =>
      `<option value="${pg.id}">${escapeHtml(pg.name)}</option>`).join('');
    const allEls = (currentPage() ? currentPage().elements : []).filter(e => e.id !== el.id);

    const TRIGGERS = ['onClick','onLoad','onHover'];
    const OPERATIONS = [
      { v:'setVariable', l:'Set Variable' },
      { v:'incrementVariable', l:'Increment Number' },
      { v:'toggleVariable', l:'Toggle Boolean' },
      { v:'navigatePage', l:'Navigate to Page' },
      { v:'openURL', l:'Open URL' },
      { v:'showElement', l:'Show Element' },
      { v:'hideElement', l:'Hide Element' },
      { v:'toggleElement', l:'Toggle Element' },
      { v:'alert', l:'Show Alert' },
      { v:'runFunction', l:'Run JS' },
    ];

    const actionHtml = actions.map((act, i) => {
      const needsVar = ['setVariable','incrementVariable','toggleVariable'].includes(act.operation);
      const needsPage = act.operation === 'navigatePage';
      const needsTarget = ['showElement','hideElement','toggleElement'].includes(act.operation);
      const needsValue = ['setVariable','incrementVariable','openURL','alert','runFunction'].includes(act.operation);
      return `
        <div class="el-action-row" data-ai="${i}" style="background:var(--input-bg);border-radius:6px;padding:8px;margin-bottom:6px">
          <div class="prop-row" style="margin-bottom:4px">
            <select class="act-trigger" data-ai="${i}" style="flex:1;background:var(--panel-2);border-radius:4px;padding:3px 6px">
              ${TRIGGERS.map(t=>`<option value="${t}" ${act.trigger===t?'selected':''}>${t}</option>`).join('')}
            </select>
            <button class="small-btn danger act-del" data-ai="${i}" style="flex:0;width:26px;min-width:26px;padding:0;font-size:14px">×</button>
          </div>
          <select class="act-op" data-ai="${i}" style="width:100%;background:var(--panel-2);border-radius:4px;padding:3px 6px;margin-bottom:4px">
            ${OPERATIONS.map(op=>`<option value="${op.v}" ${act.operation===op.v?'selected':''}>${op.l}</option>`).join('')}
          </select>
          ${needsVar ? `<select class="act-var" data-ai="${i}" style="width:100%;background:var(--panel-2);border-radius:4px;padding:3px 6px;margin-bottom:4px"><option value="">— variable —</option>${varNames.map(v=>`<option value="${v}" ${act.variable===v?'selected':''}>${v}</option>`).join('')}</select>` : ''}
          ${needsPage ? `<select class="act-page" data-ai="${i}" style="width:100%;background:var(--panel-2);border-radius:4px;padding:3px 6px;margin-bottom:4px"><option value="">— page —</option>${pageOpts.replace(/selected/g,'').replace(new RegExp('value="'+act.pageId+'"'),'value="'+act.pageId+'" selected')}</select>` : ''}
          ${needsTarget ? `<select class="act-target" data-ai="${i}" style="width:100%;background:var(--panel-2);border-radius:4px;padding:3px 6px;margin-bottom:4px"><option value="">— element —</option>${allEls.map(e=>`<option value="${e.id}" ${act.targetId===e.id?'selected':''}>${e.type} (${e.id.slice(0,6)})</option>`).join('')}</select>` : ''}
          ${needsValue ? `<input type="text" class="act-val" data-ai="${i}" placeholder="value" value="${escapeAttr(act.value||'')}" style="width:100%;background:var(--panel-2);border-radius:4px;padding:3px 6px;color:var(--text)">` : ''}
        </div>
      `;
    }).join('');

    html += group('Element Actions', `
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.5">Add actions to make this element functional. Runs in Preview mode.</div>
      <div id="actList">${actionHtml}</div>
      <button class="small-btn" id="p_addAction" style="width:100%;margin-top:4px">+ Add Action</button>
    `);
  }

  // ── Conditional Visibility ──
  {
    const vw = p.visibleWhen || {};
    const varNames = Object.keys(state.project.variables || {});
    html += group('Conditional Visibility', `
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Show/hide based on a variable's value.</div>
      <div class="prop-row" style="margin-bottom:4px">
        <select id="p_vwVar" style="flex:2;background:var(--input-bg);border-radius:4px;padding:3px 6px">
          <option value="">Always visible</option>
          ${varNames.map(v=>`<option value="${v}" ${vw.variable===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      ${vw.variable ? `
        <div class="prop-row" style="gap:4px">
          <select id="p_vwOp" style="flex:1;background:var(--input-bg);border-radius:4px;padding:3px 6px">
            ${['==','!=','>','<','>=','<=','truthy','falsy'].map(op=>`<option value="${op}" ${(vw.operator||'==')==op?'selected':''}>${op}</option>`).join('')}
          </select>
          <input type="text" id="p_vwVal" placeholder="value" value="${escapeAttr(vw.value||'')}" style="flex:2;background:var(--input-bg);border-radius:4px;padding:3px 6px;color:var(--text)">
        </div>
      ` : ''}
    `);
  }

  // Element operations
  html += group('Element', `
    <div class="btn-row">
      <button class="small-btn" id="p_duplicate">Duplicate</button>
      <button class="small-btn" id="p_center">Center</button>
      <button class="small-btn danger" id="p_delete">Delete</button>
    </div>
  `);

  body.innerHTML = html;

  // Wire up all inputs
  wireProperties(el);
}

function wireProperties(el) {
  const on = (id, ev, fn) => { const n = $('#' + id); if (n) n.addEventListener(ev, fn); };

  on('p_text', 'input', e => updateElementProp(el.id, 'props.text', e.target.value));
  on('p_src', 'input', e => updateElementProp(el.id, 'props.src', e.target.value));
  on('p_placeholder', 'input', e => updateElementProp(el.id, 'props.placeholder', e.target.value));
  on('p_saveKey', 'input', e => updateElementProp(el.id, 'props.saveKey', e.target.value));
  on('p_link', 'input', e => updateElementProp(el.id, 'props.link', e.target.value));
  on('p_linkPage', 'change', e => updateElementProp(el.id, 'props.linkPage', e.target.value));
  on('p_fontSize', 'input', e => updateElementProp(el.id, 'props.fontSize', +e.target.value));
  on('p_color', 'input', e => updateElementProp(el.id, 'props.color', e.target.value));
  on('p_fontWeight', 'change', e => updateElementProp(el.id, 'props.fontWeight', +e.target.value));
  on('p_fontFamily', 'change', e => updateElementProp(el.id, 'props.fontFamily', e.target.value));
  on('p_bg', 'input', e => updateElementProp(el.id, 'props.bg', e.target.value));
  on('p_radius', 'input', e => updateElementProp(el.id, 'props.radius', +e.target.value));
  on('p_x', 'input', e => updateElementProp(el.id, 'x', +e.target.value));
  on('p_y', 'input', e => updateElementProp(el.id, 'y', +e.target.value));
  on('p_w', 'input', e => updateElementProp(el.id, 'w', +e.target.value));
  on('p_h', 'input', e => updateElementProp(el.id, 'h', +e.target.value));
  on('p_fullWidth', 'click', () => { updateElementProp(el.id, 'props.fullWidth', !el.props.fullWidth); renderProperties($('#rpBody')); });
  on('p_sizing', 'change', e => updateElementProp(el.id, 'props.sizing', e.target.value));
  on('p_padding', 'input', e => updateElementProp(el.id, 'props.padding', +e.target.value));
  on('p_minHeight', 'input', e => updateElementProp(el.id, 'props.minHeight', +e.target.value));

  // Quick color swatches (text color)
  $$('[data-qc]').forEach(s => s.addEventListener('click', () => {
    updateElementProp(el.id, 'props.color', s.dataset.qc);
    renderProperties($('#rpBody'));
  }));
  // Quick color swatches (background)
  $$('[data-bgc]').forEach(s => s.addEventListener('click', () => {
    updateElementProp(el.id, 'props.bg', s.dataset.bgc);
    renderProperties($('#rpBody'));
  }));

  $$('[data-align]').forEach(b => b.addEventListener('click', () => {
    updateElementProp(el.id, 'props.align', b.dataset.align);
    renderProperties($('#rpBody'));
  }));
  $$('[data-fit]').forEach(b => b.addEventListener('click', () => {
    updateElementProp(el.id, 'props.fit', b.dataset.fit);
    renderProperties($('#rpBody'));
  }));

  on('p_duplicate', 'click', () => {
    const copy = JSON.parse(JSON.stringify(el));
    copy.id = uid();
    copy.x += 20; copy.y += 20;
    currentPage().elements.push(copy);
    state.selectedEl = copy.id;
    markDirty(); renderAll();
  });
  on('p_center', 'click', () => {
    el.x = Math.round((1024 - el.w) / 2);
    markDirty(); renderCanvas(); renderProperties($('#rpBody'));
  });
  on('p_delete', 'click', () => deleteElement(el.id));

  on('p_upload', 'click', () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = (ev) => {
      const file = ev.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        updateElementProp(el.id, 'props.src', reader.result);
        renderProperties($('#rpBody'));
      };
      reader.readAsDataURL(file);
    };
    inp.click();
  });

  // Effects
  on('p_opacity', 'input', e => updateElementProp(el.id, 'props.opacity', +e.target.value));
  on('p_rotation', 'input', e => updateElementProp(el.id, 'props.rotation', +e.target.value));
  on('p_shadowEnable', 'click', () => {
    updateElementProp(el.id, 'props.shadowEnabled', !el.props.shadowEnabled);
    renderProperties($('#rpBody'));
  });
  on('p_borderEnable', 'click', () => {
    updateElementProp(el.id, 'props.borderEnabled', !el.props.borderEnabled);
    renderProperties($('#rpBody'));
  });
  on('p_shadowX', 'input', e => updateElementProp(el.id, 'props.shadowX', +e.target.value));
  on('p_shadowY', 'input', e => updateElementProp(el.id, 'props.shadowY', +e.target.value));
  on('p_shadowBlur', 'input', e => updateElementProp(el.id, 'props.shadowBlur', +e.target.value));
  on('p_borderWidth', 'input', e => updateElementProp(el.id, 'props.borderWidth', +e.target.value));
  on('p_borderColor', 'input', e => updateElementProp(el.id, 'props.borderColor', e.target.value));

  // Animation
  on('p_animation', 'change', e => {
    updateElementProp(el.id, 'props.animation', e.target.value);
    renderProperties($('#rpBody'));
  });
  on('p_animDelay', 'input', e => updateElementProp(el.id, 'props.animationDelay', +e.target.value));

  // Hover effects
  on('p_hoverLift', 'click', () => { updateElementProp(el.id, 'props.hoverLift', !el.props.hoverLift); renderProperties($('#rpBody')); });
  on('p_hoverScale', 'click', () => { updateElementProp(el.id, 'props.hoverScale', !el.props.hoverScale); renderProperties($('#rpBody')); });
  on('p_hoverGlow', 'click', () => { updateElementProp(el.id, 'props.hoverGlow', !el.props.hoverGlow); renderProperties($('#rpBody')); });

  // Gradient
  on('p_gradEnable', 'click', () => {
    updateElementProp(el.id, 'props.gradientEnabled', !el.props.gradientEnabled);
    renderProperties($('#rpBody'));
  });
  on('p_gradFrom', 'input', e => updateElementProp(el.id, 'props.gradientFrom', e.target.value));
  on('p_gradTo', 'input', e => updateElementProp(el.id, 'props.gradientTo', e.target.value));
  on('p_gradAngle', 'input', e => updateElementProp(el.id, 'props.gradientAngle', +e.target.value));

  // Shape type
  $$('[data-shape]').forEach(b => b.addEventListener('click', () => {
    updateElementProp(el.id, 'props.shapeType', b.dataset.shape);
    renderProperties($('#rpBody'));
  }));

  // Icon
  on('p_iconName', 'change', e => updateElementProp(el.id, 'props.name', e.target.value));
  on('p_iconColor', 'input', e => updateElementProp(el.id, 'props.color', e.target.value));
  on('p_iconStroke', 'input', e => updateElementProp(el.id, 'props.strokeWidth', +e.target.value));

  // Divider
  on('p_divColor', 'input', e => updateElementProp(el.id, 'props.color', e.target.value));
  on('p_divThick', 'input', e => updateElementProp(el.id, 'props.thickness', +e.target.value));
  on('p_divStyle', 'change', e => updateElementProp(el.id, 'props.style', e.target.value));

  // YouTube
  on('p_ytId', 'input', e => {
    let v = e.target.value.trim();
    // Extract ID from URL
    const m = v.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (m) v = m[1];
    updateElementProp(el.id, 'props.youtubeId', v);
  });
  on('p_ytAutoplay', 'click', () => { updateElementProp(el.id, 'props.autoplay', !el.props.autoplay); renderProperties($('#rpBody')); });

  // Navbar
  on('p_siteName', 'input', e => updateElementProp(el.id, 'props.siteName', e.target.value));
  on('p_accentColor', 'input', e => updateElementProp(el.id, 'props.accentColor', e.target.value));

  // Countdown
  on('p_targetDate', 'input', e => updateElementProp(el.id, 'props.targetDate', e.target.value));
  on('p_label', 'input', e => updateElementProp(el.id, 'props.label', e.target.value));

  // Contact form
  on('p_formTitle', 'input', e => updateElementProp(el.id, 'props.title', e.target.value));
  on('p_submitLabel', 'input', e => updateElementProp(el.id, 'props.submitLabel', e.target.value));

  // Carousel
  on('p_carImages', 'input', e => {
    const lines = e.target.value.split('\n').map(s=>s.trim()).filter(Boolean);
    updateElementProp(el.id, 'props.images', lines);
  });
  on('p_carAutoplay', 'click', () => { updateElementProp(el.id, 'props.autoplay', !el.props.autoplay); renderProperties($('#rpBody')); });

  // Accordion
  on('p_accItems', 'input', e => {
    const items = e.target.value.split('\n').map(line => {
      const sep = line.indexOf('|');
      if (sep < 0) return { q: line.trim(), a: '' };
      return { q: line.slice(0, sep).trim(), a: line.slice(sep+1).trim() };
    }).filter(i => i.q);
    updateElementProp(el.id, 'props.items', items);
  });

  // Social links
  $$('.p_social_url').forEach(inp => {
    inp.addEventListener('input', () => {
      const links = Object.assign({}, el.props.links || {});
      links[inp.dataset.social] = inp.value;
      updateElementProp(el.id, 'props.links', links);
    });
  });
  on('p_socialSize', 'input', e => updateElementProp(el.id, 'props.size', +e.target.value));

  // Map embed
  on('p_address', 'input', e => updateElementProp(el.id, 'props.address', e.target.value));
  on('p_embedUrl', 'input', e => updateElementProp(el.id, 'props.embedUrl', e.target.value));

  // Progress bar
  on('p_pbLabel', 'input', e => updateElementProp(el.id, 'props.label', e.target.value));
  on('p_percent', 'input', e => updateElementProp(el.id, 'props.percent', +e.target.value));
  on('p_fillColor', 'input', e => updateElementProp(el.id, 'props.fillColor', e.target.value));

  // Testimonial
  on('p_quote', 'input', e => updateElementProp(el.id, 'props.quote', e.target.value));
  on('p_author', 'input', e => updateElementProp(el.id, 'props.author', e.target.value));
  on('p_role', 'input', e => updateElementProp(el.id, 'props.role', e.target.value));

  // Pricing card
  on('p_plan', 'input', e => updateElementProp(el.id, 'props.plan', e.target.value));
  on('p_price', 'input', e => updateElementProp(el.id, 'props.price', e.target.value));
  on('p_period', 'input', e => updateElementProp(el.id, 'props.period', e.target.value));
  on('p_ctaText', 'input', e => updateElementProp(el.id, 'props.ctaText', e.target.value));
  on('p_features', 'input', e => {
    const feats = e.target.value.split('\n').map(s=>s.trim()).filter(Boolean);
    updateElementProp(el.id, 'props.features', feats);
  });
  on('p_featured', 'click', () => { updateElementProp(el.id, 'props.featured', !el.props.featured); renderProperties($('#rpBody')); });

  // Alert banner
  on('p_alertMsg', 'input', e => updateElementProp(el.id, 'props.message', e.target.value));
  on('p_alertType', 'change', e => { updateElementProp(el.id, 'props.alertType', e.target.value); renderProperties($('#rpBody')); });
  on('p_dismissible', 'click', () => { updateElementProp(el.id, 'props.dismissible', !el.props.dismissible); renderProperties($('#rpBody')); });

  // Tabs
  on('p_tabItems', 'input', e => {
    const tabs = e.target.value.split('\n').map(line => {
      const sep = line.indexOf('|');
      if (sep < 0) return { label: line.trim(), content: '' };
      return { label: line.slice(0, sep).trim(), content: line.slice(sep+1).trim() };
    }).filter(t => t.label);
    updateElementProp(el.id, 'props.tabs', tabs);
  });

  // Star rating
  on('p_rating', 'input', e => updateElementProp(el.id, 'props.rating', +e.target.value));
  on('p_maxStars', 'input', e => updateElementProp(el.id, 'props.maxStars', +e.target.value));
  on('p_starColor', 'input', e => updateElementProp(el.id, 'props.color', e.target.value));
  on('p_starSize', 'input', e => updateElementProp(el.id, 'props.size', +e.target.value));
  on('p_showNumber', 'click', () => { updateElementProp(el.id, 'props.showNumber', !el.props.showNumber); renderProperties($('#rpBody')); });

  // Animated counter
  on('p_acTarget', 'input', e => updateElementProp(el.id, 'props.target', +e.target.value));
  on('p_prefix', 'input', e => updateElementProp(el.id, 'props.prefix', e.target.value));
  on('p_suffix', 'input', e => updateElementProp(el.id, 'props.suffix', e.target.value));
  on('p_acLabel', 'input', e => updateElementProp(el.id, 'props.label', e.target.value));

  // Embed frame
  on('p_embedSrc', 'input', e => updateElementProp(el.id, 'props.src', e.target.value));

  // Layer
  on('p_front', 'click', () => {
    const page = currentPage();
    const idx = page.elements.findIndex(e => e.id === el.id);
    if (idx >= 0 && idx < page.elements.length - 1) {
      page.elements.splice(idx, 1);
      page.elements.push(el);
      markDirty(); renderAll();
    }
  });
  on('p_back', 'click', () => {
    const page = currentPage();
    const idx = page.elements.findIndex(e => e.id === el.id);
    if (idx > 0) {
      page.elements.splice(idx, 1);
      page.elements.unshift(el);
      markDirty(); renderAll();
    }
  });

  // ── Element Actions wiring ──
  const getActions = () => el.props.actions || [];
  const saveActions = (actions) => { updateElementProp(el.id, 'props.actions', actions); };

  on('p_addAction', 'click', () => {
    const actions = getActions().slice();
    actions.push({ trigger: 'onClick', operation: 'setVariable', variable: '', value: '', pageId: '', targetId: '' });
    saveActions(actions);
    renderProperties($('#rpBody'));
  });

  $$('.act-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.ai;
      const actions = getActions().slice();
      actions.splice(i, 1);
      saveActions(actions);
      renderProperties($('#rpBody'));
    });
  });

  const updateActionField = (i, field, val) => {
    const actions = getActions().slice();
    actions[i] = Object.assign({}, actions[i], { [field]: val });
    saveActions(actions);
  };

  $$('.act-trigger').forEach(sel => {
    sel.addEventListener('change', () => { updateActionField(+sel.dataset.ai, 'trigger', sel.value); renderProperties($('#rpBody')); });
  });
  $$('.act-op').forEach(sel => {
    sel.addEventListener('change', () => { updateActionField(+sel.dataset.ai, 'operation', sel.value); renderProperties($('#rpBody')); });
  });
  $$('.act-var').forEach(sel => {
    sel.addEventListener('change', () => updateActionField(+sel.dataset.ai, 'variable', sel.value));
  });
  $$('.act-page').forEach(sel => {
    sel.addEventListener('change', () => updateActionField(+sel.dataset.ai, 'pageId', sel.value));
  });
  $$('.act-target').forEach(sel => {
    sel.addEventListener('change', () => updateActionField(+sel.dataset.ai, 'targetId', sel.value));
  });
  $$('.act-val').forEach(inp => {
    inp.addEventListener('input', () => updateActionField(+inp.dataset.ai, 'value', inp.value));
  });

  // ── Conditional Visibility wiring ──
  on('p_vwVar', 'change', e => {
    const vw = Object.assign({}, el.props.visibleWhen || {});
    vw.variable = e.target.value;
    if (!vw.operator) vw.operator = '==';
    updateElementProp(el.id, 'props.visibleWhen', vw);
    renderProperties($('#rpBody'));
  });
  on('p_vwOp', 'change', e => {
    const vw = Object.assign({}, el.props.visibleWhen || {});
    vw.operator = e.target.value;
    updateElementProp(el.id, 'props.visibleWhen', vw);
  });
  on('p_vwVal', 'input', e => {
    const vw = Object.assign({}, el.props.visibleWhen || {});
    vw.value = e.target.value;
    updateElementProp(el.id, 'props.visibleWhen', vw);
  });
}

/* ════════════════════════════════════════════════════════════
   DATA PANEL (Variables & Bindings)
   ════════════════════════════════════════════════════════════ */
function renderDataPanel(body) {
  if (!state.project) { body.innerHTML = '<div class="no-selection">No project</div>'; return; }
  // Migrate legacy variables on open
  if (!state.project.variables) state.project.variables = {};
  state.project.variables = migrateVariables(state.project.variables);
  const vars = state.project.variables;
  const varEntries = Object.entries(vars);

  const TYPE_COLORS = { number: '#4facfe', text: '#34d399', boolean: '#a78bfa', list: '#fbbf24' };
  const typeTag = (t) => `<span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:${TYPE_COLORS[t]||'#6e6e76'}22;color:${TYPE_COLORS[t]||'#6e6e76'};border-radius:3px;padding:1px 4px">${t}</span>`;

  let html = `
    <div class="prop-group">
      <span class="prop-label">Site Variables</span>
      <p style="font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.5">
        Typed variables for your site. Use <code style="background:var(--input-bg);padding:1px 4px;border-radius:3px;font-size:10px">{{varName}}</code> in text. Buttons can increment, toggle, or set them via <b>Element Actions</b>.
      </p>
  `;

  if (varEntries.length === 0) {
    html += `<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">No variables yet</div>`;
  } else {
    for (const [key, vdef] of varEntries) {
      const type = vdef.type || 'text';
      const val = vdef.value;
      let valueInput = '';
      if (type === 'boolean') {
        valueInput = `<button class="small-btn var-bool ${val?'on':''}" data-key="${escapeAttr(key)}" style="flex:2;font-size:11px">${val ? 'true' : 'false'}</button>`;
      } else if (type === 'list') {
        const listStr = Array.isArray(val) ? val.join(', ') : String(val);
        valueInput = `<div class="field" style="flex:2"><input type="text" class="var-val" data-key="${escapeAttr(key)}" value="${escapeAttr(listStr)}" placeholder="item1, item2, item3" style="font-size:11px"></div>`;
      } else {
        valueInput = `<div class="field" style="flex:2"><input type="${type==='number'?'number':'text'}" class="var-val" data-key="${escapeAttr(key)}" value="${escapeAttr(String(val))}" placeholder="value" style="font-size:11px"></div>`;
      }
      html += `
        <div style="background:var(--input-bg);border-radius:6px;padding:8px;margin-bottom:6px">
          <div class="prop-row" style="margin-bottom:4px;gap:4px">
            <div class="field" style="flex:1.2"><input type="text" class="var-key" data-old="${escapeAttr(key)}" value="${escapeAttr(key)}" placeholder="name" style="font-family:ui-monospace,monospace;font-size:11px"></div>
            <select class="var-type" data-key="${escapeAttr(key)}" style="background:var(--panel-2);border-radius:4px;padding:2px 4px;font-size:11px;color:${TYPE_COLORS[type]||'var(--text)'}">
              <option value="text" ${type==='text'?'selected':''}>text</option>
              <option value="number" ${type==='number'?'selected':''}>number</option>
              <option value="boolean" ${type==='boolean'?'selected':''}>boolean</option>
              <option value="list" ${type==='list'?'selected':''}>list</option>
            </select>
            <button class="small-btn danger var-del" data-key="${escapeAttr(key)}" style="flex:0;width:26px;min-width:26px;padding:0;font-size:14px">×</button>
          </div>
          <div class="prop-row" style="gap:4px">
            ${valueInput}
          </div>
        </div>
      `;
    }
  }

  html += `
      <div class="prop-row" style="margin-top:10px">
        <button class="small-btn" id="addVar" style="flex:1">+ Add Variable</button>
      </div>
    </div>

    <div class="prop-group">
      <span class="prop-label">Cloud Sync</span>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Save your project to the server so you can access it from any device.</div>
      <div class="btn-row">
        <button class="small-btn" id="btnCloudSave" style="flex:1">Save to Cloud</button>
        <button class="small-btn" id="btnCloudLoad" style="flex:1">Load from Cloud</button>
      </div>
    </div>

    <div class="prop-group">
      <span class="prop-label">Quick Add</span>
      <div class="btn-row" style="flex-wrap:wrap;gap:4px">
        <button class="small-btn var-quick" data-name="userName" data-type="text" data-val="Visitor">userName</button>
        <button class="small-btn var-quick" data-name="score" data-type="number" data-val="0">score (num)</button>
        <button class="small-btn var-quick" data-name="count" data-type="number" data-val="0">count (num)</button>
        <button class="small-btn var-quick" data-name="loggedIn" data-type="boolean" data-val="false">loggedIn (bool)</button>
        <button class="small-btn var-quick" data-name="darkMode" data-type="boolean" data-val="false">darkMode (bool)</button>
        <button class="small-btn var-quick" data-name="items" data-type="list" data-val="Item 1, Item 2">items (list)</button>
      </div>
    </div>
  `;

  body.innerHTML = html;

  // Wire up variable value changes
  $$('.var-val').forEach(inp => inp.addEventListener('input', (e) => {
    const key = e.target.dataset.key;
    const vdef = state.project.variables[key];
    if (!vdef) return;
    if (vdef.type === 'number') vdef.value = Number(e.target.value);
    else if (vdef.type === 'list') vdef.value = e.target.value.split(',').map(s=>s.trim());
    else vdef.value = e.target.value;
    markDirty(); renderCanvas();
  }));

  // Wire boolean toggles
  $$('.var-bool').forEach(btn => btn.addEventListener('click', () => {
    const key = btn.dataset.key;
    const vdef = state.project.variables[key];
    if (!vdef) return;
    vdef.value = !vdef.value;
    markDirty(); renderDataPanel(body);
  }));

  // Wire type changes
  $$('.var-type').forEach(sel => sel.addEventListener('change', (e) => {
    const key = e.target.dataset.key;
    const vdef = state.project.variables[key];
    if (!vdef) return;
    const oldVal = vdef.value;
    const newType = e.target.value;
    // Convert value
    if (newType === 'number') vdef.value = Number(oldVal) || 0;
    else if (newType === 'boolean') vdef.value = !!oldVal && oldVal !== 'false' && oldVal !== '0';
    else if (newType === 'list') vdef.value = Array.isArray(oldVal) ? oldVal : [String(oldVal)];
    else vdef.value = String(oldVal === undefined ? '' : oldVal);
    vdef.type = newType;
    markDirty(); renderDataPanel(body);
  }));

  // Wire key rename
  $$('.var-key').forEach(inp => inp.addEventListener('change', (e) => {
    const oldKey = e.target.dataset.old;
    const newKey = e.target.value.trim().replace(/[^a-zA-Z0-9_]/g, '');
    if (!newKey || newKey === oldKey) { e.target.value = oldKey; return; }
    if (state.project.variables[newKey] !== undefined && newKey !== oldKey) { toast('Variable exists', 'err'); e.target.value = oldKey; return; }
    state.project.variables[newKey] = state.project.variables[oldKey];
    delete state.project.variables[oldKey];
    markDirty(); renderDataPanel(body);
  }));

  $$('.var-del').forEach(btn => btn.addEventListener('click', () => {
    delete state.project.variables[btn.dataset.key];
    markDirty(); renderDataPanel(body);
  }));

  $('#addVar').addEventListener('click', () => {
    let name = 'var' + (varEntries.length + 1);
    while (state.project.variables[name] !== undefined) name += '_';
    state.project.variables[name] = { type: 'text', value: '' };
    markDirty(); renderDataPanel(body);
  });

  $$('.var-quick').forEach(btn => btn.addEventListener('click', () => {
    const name = btn.dataset.name;
    const type = btn.dataset.type || 'text';
    const rawVal = btn.dataset.val;
    if (state.project.variables[name] !== undefined) { toast('Already exists', 'err'); return; }
    let value;
    if (type === 'number') value = Number(rawVal) || 0;
    else if (type === 'boolean') value = rawVal === 'true';
    else if (type === 'list') value = rawVal.split(',').map(s=>s.trim());
    else value = rawVal;
    state.project.variables[name] = { type, value };
    markDirty(); renderDataPanel(body); SFX.add();
  }));

  // Cloud sync
  const btnCS = $('#btnCloudSave');
  if (btnCS) btnCS.addEventListener('click', async () => {
    btnCS.textContent = 'Saving…';
    btnCS.disabled = true;
    await cloudSaveProject();
    btnCS.textContent = 'Save to Cloud';
    btnCS.disabled = false;
  });
  const btnCL = $('#btnCloudLoad');
  if (btnCL) btnCL.addEventListener('click', async () => {
    if (!state.project) return;
    btnCL.textContent = 'Loading…';
    btnCL.disabled = true;
    const data = await cloudLoadProject(state.project.id);
    btnCL.textContent = 'Load from Cloud';
    btnCL.disabled = false;
    if (!data) { toast('No cloud data found', 'err'); return; }
    if (confirm('Load cloud version? Local unsaved changes will be overwritten.')) {
      data.variables = migrateVariables(data.variables);
      const idx = state.projects.findIndex(p => p.id === data.id);
      if (idx >= 0) state.projects[idx] = data;
      state.project = data;
      saveAll();
      renderAll();
      toast('Loaded from cloud', 'ok');
    }
  });
}

/* Variable interpolation: replace {{varName}} in text */
function interpolateVars(text) {
  if (!text || !state.project || !state.project.variables) return text;
  return String(text).replace(/\{\{(\w+)\}\}/g, (match, name) => {
    // Check runtime store first (in-session overrides), then project defaults
    if (state.runtimeVars && state.runtimeVars[name] !== undefined) {
      return String(state.runtimeVars[name]);
    }
    const stored = localStorage.getItem('wf_var_' + state.project.id + '_' + name);
    if (stored !== null) return stored;
    const v = state.project.variables[name];
    if (v !== undefined) return String(varValue(v));
    return match; // Leave {{name}} visible if not defined
  });
}

/* Get typed variable value for runtime use */
function getRuntimeVar(name) {
  if (state.runtimeVars && state.runtimeVars[name] !== undefined) return state.runtimeVars[name];
  const stored = localStorage.getItem('wf_var_' + state.project.id + '_' + name);
  if (stored !== null) {
    const v = state.project.variables[name];
    if (v && v.type === 'number') return Number(stored);
    if (v && v.type === 'boolean') return stored === 'true';
    return stored;
  }
  const v = state.project.variables[name];
  if (v !== undefined) return varValue(v);
  return undefined;
}

/* Set runtime variable and persist */
function setRuntimeVar(name, value) {
  if (!state.runtimeVars) state.runtimeVars = {};
  state.runtimeVars[name] = value;
  localStorage.setItem('wf_var_' + state.project.id + '_' + name, String(value));
  // Refresh {{var}} displays
  renderCanvas();
  checkConditionalVisibility();
}

function pushAiMsg(role, text) {
  state.aiMessages.push({ role, text, ts: Date.now() });
}

function renderAiMessages() {
  const container = $('#aiMessages');
  if (!container) return;
  container.innerHTML = state.aiMessages.map(m =>
    `<div class="ai-msg ${m.role}">${formatMsg(m.text)}</div>`
  ).join('');
  container.scrollTop = container.scrollHeight;
}

function formatMsg(text) {
  return escapeHtml(text)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

let serverAiAvailable = null;
async function checkServerAi() {
  try {
    const r = await fetch('/api/health');
    if (!r.ok) { serverAiAvailable = false; return; }
    const d = await r.json();
    serverAiAvailable = !!d.aiConfigured;
  } catch (e) { serverAiAvailable = false; }
}

function sendAI() {
  const input = $('#aiInput');
  const text = input.value.trim();
  if (!text) return;
  pushAiMsg('user', text);
  input.value = '';
  input.style.height = 'auto';
  renderAiMessages();
  const key = localStorage.getItem('wf_claude_key');
  if (key) {
    callClaudeAI(text, key);
  } else if (serverAiAvailable) {
    callClaudeAI(text, null);
  } else {
    setTimeout(() => processAI(text), 200);
  }
}

function buildSystemPrompt() {
  const proj = state.project;
  const cur = currentPage();
  const pagesDesc = proj.pages.map(p => `  - "${p.name}" (id: ${p.id}) — ${p.elements.length} elements`).join('\n');
  const elsDesc = cur.elements.length === 0
    ? '  (empty — no elements yet)'
    : cur.elements.map(e => {
        const key = e.type === 'heading' || e.type === 'text' || e.type === 'button'
          ? ` "${(e.props.text || '').slice(0, 40)}"`
          : e.type === 'image' ? ` src=${e.props.src ? 'set' : 'empty'}`
          : '';
        return `  - ${e.type}${key} id=${e.id} at (${e.x},${e.y}) size ${e.w}x${e.h}`;
      }).join('\n');
  const selDesc = state.selectedEl ? `Selected element id: ${state.selectedEl}` : 'No element selected';

  return `You are the AI assistant inside WebForge, a visual website builder. You help by calling tools.

Canvas: 1024px wide, variable height. Start content around y=40-100.

Element types:
- heading, text — typography with fontSize, fontWeight, color, fontFamily (Inter or 'Instrument Serif'), align, italic, underline, letterSpacing, lineHeight, textGradient (with textGradientFrom/To)
- button — text, color, bg, radius, variant (solid/outline/ghost), gradientEnabled with gradientFrom/To/Angle, hoverLift/hoverScale/hoverGlow, link, linkPage
- image — src (URL or data-uri), fit (cover/contain/fill), radius, brightness/contrast/saturate/blur/grayscale
- shape — bg, radius, shapeType (rect/circle/triangle/star/arrow/line), gradientEnabled
- input — placeholder, saveKey (persists to localStorage), bg, color
- icon — name (heart/star/check/x/bolt/mail/phone/user/home/search/settings/calendar/clock/play/arrow_right/arrow_left/plus/globe/camera/shopping/lock/download/upload/share/wifi/moon/sun), color, strokeWidth
- divider — color, thickness, style (solid/dashed/dotted)
- video — youtubeId, autoplay
- navbar — siteName, bg, color, accentColor, fontSize. Auto-links to all pages.
- countdown — targetDate (YYYY-MM-DD), label, bg, color, accentColor, fontSize. Live countdown.
- contactform — title, submitLabel, bg, accentColor. Saves entries to localStorage.
- carousel — images (array of URLs), autoplay, interval (ms), fit, radius
- accordion — items (array of {q,a}), bg, color, accentColor, borderColor, radius
- sociallinks — links ({twitter,instagram,github,linkedin,youtube,tiktok} with URLs), color, size, gap, radius

- progressbar — label, percent (0-100), bg, fillColor, color, fontSize, radius, showLabel. Animates on load.
- testimonial — quote, author, role, avatar (URL), bg, color, accentColor, radius
- pricingcard — plan, price, period, features (array), ctaText, ctaBg, ctaColor, bg, accentColor, radius, featured

All elements support effects:

let aiInFlight = false;

async function callClaudeAI(userText, apiKey) {
  if (aiInFlight) return;
  aiInFlight = true;

  const thinkingEl = document.createElement('div');
  thinkingEl.className = 'ai-thinking';
  thinkingEl.id = 'aiThinking';
  thinkingEl.innerHTML = '<div class="spinner"></div><span>Thinking…</span>';
  const container = $('#aiMessages');
  if (container) container.appendChild(thinkingEl);

  const messages = [{ role: 'user', content: userText }];
  const system = buildSystemPrompt();

  const updateThinking = (label) => {
    const t = $('#aiThinking');
    if (t) t.querySelector('span').textContent = label;
  };

  const useServer = !apiKey;
  const endpoint = useServer ? '/api/chat' : 'https://api.anthropic.com/v1/messages';
  const headers = useServer
    ? { 'Content-Type': 'application/json' }
    : {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      };

  try {
    for (let iter = 0; iter < 8; iter++) {
      updateThinking(iter === 0 ? 'Thinking…' : 'Working…');

      const res = await fetch(endpoint, {
        method: 'POST',
        headers,
        body: JSON.stringify({
          model: 'claude-haiku-4-5',
          max_tokens: 4096,
          system,
          tools: AI_TOOLS,
          messages
        })
      });

      if (!res.ok) {
        const err = await res.text();
        if (res.status === 503 && useServer) {
          throw new Error("Server AI not configured. Enable real AI with your own key via 'Enable Real AI'.");
        }
        throw new Error(`API ${res.status}: ${err.slice(0, 200)}`);
      }

      const data = await res.json();
      messages.push({ role: 'assistant', content: data.content });

      const toolUses = data.content.filter(c => c.type === 'tool_use');
      const texts = data.content.filter(c => c.type === 'text').map(c => c.text).join('\n').trim();

      // Log tool calls inline
      for (const tu of toolUses) {
        logToolCall(tu.name, tu.input);
      }

      if (data.stop_reason === 'end_turn' || toolUses.length === 0) {
        if (texts) { pushAiMsg('bot', texts); }
        else if (toolUses.length > 0) { pushAiMsg('bot', 'Done.'); }
        break;
      }

      // Execute tools and send results back
      const toolResults = toolUses.map(tu => {
        const result = executeAITool(tu.name, tu.input);
        return { type: 'tool_result', tool_use_id: tu.id, content: JSON.stringify(result) };
      });
      messages.push({ role: 'user', content: toolResults });
    }
  } catch (e) {
    pushAiMsg('bot', '⚠️ ' + e.message);
  } finally {
    const t = $('#aiThinking');
    if (t) t.remove();
    renderAiMessages();
    snapshotProject();
    renderAll();
    aiInFlight = false;
  }
}

function logToolCall(name, input) {
  const container = $('#aiMessages');
  if (!container) return;
  const thinking = $('#aiThinking');
  const div = document.createElement('div');
  div.className = 'ai-tool-log';
  const keys = Object.keys(input).slice(0, 4);
  const summary = keys.map(k => {
    let v = input[k];
    if (typeof v === 'string' && v.length > 30) v = v.slice(0, 30) + '…';
    return `${k}=${JSON.stringify(v)}`;
  }).join(' ');
  div.innerHTML = `<strong>${escapeHtml(name)}</strong> ${escapeHtml(summary)}`;
  container.insertBefore(div, thinking);
  container.scrollTop = container.scrollHeight;
}

const ALL_PROP_KEYS = Object.keys(ELEMENT_PROP_SCHEMA).filter(k => !['x','y','w','h'].includes(k));

function applyProps(el, input) {
  ['x','y','w','h'].forEach(k => { if (input[k] !== undefined) el[k] = input[k]; });
  ALL_PROP_KEYS.forEach(k => { if (input[k] !== undefined) el.props[k] = input[k]; });
}

function executeAITool(name, input) {
  try {
    if (name === 'add_element') {
      const page = currentPage();
      const base = ELEMENT_DEFAULTS[input.type];
      if (!base) return { error: 'unknown type ' + input.type };
      const el = { id: uid(), ...base() };
      applyProps(el, input);
      page.elements.push(el);
      state.selectedEl = el.id;
      markDirty();
      return { ok: true, id: el.id };
    }
    if (name === 'update_element') {
      const el = findElement(input.id);
      if (!el) return { error: 'element not found' };
      applyProps(el, input);
      markDirty();
      return { ok: true };
    }
    if (name === 'update_many') {
      let count = 0;
      for (const id of (input.ids || [])) {
        const el = findElement(id);
        if (el) { applyProps(el, input); count++; }
      }
      markDirty();
      return { ok: true, updated: count };
    }
    if (name === 'align_elements') {
      const els = (input.ids || []).map(findElement).filter(Boolean);
      if (els.length === 0) return { error: 'no elements found' };
      const canvasW = 1024;
      if (input.axis === 'horizontal') {
        els.forEach(el => {
          if (input.align === 'start') el.x = 0;
          else if (input.align === 'center') el.x = Math.round((canvasW - el.w) / 2);
          else if (input.align === 'end') el.x = canvasW - el.w;
        });
      } else {
        // vertical within bounding box
        const minY = Math.min(...els.map(e => e.y));
        const maxY = Math.max(...els.map(e => e.y + e.h));
        els.forEach(el => {
          if (input.align === 'start') el.y = minY;
          else if (input.align === 'center') el.y = Math.round((minY + maxY - el.h) / 2);
          else if (input.align === 'end') el.y = maxY - el.h;
        });
      }
      markDirty();
      return { ok: true, aligned: els.length };
    }
    if (name === 'distribute_elements') {
      const els = (input.ids || []).map(findElement).filter(Boolean);
      if (els.length < 3) return { error: 'need at least 3 elements to distribute' };
      if (input.axis === 'horizontal') {
        els.sort((a, b) => a.x - b.x);
        const first = els[0], last = els[els.length - 1];
        const totalW = els.reduce((s, e) => s + e.w, 0);
        const gap = ((last.x + last.w) - first.x - totalW) / (els.length - 1);
        let cursor = first.x;
        els.forEach(el => { el.x = Math.round(cursor); cursor += el.w + gap; });
      } else {
        els.sort((a, b) => a.y - b.y);
        const first = els[0], last = els[els.length - 1];
        const totalH = els.reduce((s, e) => s + e.h, 0);
        const gap = ((last.y + last.h) - first.y - totalH) / (els.length - 1);
        let cursor = first.y;
        els.forEach(el => { el.y = Math.round(cursor); cursor += el.h + gap; });
      }
      markDirty();
      return { ok: true };
    }
    if (name === 'layer_order') {
      const page = currentPage();
      const idx = page.elements.findIndex(e => e.id === input.id);
      if (idx < 0) return { error: 'element not found' };
      const el = page.elements[idx];
      page.elements.splice(idx, 1);
      if (input.action === 'front') page.elements.push(el);
      else if (input.action === 'back') page.elements.unshift(el);
      else if (input.action === 'up') page.elements.splice(Math.min(page.elements.length, idx + 1), 0, el);
      else if (input.action === 'down') page.elements.splice(Math.max(0, idx - 1), 0, el);
      markDirty();
      return { ok: true };
    }
    if (name === 'duplicate_element') {
      const el = findElement(input.id);
      if (!el) return { error: 'element not found' };
      const copy = JSON.parse(JSON.stringify(el));
      copy.id = uid();
      copy.x += (input.offsetX !== undefined ? input.offsetX : 20);
      copy.y += (input.offsetY !== undefined ? input.offsetY : 20);
      currentPage().elements.push(copy);
      state.selectedEl = copy.id;
      markDirty();
      return { ok: true, id: copy.id };
    }
    if (name === 'delete_element') {
      const page = currentPage();
      const before = page.elements.length;
      page.elements = page.elements.filter(e => e.id !== input.id);
      if (state.selectedEl === input.id) state.selectedEl = null;
      markDirty();
      return { ok: true, removed: before - page.elements.length };
    }
    if (name === 'add_page') {
      const p = addPage(input.name);
      return { ok: true, id: p.id, name: p.name };
    }
    if (name === 'switch_page') {
      const p = state.project.pages.find(x => x.id === input.id);
      if (!p) return { error: 'page not found' };
      state.project.currentPageId = p.id;
      state.selectedEl = null;
      return { ok: true, name: p.name };
    }
    if (name === 'delete_page') {
      deletePage(input.id);
      return { ok: true };
    }
    if (name === 'rename_page') {
      const p = state.project.pages.find(x => x.id === input.id);
      if (!p) return { error: 'page not found' };
      p.name = input.name;
      markDirty();
      return { ok: true };
    }
    if (name === 'set_page_background') {
      const p = currentPage();
      if (input.color) p.bg = input.color;
      if (input.image !== undefined) p.bgImage = input.image;
      markDirty();
      return { ok: true };
    }
    if (name === 'clear_page') {
      const p = currentPage();
      p.elements = [];
      state.selectedEl = null;
      markDirty();
      return { ok: true };
    }
    if (name === 'get_state') {
      return {
        project: state.project.name,
        pages: state.project.pages.map(p => ({
          id: p.id, name: p.name, bg: p.bg,
          elements: p.elements.map(e => ({ id: e.id, type: e.type, x: e.x, y: e.y, w: e.w, h: e.h, props: e.props }))
        })),
        currentPageId: state.project.currentPageId,
        selectedId: state.selectedEl
      };
    }
    return { error: 'unknown tool ' + name };
  } catch (e) {
    return { error: e.message };
  }
}

  if ($('#keyRemove')) $('#keyRemove').addEventListener('click', () => {
    localStorage.removeItem('wf_claude_key');
    closeModal();
    renderRightPanel();
    toast('Key removed — back to basic mode', 'ok');
  });
  $('#keySave').addEventListener('click', () => {
    const k = $('#keyInput').value.trim();
    if (!k) { toast('Enter a key', 'err'); return; }
    if (!k.startsWith('sk-ant-')) { toast('Should start with sk-ant-', 'err'); return; }
    localStorage.setItem('wf_claude_key', k);
    closeModal();
    renderRightPanel();
    toast('Real AI enabled', 'ok');
  });
}

/* ═════════════════════════
   AI COMMAND PROCESSOR
   ═════════════════════════ */
function processAI(text) {
  const t = text.toLowerCase();
  const resp = (msg) => { pushAiMsg('bot', msg); renderAiMessages(); };

  // Color parsing
  const colors = {
    red: '#ef4444', blue: '#3b82f6', green: '#10b981', yellow: '#f59e0b',
    orange: '#f97316', purple: '#a855f7', pink: '#ec4899', white: '#ffffff',
    black: '#111111', gray: '#6b7280', grey: '#6b7280', cyan: '#06b6d4',
    teal: '#14b8a6', indigo: '#6366f1', violet: '#8b5cf6', rose: '#f43f5e',
    amber: '#f59e0b', emerald: '#10b981', sky: '#0ea5e9', lime: '#84cc16',
    'dark blue': '#1e3a8a', 'light blue': '#93c5fd', 'dark green': '#14532d',
    'light gray': '#e5e7eb', 'dark gray': '#374151', navy: '#1e3a8a',
    'dark red': '#7f1d1d', 'light pink': '#fce7f3', maroon: '#7f1d1d',
    cream: '#fef3c7', beige: '#f5f5dc', coral: '#ff7f50'
  };
  const findColor = (str) => {
    for (const k of Object.keys(colors).sort((a,b)=>b.length-a.length)) {
      if (str.includes(k)) return colors[k];
    }
    const hexMatch = str.match(/#[0-9a-f]{3,6}/i);
    return hexMatch ? hexMatch[0] : null;
  };

  // 1a) Page creation (must come before templates since "create a new page" also mentions "page")
  let m = t.match(/(?:create|add|new|make)\s+(?:a\s+)?(?:new\s+)?(?:page|slide)(?:\s+(?:called|named|titled))?\s+["']?([a-z0-9][a-z0-9 ]*?)["']?\s*\.?\s*$/i);
  if (m) {
    const name = capitalize(m[1].trim());
    addPage(name);
    resp(`Added a new page called "${name}". You're now editing it.`); return;
  }
  if (/^(?:create|add|new|make)\s+(?:a\s+)?(?:new\s+)?(?:page|slide)\s*\.?\s*$/i.test(t)) {
    const p = addPage();
    resp(`Added "${p.name}". You're now editing it.`); return;
  }

  // 0) QUICK SECTIONS
  if (/\b(add|insert|create)\b.*\bhero\b.*\b(section|block)?\b/.test(t)) {
    addSection('hero'); resp("Hero section added!"); return;
  }
  if (/\b(add|insert|create)\b.*\bfeatures?\b.*\b(section|grid|block)?\b/.test(t)) {
    addSection('features'); resp("Features grid added!"); return;
  }
  if (/\b(add|insert|create)\b.*\btestimonials?\b/.test(t)) {
    addSection('testimonials'); resp("Testimonials section added!"); return;
  }
  if (/\b(add|insert|create)\b.*\b(footer|footnote)\b/.test(t)) {
    addSection('footer'); resp("Footer section added!"); return;
  }
  if (/\b(add|insert|create)\b.*\bnavbar?\b|\bnavigation\b/.test(t)) {
    addSection('navbar'); resp("Navbar section added!"); return;
  }
  if (/\b(add|insert|create)\b.*\bpricing\b.*\b(card|section|block)?\b/.test(t)) {
    addSection('pricingCards'); resp("Pricing cards added!"); return;
  }

  // 1) TEMPLATES — full landing pages
  if (/build|create|make|generate/.test(t) && /(landing|website|site|page)\b/.test(t)) {
    if (/coffee|cafe|espresso/.test(t)) { buildTemplate('coffee'); resp("Done! I built a coffee shop landing page. Click any element to customize it."); return; }
    if (/portfolio|designer|developer/.test(t)) { buildTemplate('portfolio'); resp("Built a portfolio page. Tap elements to edit them."); return; }
    if (/restaurant|food|menu|dining/.test(t)) { buildTemplate('restaurant'); resp("Restaurant landing page created."); return; }
    if (/startup|saas|app|tech|product/.test(t)) { buildTemplate('startup'); resp("Startup landing page created with hero, features, CTA."); return; }
    if (/event|wedding|party|conference/.test(t)) { buildTemplate('event'); resp("Event page built."); return; }
    if (/store|shop|ecommerce|product/.test(t)) { buildTemplate('store'); resp("Store page built."); return; }
    if (/blog|article|news|magazine/.test(t)) { buildTemplate('blog'); resp("Blog landing page built with hero, recent posts, newsletter."); return; }
    if (/pricing|plans|subscription/.test(t)) { buildTemplate('pricing'); resp("Pricing page built with three plan tiers."); return; }
    if (/login|sign.?in|signin|auth/.test(t)) { buildTemplate('login'); resp("Login page built."); return; }
    if (/404|not.?found|error.?page/.test(t)) { buildTemplate('404'); resp("404 error page built."); return; }
    if (/agency|creative|studio/.test(t)) { buildTemplate('agency'); resp("Agency / creative studio page built."); return; }
    if (/gallery|photo|showcase/.test(t)) { buildTemplate('gallery'); resp("Gallery / showcase page built."); return; }
    if (/app.?promo|mobile.?app|ios|android/.test(t)) { buildTemplate('apppromo'); resp("App promo page built."); return; }
    buildTemplate('generic');
    resp("I built a generic landing page. Tell me what you'd like to change."); return;
  }

  // 2) DELETE CURRENT PAGE
  if (/delete (?:this |current )?page|remove (?:this )?page/.test(t)) {
    const p = currentPage();
    deletePage(p.id);
    resp(`Deleted page "${p.name}".`); return;
  }

  // 4) ADD ELEMENTS
  const addPatterns = [
    { re: /\b(add|insert|place|create|make)\b.*\bheading\b/, type: 'heading' },
    { re: /\b(add|insert|place|create|make)\b.*\b(title|header)\b/, type: 'heading' },
    { re: /\b(add|insert|place|create|make)\b.*\bbutton\b/, type: 'button' },
    { re: /\b(add|insert|place|create|make)\b.*\b(text|paragraph|description)\b/, type: 'text' },
    { re: /\b(add|insert|place|create|make)\b.*\b(image|photo|picture)\b/, type: 'image' },
    { re: /\b(add|insert|place|create|make)\b.*\b(shape|box|rectangle|block)\b/, type: 'shape' },
    { re: /\b(add|insert|place|create|make)\b.*\b(input|field|form)\b/, type: 'input' }
  ];
  for (const pat of addPatterns) {
    if (pat.re.test(t)) {
      const el = addElement(pat.type);
      // Extract custom text
      const tm = text.match(/(?:says?|saying|with text|reading|that says|titled)\s*["']?([^"']+?)["']?\s*$/i)
              || text.match(/["']([^"']+)["']/);
      if (tm && (el.type === 'heading' || el.type === 'text' || el.type === 'button')) {
        el.props.text = tm[1].trim();
      }
      // Color
      const c = findColor(t);
      if (c) {
        if (el.type === 'button' || el.type === 'shape') el.props.bg = c;
        else if (el.type === 'heading' || el.type === 'text') el.props.color = c;
      }
      // Size hint
      if (/big|large|huge/.test(t) && el.type === 'heading') el.props.fontSize = 64;
      if (/small|tiny/.test(t) && el.type === 'heading') el.props.fontSize = 24;
      markDirty(); renderAll();
      resp(`Added a ${pat.type}${tm ? ' with text "' + tm[1].trim() + '"' : ''}${c ? ' in that color' : ''}.`);
      return;
    }
  }

  // 5) SELECTED ELEMENT MODIFICATIONS
  const sel = selectedElement();

  // Change text content
  m = text.match(/(?:change|set|update|make) (?:the |its |this )?text (?:to|say)\s*["']?(.+?)["']?\s*$/i);
  if (m && sel && (sel.type === 'heading' || sel.type === 'text' || sel.type === 'button')) {
    sel.props.text = m[1].trim();
    markDirty(); renderAll();
    resp(`Updated text to "${m[1].trim()}".`); return;
  }

  // Change color
  if (/(make|change|set).* (it|this|button|text|heading|background)?.*(color|red|blue|green|purple|black|white|yellow|pink|orange|gray|grey|cyan|teal)/i.test(t)) {
    const c = findColor(t);
    if (c && sel) {
      if (/background|bg/.test(t) || sel.type === 'button' || sel.type === 'shape') {
        if (sel.type === 'heading' || sel.type === 'text') sel.props.color = c;
        else sel.props.bg = c;
      } else {
        if (sel.props.color !== undefined) sel.props.color = c;
        else sel.props.bg = c;
      }
      markDirty(); renderAll();
      resp(`Applied color ${c}.`); return;
    }
    if (c && /background|page/.test(t)) {
      currentPage().bg = c;
      markDirty(); renderCanvas();
      resp(`Background set to ${c}.`); return;
    }
  }

  // Background of page
  if (/(change|set|make).* (background|bg) .* (to|color)/.test(t)) {
    const c = findColor(t);
    if (c) {
      currentPage().bg = c;
      markDirty(); renderCanvas();
      resp(`Page background set to ${c}.`); return;
    }
  }

  // Size
  if (sel && /bigger|larger/.test(t)) {
    sel.w = Math.round(sel.w * 1.3); sel.h = Math.round(sel.h * 1.3);
    if (sel.props.fontSize) sel.props.fontSize = Math.round(sel.props.fontSize * 1.3);
    markDirty(); renderAll();
    resp("Made it bigger."); return;
  }
  if (sel && /smaller/.test(t)) {
    sel.w = Math.round(sel.w * 0.75); sel.h = Math.round(sel.h * 0.75);
    if (sel.props.fontSize) sel.props.fontSize = Math.max(8, Math.round(sel.props.fontSize * 0.75));
    markDirty(); renderAll();
    resp("Made it smaller."); return;
  }

  // Center
  if (sel && /center|centre/.test(t)) {
    sel.x = Math.round((1024 - sel.w) / 2);
    markDirty(); renderAll();
    resp("Centered it horizontally."); return;
  }

  // Delete selected
  if (sel && /(delete|remove) (it|this|selected)/.test(t)) {
    deleteElement(sel.id);
    resp("Deleted."); return;
  }

  // Link button
  m = t.match(/(?:link|connect) (?:this |the )?button (?:to|with) (?:the |a |page )?["']?([a-z0-9 ]+?)["']?\s*$/i);
  if (m && sel && sel.type === 'button') {
    const targetName = m[1].trim().toLowerCase();
    const pg = state.project.pages.find(p => p.name.toLowerCase() === targetName);
    if (pg) {
      sel.props.linkPage = pg.id;
      markDirty();
      resp(`Linked button to page "${pg.name}".`); return;
    } else {
      resp(`I couldn't find a page called "${targetName}". Create one first.`); return;
    }
  }

  // Help
  if (/help|what can you do|commands/.test(t)) {
    resp("I can:\n• Add elements (heading, text, button, image, shape, input, icon)\n• Create/delete pages\n• Change text, colors, sizes, fonts\n• Link buttons to pages\n• Add sections (hero, features, testimonials, footer, navbar, pricing cards)\n• Build full pages (coffee shop, portfolio, startup, restaurant, event, store, blog, pricing, login, 404, agency, gallery, app promo)\n• Style the page background\n\nTry: \"Build me a startup landing page\" or \"Add a hero section\"");
    return;
  }

  resp("I'm not sure how to do that yet. Try \"add a heading\", \"make it blue\", \"create a new page called About\", or \"build a coffee shop landing page\".");
}

/* ════════════════════════════════════════════════════════════
   UNDO / REDO
   ════════════════════════════════════════════════════════════ */
const history = { stack: [], idx: -1, max: 50 };

function snapshotProject() {
  if (!state.project) return;
  const snap = JSON.stringify({ pages: state.project.pages, name: state.project.name });
  // Don't push if same as current
  if (history.stack[history.idx] === snap) return;
  history.stack = history.stack.slice(0, history.idx + 1);
  history.stack.push(snap);
  if (history.stack.length > history.max) history.stack.shift();
  history.idx = history.stack.length - 1;
}

function applySnapshot(snap) {
  if (!snap || !state.project) return;
  const d = JSON.parse(snap);
  state.project.pages = d.pages;
  state.project.name = d.name;
  // Ensure current page still exists
  if (!state.project.pages.find(p => p.id === state.project.currentPageId)) {
    state.project.currentPageId = state.project.pages[0].id;
  }
  state.selectedEl = null;
  markDirty();
  renderAll();
}

function undo() {
  if (history.idx <= 0) { flashHistory('Nothing to undo'); SFX.err(); return; }
  history.idx--;
  applySnapshot(history.stack[history.idx]);
  flashHistory('↶ Undo');
  SFX.undo();
}
function redo() {
  if (history.idx >= history.stack.length - 1) { flashHistory('Nothing to redo'); SFX.err(); return; }
  history.idx++;
  applySnapshot(history.stack[history.idx]);
  flashHistory('↷ Redo');
  SFX.redo();
}
function flashHistory(text) {
  const el = $('#historyFlash');
  if (!el) return;
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(flashHistory._t);
  flashHistory._t = setTimeout(() => el.classList.remove('show'), 800);
}

/* ════════════════════════════════════════════════════════════
   CLICK RIPPLE
   ════════════════════════════════════════════════════════════ */
function spawnRipple(x, y, target) {
  const rect = target.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'ripple';
  const size = 40;
  r.style.left = (x - rect.left - size/2) + 'px';
  r.style.top = (y - rect.top - size/2) + 'px';
  r.style.width = r.style.height = size + 'px';
  target.appendChild(r);
  setTimeout(() => r.remove(), 650);
}

/* ════════════════════════════════════════════════════════════
   SNAP GUIDES
   ════════════════════════════════════════════════════════════ */
function computeSnapTargets(movingEl) {
  const page = currentPage();
  const canvasW = 1024;
  const targets = { x: [0, canvasW/2, canvasW], y: [0] };
  for (const el of page.elements) {
    if (el.id === movingEl.id) continue;
    targets.x.push(el.x, el.x + el.w/2, el.x + el.w);
    targets.y.push(el.y, el.y + el.h/2, el.y + el.h);
  }
  return targets;
}
function snapValue(v, targets, tolerance = 6) {
  let best = null, bestDist = tolerance;
  for (const t of targets) {
    const d = Math.abs(v - t);
    if (d < bestDist) { bestDist = d; best = t; }
  }
  return best;
}
function showGuides(snapX, snapY) {
  const canvas = $('#canvas');
  $$('.snap-guide', canvas).forEach(g => g.remove());
  if (snapX !== null) {
    const g = document.createElement('div');
    g.className = 'snap-guide v';
    g.style.left = snapX + 'px';
    canvas.appendChild(g);
  }
  if (snapY !== null) {
    const g = document.createElement('div');
    g.className = 'snap-guide h';
    g.style.top = snapY + 'px';
    canvas.appendChild(g);
  }
}
function clearGuides() {
  $$('.snap-guide', $('#canvas')).forEach(g => g.remove());
}

    </button>
    <button class="el-toolbar-btn" data-tb="lock" title="Toggle lock">
      <svg viewBox="0 0 24 24">${el.props.locked?'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>':'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>'}</svg>
    </button>
    <div class="el-toolbar-sep"></div>
    <button class="el-toolbar-btn danger" data-tb="del" title="Delete (Del)">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
    </button>
  `;
  $$('.el-toolbar-btn', tb).forEach(b => b.addEventListener('click', (e) => {
    e.stopPropagation();
